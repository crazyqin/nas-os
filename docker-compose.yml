# NAS-OS Docker Compose
# ⚠️ 注意：生产环境建议直接安装在宿主机（需要磁盘设备访问）
# 此配置适用于开发测试或受限场景

services:
  nas-os:
    image: nas-os:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nas-os
    restart: unless-stopped
    
    # 服务标签
    labels:
      - "nas-os.version=2.74.0"
      - "nas-os.description=NAS-OS Storage Management System"
      - "nas-os.maintainer=工部"
    
    # 使用 init 进程管理子进程
    init: true
    
    # 优雅停止时间
    stop_grace_period: 30s
    
    # ⚠️ 特权模式（访问磁盘设备）
    # 生产环境建议使用 --device 精确授权
    privileged: true
    
    # 网络模式：host 以获得最佳性能
    # 或使用 bridge + 端口映射
    network_mode: host
    
    # 卷挂载
    volumes:
      # 配置文件
      - ./configs:/etc/nas-os:ro
      - nas-os-data:/var/lib/nas-os
      
      # 存储池（根据实际磁盘挂载点调整）
      # - /mnt/disk1:/mnt/disk1
      # - /mnt/disk2:/mnt/disk2
      
      # 日志
      - ./logs:/var/log/nas-os
    
    # 环境变量
    environment:
      - NAS_OS_CONFIG=/etc/nas-os/config.yaml
      - NAS_OS_DATA_ROOT=/var/lib/nas-os
      # 时区设置
      - TZ=Asia/Shanghai
    
    # 设备访问（非特权模式下使用）
    # devices:
    #   - /dev/sda:/dev/sda
    #   - /dev/sdb:/dev/sdb
    
    # 资源限制（推荐配置）
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    
    # 日志配置
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    
    # 健康检查（覆盖 Dockerfile 中的设置）
    # v2.45.0: 多层检测 + 超时优化
    # 注意：使用 curl（Dockerfile 已安装），不使用 wget
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/api/v1/health > /dev/null 2>&1 && curl -sf http://localhost:8080/api/v1/system/status > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 30s

  # ========== 可选：配套服务 ==========
  
  # Watchtower 自动更新
  # watchtower:
  #   image: containrrr/watchtower
