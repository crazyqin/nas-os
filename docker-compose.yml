  #     - GF_SECURITY_ADMIN_PASSWORD=admin123

# ========== 网络配置 ==========
networks:
  default:
    name: nas-os-network
    driver: bridge

# ========== 卷配置 ==========
volumes:
  nas-os-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /var/lib/nas-os
  
