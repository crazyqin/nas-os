  #   ports:
  #     - "9090:9090"
  
  # Grafana 可视化（可选）
  # grafana:
  #   image: grafana/grafana:latest
  #   container_name: nas-grafana
  #   restart: unless-stopped
  #   volumes:
  #     - grafana-data:/var/lib/grafana
  #   ports:
  #     - "3000:3000"
