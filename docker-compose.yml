# NAS-OS Docker Compose
# ⚠️ 注意：生产环境建议直接安装在宿主机（需要磁盘设备访问）
# 此配置适用于开发测试或受限场景
#
# 镜像地址: ghcr.io/nas-os/nas-os
#
# v2.160.0 更新（工部优化）：
# - 版本标签同步更新
#
# v2.135.0 更新：
# - 更新版本标签至 v2.135.0
# - 修复健康检查命令（使用内置 healthcheck 工具，兼容 distroless 镜像）
#
# v2.133.0 更新：
# - 修复健康检查命令（wget 替代 curl，兼容 alpine 基础镜像）
# - 添加 distroless 镜像健康检查说明
#
# v2.114.0 更新：
# - 统一健康检查端点（与 Dockerfile 一致）
#
# v2.90.0 更新：
# - 迁移到 GHCR (GitHub Container Registry)
# - 更新镜像地址

services:
  nas-os:
    image: ghcr.io/nas-os/nas-os:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nas-os
    restart: unless-stopped
    
    # 服务标签
    labels:
      - "nas-os.version=2.169.0"
      - "nas-os.description=NAS-OS Storage Management System"
      - "nas-os.maintainer=工部"
    
    # 使用 init 进程管理子进程
    init: true
    
    # 优雅停止时间
    stop_grace_period: 30s
    
    # ⚠️ 特权模式（访问磁盘设备）
    # 生产环境建议使用 --device 精确授权
    privileged: true
    
    # 网络模式：host 以获得最佳性能
    # 或使用 bridge + 端口映射
    network_mode: host
    
    # 卷挂载
    volumes:
      # 配置文件
      - ./configs:/etc/nas-os:ro
      - nas-os-data:/var/lib/nas-os
      
      # 存储池（根据实际磁盘挂载点调整）
      # - /mnt/disk1:/mnt/disk1
      # - /mnt/disk2:/mnt/disk2
      
      # 日志
      - ./logs:/var/log/nas-os
    
    # 环境变量
    environment:
      - NAS_OS_CONFIG=/etc/nas-os/config.yaml
      - NAS_OS_DATA_ROOT=/var/lib/nas-os
      - NAS_OS_VERSION=2.169.0
      # 时区设置
      - TZ=Asia/Shanghai
      # 日志配置
      - NAS_OS_LOG_LEVEL=${LOG_LEVEL:-info}
      # 监控配置
      - NAS_OS_METRICS_ENABLED=true
      # 备份配置
      - NAS_OS_BACKUP_DIR=/var/lib/nas-os/backups
      # 调试模式
      - NAS_OS_DEBUG=${DEBUG:-false}
    
    # 设备访问（非特权模式下使用）
    # devices:
    #   - /dev/sda:/dev/sda
    #   - /dev/sdb:/dev/sdb
    
    # 资源限制（推荐配置）
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    
    # 日志配置
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    
    # 健康检查（覆盖 Dockerfile 中的设置）
    # v2.136.0: distroless 镜像无 shell，必须使用 CMD 而非 CMD-SHELL
    # 注意：如使用 Dockerfile.full (alpine)，可改为 wget 或 curl
    healthcheck:
      test: ["CMD", "/usr/local/bin/healthcheck"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 30s

  # ========== 可选：配套服务 ==========
  # 取消注释以下服务以启用
  
  # Watchtower 自动更新
  # watchtower:
