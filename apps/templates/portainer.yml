# Portainer - Docker 容器管理 UI
#
# 用途：
# - 容器生命周期管理
# - 镜像管理
# - 网络和卷管理
# - 日志查看
# - Stack/Compose 管理
# - 用户权限控制
#
# 数据目录：
# - /var/lib/nas-os/data/portainer/data - Portainer 数据

services:
  portainer:
    image: portainer/portainer-ce:latest
    container_name: nas-portainer
    restart: unless-stopped
    
    ports:
      - "9443:9443"   # HTTPS Web UI
      - "9000:9000"   # HTTP Web UI（可选）
    
    volumes:
      # 数据目录
      - ${NAS_DATA_DIR:-/var/lib/nas-os/data}/portainer/data:/data
      # Docker socket（管理本地 Docker）
      - /var/run/docker.sock:/var/run/docker.sock
    
    environment:
      # 时区
      TZ: ${TZ:-Asia/Shanghai}
    
    # 健康检查（v2.292.0 优化）
    healthcheck:
      test: ["CMD-SHELL", "curl -kf https://localhost:9443/api/system/status || curl -f http://localhost:9000/api/system/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    
    # 资源限制
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    
    # 日志聚合配置
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service,app"
        tag: "{{.Name}}/{{.ImageName}}"
    
    # 网络隔离
    networks:
      - nas-app-network
    
    labels:
      - "nas-os.app=portainer"
      - "nas-os.category=management"
      - "nas-os.description=Docker container management web interface"
      - "nas-os.healthcheck.enabled=true"
      - "nas-os.logging.enabled=true"

# ==================== 网络配置 ====================
networks:
  nas-app-network:
    external: true
    name: nas-app-network

# 说明：
# - Web UI：https://localhost:9443 或 http://localhost:9000
# - 首次访问需要创建管理员账户
# - 默认连接本地 Docker，也可管理远程 Docker 环境
# - 支持管理 Kubernetes、Swarm、Nomad 等环境
# - 推荐使用 HTTPS 端口 9443
# - 可通过 Edge Agent 管理远程边缘设备

