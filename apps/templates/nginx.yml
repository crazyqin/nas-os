# Nginx - 高性能 Web 服务器/反向代理
#
# 用途：
# - Web 服务器
# - 反向代理
# - 负载均衡
# - SSL/TLS 终端
#
# 配置文件位置：/var/lib/nas-os/config/nginx/

services:
  nginx:
    image: nginx:alpine
    container_name: nas-nginx
    restart: unless-stopped
    
    ports:
      - "80:80"
      - "443:443"
    
    volumes:
      # 配置文件
      - ${NAS_CONFIG_DIR:-/var/lib/nas-os/config}/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ${NAS_CONFIG_DIR:-/var/lib/nas-os/config}/nginx/conf.d:/etc/nginx/conf.d:ro
      # SSL 证书
      - ${NAS_CONFIG_DIR:-/var/lib/nas-os/config}/nginx/ssl:/etc/nginx/ssl:ro
      # 网站文件
      - ${NAS_DATA_DIR:-/var/lib/nas-os/data}/www:/var/www/html:ro
      # 日志聚合
      - ${NAS_LOG_DIR:-/var/lib/nas-os/logs}/apps/nginx:/var/log/nginx
    
    # 健康检查（v2.292.0 优化）
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/nginx_status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    
    # 资源限制
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    
    # 日志聚合配置
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
        labels: "service,app"
        tag: "{{.Name}}/{{.ImageName}}"
    
    # 网络隔离
    networks:
      - nas-app-network
    
    labels:
      - "nas-os.app=nginx"
      - "nas-os.category=web"
      - "nas-os.description=High-performance web server and reverse proxy"
      - "nas-os.healthcheck.enabled=true"
      - "nas-os.logging.enabled=true"

# ==================== 网络配置 ====================
networks:
  nas-app-network:
    external: true
    name: nas-app-network

