# Vaultwarden 密码管理器
# Bitwarden 轻量级实现，私有密码管理
version: '3.8'

services:
  vaultwarden:
    image: vaultwarden/server:latest
    container_name: vaultwarden
    restart: unless-stopped
    ports:
      - "8080:80"   # Web界面
      - "3012:3012" # WebSocket通知
    volumes:
      - vaultwarden-data:/data
    environment:
      - TZ=Asia/Shanghai
      - ADMIN_TOKEN=${ADMIN_TOKEN:-changeme}  # 管理员密码
      - SIGNUPS_ALLOWED=${SIGNUPS_ALLOWED:-true}
      - DOMAIN=${DOMAIN:-http://localhost:8080}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  vaultwarden-data: