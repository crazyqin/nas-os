      operationId: getWebDAVStatus
      responses:
        '200':
          description: 成功

    # 新增 Schema 定义
    BackupConfig:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        source_path:
          type: string
        destination_type:
          type: string
          enum: [local, s3, sftp]
        destination_path:
          type: string
        schedule:
          type: string
        retention_days:
          type: integer
        compression:
          type: string
          enum: [none, gzip, zstd]
        encryption:
          type: boolean
        created_at:
          type: string
          format: date-time

    BackupConfigCreate:
      type: object
      required:
        - name
        - source_path
        - destination_path
      properties:
        name:
          type: string
        source_path:
          type: string
        destination_type:
          type: string
          enum: [local, s3, sftp]
        destination_path:
          type: string
        schedule:
          type: string
        retention_days:
          type: integer
          default: 30
        compression:
          type: string
          enum: [none, gzip, zstd]
          default: zstd
        encryption:
          type: boolean
          default: false

    ClusterNode:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        address:
          type: string
        role:
          type: string
          enum: [master, worker]
        status:
          type: string
          enum: [online, offline, degraded]
        cpu_usage:
          type: number
        memory_usage:
          type: number
        disk_usage:
          type: number
        last_seen:
          type: string
          format: date-time

    CompressConfig:
      type: object
      properties:
        enabled:
          type: boolean
        algorithm:
          type: string
          enum: [gzip, zstd, lz4]
        level:
          type: integer
          minimum: 1
          maximum: 9
        min_file_size:
          type: integer
        exclude_extensions:
          type: array
          items:
            type: string

    DiskInfo:
      type: object
      properties:
        device:
          type: string
        model:
          type: string
        serial:
          type: string
        size:
          type: integer
        type:
          type: string
          enum: [hdd, ssd, nvme]
        temperature:
          type: integer
        health:
          type: string
          enum: [healthy, warning, critical]
        usage_percent:
          type: number

    SMARTData:
      type: object
      properties:
        device:
          type: string
        overall_health:
          type: string
        temperature:
          type: integer
        power_on_hours:
          type: integer
        power_cycle_count:
          type: integer
        reallocated_sectors:
          type: integer
        pending_sectors:
          type: integer
        attributes:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              value:
                type: integer
              threshold:
                type: integer
              raw:
                type: string

    ContainerCreate:
      type: object
      required:
        - name
        - image
      properties:
        name:
          type: string
        image:
          type: string
        ports:
          type: array
          items:
            type: string
        volumes:
          type: array
          items:
            type: string
        environment:
          type: object
          additionalProperties:
            type: string
        restart_policy:
          type: string
          enum: [no, always, on-failure]

    FTPConfig:
      type: object
      properties:
        enabled:
          type: boolean
        port:
          type: integer
        passive_ports:
          type: string
        max_connections:
          type: integer
        anonymous:
          type: boolean
        welcome_message:
          type: string

    NFSExportCreate:
      type: object
      required:
        - path
      properties:
        path:
          type: string
        clients:
          type: array
          items:
            type: string
        options:
          type: string
        read_only:
          type: boolean
          default: false

    SMBShareCreate:
      type: object
      required:
        - name
        - path
      properties:
        name:
          type: string
        path:
          type: string
        comment:
          type: string
        browseable:
          type: boolean
          default: true
        read_only:
          type: boolean
          default: false
        valid_users:
          type: array
          items:
            type: string
        guest_ok:
          type: boolean
          default: false

    SnapshotPolicyCreate:
      type: object
      required:
        - name
        - path
      properties:
        name:
          type: string
        path:
          type: string
        schedule:
          type: string
        retention_count:
          type: integer
          default: 7
        exclude_patterns:
          type: array
          items:
            type: string

    StoragePoolCreate:
      type: object
      required:
        - name
        - devices
      properties:
        name:
          type: string
        devices:
          type: array
          items:
            type: string
        profile:
          type: string
          enum: [single, raid0, raid1, raid5, raid6, raid10]

    SystemStats:
      type: object
      properties:
        cpu:
          type: object
          properties:
            usage:
              type: number
            cores:
              type: integer
            temperature:
              type: number
        memory:
          type: object
          properties:
            total:
              type: integer
            used:
              type: integer
            available:
              type: integer
            cached:
              type: integer
        disk:
          type: object
          properties:
            total:
              type: integer
            used:
              type: integer
            io_read:
              type: integer
            io_write:
              type: integer
        network:
          type: object
          properties:
            rx_bytes:
              type: integer
            tx_bytes:
              type: integer

    SystemInfo:
      type: object
      properties:
        hostname:
          type: string
        os:
          type: string
        kernel:
          type: string
        architecture:
          type: string
        uptime:
          type: integer
        version:
          type: string
        build_date:
          type: string
          format: date-time

    VMCreate:
      type: object
      required:
        - name
        - memory
        - cpus
      properties:
        name:
          type: string
        memory:
          type: integer
          description: 内存大小（MB）
        cpus:
          type: integer
        disk_size:
          type: integer
          description: 磁盘大小（GB）
        iso:
          type: string
        network_type:
          type: string
          enum: [nat, bridge]

    WebDAVConfig:
      type: object
      properties:
        enabled:
          type: boolean
        port:
          type: integer
        root_path:
          type: string
        auth_required:
          type: boolean
        ssl_enabled:
          type: boolean
