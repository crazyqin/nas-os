    post:
      tags: [backup]
      summary: 创建备份配置
      operationId: createBackupConfig
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BackupConfigCreate'
      responses:
        '200':
          $ref: '#/components/responses/Success'

  /backup/configs/{id}:
    get:
      tags: [backup]
      summary: 获取备份配置详情
      operationId: getBackupConfig
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 成功
    delete:
      tags: [backup]
      summary: 删除备份配置
      operationId: deleteBackupConfig
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          $ref: '#/components/responses/Success'

  /backup/configs/{id}/run:
    post:
      tags: [backup]
      summary: 执行备份
      operationId: runBackup
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 备份任务已启动

  /backup/tasks:
    get:
      tags: [backup]
      summary: 获取备份任务列表
      operationId: listBackupTasks
      responses:
        '200':
          description: 成功

  /backup/restore:
    post:
      tags: [backup]
      summary: 恢复备份
      operationId: restoreBackup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                backup_id:
                  type: string
                target_path:
                  type: string
      responses:
        '200':
          $ref: '#/components/responses/Success'

  # ==================== 云同步 API ====================
  /cloudsync/providers:
    get:
      tags: [cloudsync]
      summary: 获取云存储提供商列表
      operationId: listCloudProviders
      responses:
        '200':
          description: 成功
    post:
      tags: [cloudsync]
      summary: 添加云存储提供商
      operationId: createCloudProvider
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                type:
                  type: string
                  enum: [s3, aliyun, qiniu, onedrive, google]
                credentials:
                  type: object
      responses:
        '200':
          $ref: '#/components/responses/Success'

  /cloudsync/providers/{id}:
    get:
      tags: [cloudsync]
      summary: 获取提供商详情
      operationId: getCloudProvider
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 成功
    delete:
      tags: [cloudsync]
      summary: 删除提供商
      operationId: deleteCloudProvider
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          $ref: '#/components/responses/Success'

  /cloudsync/sync:
    post:
      tags: [cloudsync]
      summary: 创建同步任务
      operationId: createSyncTask
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                provider_id:
                  type: string
                local_path:
                  type: string
                remote_path:
                  type: string
                direction:
                  type: string
                  enum: [upload, download, bidirectional]
      responses:
        '200':
          $ref: '#/components/responses/Success'

  # ==================== 集群管理 API ====================
  /cluster/nodes:
    get:
      tags: [cluster]
      summary: 获取集群节点列表
      operationId: getClusterNodes
      responses:
        '200':
          description: 成功

  /cluster/nodes/{id}:
    get:
      tags: [cluster]
      summary: 获取节点详情
      operationId: getClusterNode
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 成功
    delete:
      tags: [cluster]
      summary: 移除节点
      operationId: removeClusterNode
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          $ref: '#/components/responses/Success'

  /cluster/nodes/join:
    post:
      tags: [cluster]
      summary: 加入集群
      operationId: joinCluster
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                master_address:
                  type: string
                token:
                  type: string
      responses:
        '200':
          $ref: '#/components/responses/Success'

  /cluster/nodes/{id}/status:
    get:
      tags: [cluster]
      summary: 获取节点状态
      operationId: getClusterNodeStatus
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 成功

  # ==================== 压缩存储 API ====================
  /compress/config:
