openapi: 3.0.3
info:
  title: NAS-OS API
  description: |
    NAS-OS 是一个现代化的网络存储操作系统，提供完整的存储管理、用户管理、安全管理和监控功能。
    
    ## 功能模块
    - **卷管理**: Btrfs 卷创建、快照、RAID 配置
    - **用户管理**: 用户/组管理、认证授权
    - **共享管理**: SMB/NFS 共享配置
    - **安全中心**: 加密、审计日志、告警管理
    - **数据去重**: 重复文件检测与清理
    - **健康监控**: 系统健康检查
    - **日志管理**: 结构化日志与轮转
    
    ## 认证
    大部分 API 需要通过 JWT Token 认证。在请求头中添加：
    ```
    Authorization: Bearer {token}
    ```
    
    ## 错误码说明
    | 错误码 | 说明 |
    |--------|------|
    | 0 | 成功 |
    | 400 | 请求参数错误 |
    | 401 | 未认证或认证失败 |
    | 403 | 权限不足 |
    | 404 | 资源不存在 |
    | 409 | 资源冲突 |
    | 429 | 请求频率过高 |
    | 500 | 服务器内部错误 |
    | 503 | 服务暂时不可用 |
    
version: 2.253.146
  contact:
    name: NAS-OS 团队
    email: support@nas-os.io
    url: https://github.com/nas-os/nas-os
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:8080/api/v1
    description: 本地开发服务器
  - url: https://nas.example.com/api/v1
    description: 生产服务器

tags:
  - name: dedup
    description: 数据去重 API - 重复文件检测与清理
  - name: health
    description: 健康监控 API - 系统健康检查与状态
  - name: logging
    description: 日志管理 API - 结构化日志与轮转配置
  - name: security
    description: 安全管理 API - 加密、审计、告警
  - name: volumes
    description: 卷管理 API - Btrfs 存储卷管理
  - name: users
    description: 用户管理 API - 用户和用户组管理
  - name: iscsi
    description: iSCSI 目标管理 API - 块级存储服务
  - name: office
    description: 在线文档 API - OnlyOffice 文档编辑协作
  - name: notify
    description: 通知中心 API - 系统通知与多渠道告警
  - name: optimizer
    description: 性能优化 API - 智能分析与系统优化建议

paths:
  # ==================== 数据去重 API ====================
  /dedup/scan:
    post:
      tags: [dedup]
      summary: 扫描重复文件
      description: 扫描指定路径查找重复文件，支持多种扫描模式
      operationId: dedupScan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScanRequest'
            example:
              paths: ["/data/photos", "/data/documents"]
              min_size: 1048576
              method: "hash"
              file_type: "all"
              exclude_dirs: [".git", "node_modules"]
      responses:
        '200':
          description: 扫描完成
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScanResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /dedup/scan/cancel:
    post:
      tags: [dedup]
      summary: 取消扫描
      description: 取消正在进行的扫描任务
      operationId: dedupCancelScan
      responses:
        '200':
          description: 扫描已取消
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'
              example:
                code: 0
                message: "扫描已取消"

  /dedup/duplicates:
    get:
      tags: [dedup]
      summary: 获取重复文件列表
      description: 获取扫描发现的重复文件分组列表
      operationId: getDuplicates
      parameters:
        - name: user
          in: query
          description: 用户名（可选，筛选特定用户的重复文件）
          schema:
            type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 0
                  message:
                    type: string
                    example: "success"
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/DuplicateGroup'

  /dedup/deduplicate:
    post:
      tags: [dedup]
      summary: 执行去重操作
      description: 对指定的重复文件组执行去重操作
      operationId: deduplicate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeduplicateRequest'
            example:
              checksum: "sha256:abc123..."
              keepPath: "/data/photos/vacation.jpg"
              mode: "file"
              action: "hardlink"
      responses:
        '200':
          description: 去重完成
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeduplicateResult'
        '400':
          $ref: '#/components/responses/BadRequest'

  /dedup/deduplicate/all:
    post:
      tags: [dedup]
      summary: 批量去重
      description: 对所有重复文件执行批量去重操作
      operationId: deduplicateAll
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeduplicateAllRequest'
            example:
              mode: "file"
              action: "hardlink"
              dryRun: true
              crossUser: false
      responses:
        '200':
          description: 批量去重完成
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchDedupResult'

  /dedup/stats:
    get:
      tags: [dedup]
      summary: 获取去重统计信息
      description: 获取去重模块的统计信息
      operationId: getDedupStats
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 0
                  message:
                    type: string
                    example: "success"
                  data:
                    $ref: '#/components/schemas/DedupStats'

  /dedup/config:
    get:
      tags: [dedup]
      summary: 获取去重配置
      operationId: getDedupConfig
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  data:
                    $ref: '#/components/schemas/DedupConfig'
    put:
      tags: [dedup]
      summary: 更新去重配置
      operationId: updateDedupConfig
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DedupConfig'
      responses:
        '200':
          $ref: '#/components/responses/Success'

  /dedup/report:
    get:
      tags: [dedup]
      summary: 获取去重报告
      description: 获取详细的去重分析报告
      operationId: getDedupReport
      parameters:
        - name: user
          in: query
          schema:
            type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  data:
                    $ref: '#/components/schemas/DedupReport'

  # ==================== 健康监控 API ====================
  /health:
    get:
      tags: [health]
      summary: 系统健康检查
      description: 检查系统整体健康状态，包括 CPU、内存、磁盘、网络等
      operationId: getHealth
      responses:
        '200':
          description: 系统健康状态
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemHealth'
              example:
                status: "healthy"
                score: 95
                checks:
                  - name: "cpu"
                    status: "healthy"
                    message: ""
                    duration_ms: 2
                  - name: "memory"
                    status: "healthy"
                    message: ""
                    duration_ms: 1
                  - name: "disk"
                    status: "degraded"
                    message: "磁盘 /dev/sda 使用率偏高: 87%"
                    duration_ms: 5
                uptime_seconds: 864000
                last_checked: "2026-03-14T08:00:00Z"
                version: "2.6.0"

  /health/checks:
    get:
      tags: [health]
      summary: 获取所有健康检查项
      operationId: getHealthChecks
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/HealthCheckResult'

  /health/checks/{name}:
    get:
      tags: [health]
      summary: 执行单项健康检查
      operationId: runHealthCheck
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
            enum: [cpu, memory, disk, disk_io, network, services, uptime]
      responses:
        '200':
          description: 检查结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthCheckResult'

  /health/thresholds:
    get:
      tags: [health]
      summary: 获取健康检查阈值配置
      operationId: getHealthThresholds
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthThresholds'
    put:
      tags: [health]
      summary: 更新健康检查阈值
      operationId: updateHealthThresholds
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HealthThresholds'
            example:
              cpu_warning_percent: 80
              cpu_critical_percent: 95
              memory_warning_percent: 85
              memory_critical_percent: 95
              disk_warning_percent: 85
              disk_critical_percent: 95
              disk_latency_ms: 50
      responses:
        '200':
          $ref: '#/components/responses/Success'

  # ==================== 日志管理 API ====================
  /logging/config:
    get:
      tags: [logging]
      summary: 获取日志配置
      operationId: getLoggingConfig
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoggingConfig'
    put:
      tags: [logging]
      summary: 更新日志配置
      operationId: updateLoggingConfig
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoggingConfig'
      responses:
        '200':
          $ref: '#/components/responses/Success'

  /logging/entries:
    get:
      tags: [logging]
      summary: 查询日志条目
      description: 根据条件查询日志条目
      operationId: queryLogEntries
      parameters:
        - name: level
          in: query
          description: 日志级别
          schema:
            type: string
            enum: [debug, info, warn, error, fatal]
        - name: source
          in: query
          description: 日志来源
          schema:
            type: string
        - name: start
          in: query
          description: 开始时间 (RFC3339)
          schema:
            type: string
            format: date-time
        - name: end
          in: query
          description: 结束时间 (RFC3339)
          schema:
            type: string
            format: date-time
        - name: search
          in: query
          description: 搜索关键词
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: size
          in: query
          schema:
            type: integer
            default: 50
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  data:
                    type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: '#/components/schemas/LogEntry'
                      total:
                        type: integer
                      page:
                        type: integer
                      size:
                        type: integer

  /logging/rotation:
    get:
      tags: [logging]
      summary: 获取日志轮转配置
      operationId: getLogRotation
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogRotationConfig'
    put:
      tags: [logging]
      summary: 更新日志轮转配置
      operationId: updateLogRotation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogRotationConfig'
      responses:
        '200':
          $ref: '#/components/responses/Success'

  /logging/export:
    get:
      tags: [logging]
      summary: 导出日志
      description: 导出日志到文件
      operationId: exportLogs
      parameters:
        - name: format
          in: query
          description: 导出格式
          schema:
            type: string
            enum: [json, csv, txt]
            default: json
        - name: level
          in: query
          schema:
            type: string
        - name: start
          in: query
          schema:
            type: string
        - name: end
          in: query
          schema:
            type: string
      responses:
        '200':
          description: 日志文件
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary

  /logging/archive:
    get:
      tags: [logging]
      summary: 获取日志归档列表
      operationId: getLogArchives
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                        size:
                          type: integer
                        created_at:
                          type: string
                          format: date-time

  # ==================== 安全管理 API ====================
  /security/dashboard:
    get:
      tags: [security]
      summary: 获取安全仪表板数据
      operationId: getSecurityDashboard
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SecurityDashboard'

  /security/encryption/directories:
    get:
      tags: [security]
      summary: 获取加密目录列表
      operationId: getEncryptedDirectories
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/EncryptedDirectory'
    post:
      tags: [security]
      summary: 创建加密目录
      operationId: createEncryptedDirectory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEncryptedDirRequest'
      responses:
        '200':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EncryptedDirectory'

  /security/encryption/directories/{path}/lock:
    post:
      tags: [security]
      summary: 锁定加密目录
      operationId: lockEncryptedDirectory
      parameters:
        - name: path
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          $ref: '#/components/responses/Success'

  /security/encryption/directories/{path}/unlock:
    post:
      tags: [security]
      summary: 解锁加密目录
      operationId: unlockEncryptedDirectory
      parameters:
        - name: path
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                password:
                  type: string
      responses:
        '200':
          $ref: '#/components/responses/Success'
        '401':
          description: 密码错误

  /security/audit/logs:
    get:
      tags: [security]
      summary: 获取审计日志
      operationId: getAuditLogs
      parameters:
        - name: time
          in: query
          description: 时间范围
          schema:
            type: string
            enum: [today, week, month, all]
        - name: category
          in: query
          schema:
            type: string
            enum: [auth, encryption, firewall, system, file]
        - name: level
          in: query
          schema:
            type: string
            enum: [info, warning, error, critical]
        - name: search
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
        - name: size
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  data:
                    type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: '#/components/schemas/AuditLogEntry'
                      total:
                        type: integer

  /security/audit/export:
    get:
      tags: [security]
      summary: 导出审计日志
      operationId: exportAuditLogs
      parameters:
        - name: format
          in: query
          schema:
            type: string
            enum: [csv, json]
            default: csv
        - name: time
          in: query
          schema:
            type: string
        - name: category
          in: query
          schema:
            type: string
      responses:
        '200':
          description: 审计日志文件
          content:
            text/csv:
              schema:
                type: string
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AuditLogEntry'

  /security/alerts:
    get:
      tags: [security]
      summary: 获取安全告警列表
      operationId: getSecurityAlerts
      parameters:
        - name: acknowledged
          in: query
          schema:
            type: boolean
        - name: severity
          in: query
          schema:
            type: string
            enum: [low, medium, high, critical]
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/SecurityAlert'

  /security/alerts/{id}/acknowledge:
    post:
      tags: [security]
      summary: 确认告警
      operationId: acknowledgeAlert
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          $ref: '#/components/responses/Success'

  /security/scan:
    post:
      tags: [security]
      summary: 执行安全扫描
      operationId: runSecurityScan
      responses:
        '200':
          description: 扫描完成
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SecurityDashboard'

  # ==================== 卷管理 API ====================
  /volumes:
    get:
      tags: [volumes]
      summary: 获取卷列表
      description: 获取所有存储卷的列表
      operationId: listVolumes
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 0
                  message:
                    type: string
                    example: "success"
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Volume'
              example:
                code: 0
                message: "success"
                data:
                  - name: "data"
                    profile: "raid1"
                    devices: ["/dev/sda", "/dev/sdb"]
                    total: 500000000000
                    used: 225000000000
                    usage_percent: 45
                    status: "healthy"
                  - name: "backup"
                    profile: "single"
                    devices: ["/dev/sdc"]
                    total: 2000000000000
                    used: 1560000000000
                    usage_percent: 78
                    status: "healthy"

  /volumes/{name}:
    get:
      tags: [volumes]
      summary: 获取卷详情
      operationId: getVolume
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  data:
                    $ref: '#/components/schemas/Volume'
    delete:
      tags: [volumes]
      summary: 删除卷
      operationId: deleteVolume
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          $ref: '#/components/responses/Success'

  /volumes/{name}/subvolumes:
    get:
      tags: [volumes]
      summary: 获取子卷列表
      operationId: listSubvolumes
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              example:
                code: 0
                data:
                  - name: "@home"
                    volume: "data"
                    path: "/mnt/data/home"
                    size: 125000000000
                    snapshot_count: 5
                  - name: "@share"
                    volume: "data"
                    path: "/mnt/data/share"
                    size: 89000000000
                    snapshot_count: 3
    post:
      tags: [volumes]
      summary: 创建子卷
      operationId: createSubvolume
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                path:
                  type: string
            example:
              name: "@photos"
              path: "/mnt/data/photos"
      responses:
        '200':
          $ref: '#/components/responses/Success'

  /volumes/{name}/snapshots:
    get:
      tags: [volumes]
      summary: 获取快照列表
      operationId: listSnapshots
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              example:
                code: 0
                data:
                  - name: "daily-20260314"
                    subvolume: "@home"
                    created_at: "2026-03-14T00:00:00Z"
                    size: 2300000000
                    type: "scheduled"
                    status: "completed"
                  - name: "manual-before-update"
                    subvolume: "@share"
                    created_at: "2026-03-13T18:30:00Z"
                    size: 1800000000
                    type: "manual"
                    status: "completed"
    post:
      tags: [volumes]
      summary: 创建快照
      operationId: createSnapshot
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSnapshotRequest'
            example:
              subvolume: "@home"
              name: "manual-20260314"
              readonly: true
      responses:
        '200':
          $ref: '#/components/responses/Success'

  /volumes/{name}/snapshots/{snapshot}:
    delete:
      tags: [volumes]
      summary: 删除快照
      operationId: deleteSnapshot
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
        - name: snapshot
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          $ref: '#/components/responses/Success'

  /volumes/{name}/snapshots/{snapshot}/restore:
    post:
      tags: [volumes]
      summary: 恢复快照
      operationId: restoreSnapshot
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
        - name: snapshot
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          $ref: '#/components/responses/Success'

  /volumes/{name}/scrub:
    post:
      tags: [volumes]
      summary: 启动数据校验
      operationId: startScrub
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 校验已启动
          content:
            application/json:
              example:
                code: 0
                message: "数据校验已启动"
                data:
                  task_id: "scrub-data-20260314"
                  status: "running"

  /volumes/{name}/balance:
    post:
      tags: [volumes]
      summary: 启动数据平衡
      operationId: startBalance
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 平衡已启动
          content:
            application/json:
              example:
                code: 0
                message: "数据平衡已启动"

  # ==================== 用户管理 API ====================
  /users:
    get:
      tags: [users]
      summary: 获取用户列表
      operationId: listUsers
      responses:
        '200':
          description: 成功
          content:
            application/json:
              example:
                code: 0
                data:
                  - username: "admin"
                    email: "admin@example.com"
                    role: "admin"
                    disabled: false
                    created_at: "2026-01-01T00:00:00Z"
                  - username: "zhangsan"
                    email: "zhangsan@example.com"
                    role: "user"
                    disabled: false
                    created_at: "2026-02-15T10:30:00Z"
    post:
      tags: [users]
      summary: 创建用户
      operationId: createUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
            example:
              username: "lisi"
              password: "SecurePass123!"
              email: "lisi@example.com"
              role: "user"
      responses:
        '200':
          description: 用户创建成功
          content:
            application/json:
              example:
                code: 0
                message: "用户创建成功"
                data:
                  username: "lisi"

  /users/{username}:
    get:
      tags: [users]
      summary: 获取用户详情
      operationId: getUser
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  data:
                    $ref: '#/components/schemas/User'
    put:
      tags: [users]
      summary: 更新用户信息
      operationId: updateUser
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                role:
                  type: string
            example:
              email: "newemail@example.com"
              role: "admin"
      responses:
        '200':
          $ref: '#/components/responses/Success'
    delete:
      tags: [users]
      summary: 删除用户
      operationId: deleteUser
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          $ref: '#/components/responses/Success'

  /users/{username}/disable:
    post:
      tags: [users]
      summary: 禁用用户
      operationId: disableUser
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          $ref: '#/components/responses/Success'

  /users/{username}/enable:
    post:
      tags: [users]
      summary: 启用用户
      operationId: enableUser
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          $ref: '#/components/responses/Success'

  /users/{username}/reset-password:
    post:
      tags: [users]
      summary: 重置用户密码
      operationId: resetUserPassword
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                new_password:
                  type: string
            example:
              new_password: "NewSecurePass456!"
      responses:
        '200':
          $ref: '#/components/responses/Success'

  /groups:
    get:
      tags: [users]
      summary: 获取用户组列表
      operationId: listGroups
      responses:
        '200':
          description: 成功
          content:
            application/json:
              example:
                code: 0
                data:
                  - name: "administrators"
                    members: ["admin"]
                  - name: "users"
                    members: ["zhangsan", "lisi"]
    post:
      tags: [users]
      summary: 创建用户组
      operationId: createGroup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
                members:
                  type: array
                  items:
                    type: string
            example:
              name: "developers"
              description: "开发团队"
              members: ["zhangsan"]
      responses:
        '200':
          $ref: '#/components/responses/Success'

components:
  schemas:
    # 通用响应
    GenericResponse:
      type: object
      properties:
        code:
          type: integer
          example: 0
        message:
          type: string
          example: "success"
        data:
          type: object

    # 卷相关
    Volume:
      type: object
      properties:
        name:
          type: string
          example: "data"
        profile:
          type: string
          enum: [single, raid0, raid1, raid5, raid6, raid10]
          example: "raid1"
        devices:
          type: array
          items:
            type: string
          example: ["/dev/sda", "/dev/sdb"]
        total:
          type: integer
          description: 总容量（字节）
        used:
          type: integer
          description: 已用容量（字节）
        available:
          type: integer
          description: 可用容量（字节）
        usage_percent:
          type: number
          description: 使用百分比
        status:
          type: string
          enum: [healthy, degraded, error]

    Subvolume:
      type: object
      properties:
        name:
          type: string
          example: "@home"
        volume:
          type: string
          example: "data"
        path:
          type: string
          example: "/mnt/data/home"
        size:
          type: integer
        snapshot_count:
          type: integer

    Snapshot:
      type: object
      properties:
        name:
          type: string
          example: "daily-20260314"
        subvolume:
          type: string
        created_at:
          type: string
          format: date-time
        size:
          type: integer
        type:
          type: string
          enum: [manual, scheduled]
        status:
          type: string
          enum: [pending, completed, failed]

    CreateSnapshotRequest:
      type: object
      required:
        - subvolume
        - name
      properties:
        subvolume:
          type: string
          description: 子卷名称
        name:
          type: string
          description: 快照名称
        readonly:
          type: boolean
          default: true

    # 用户相关
    User:
      type: object
      properties:
        username:
          type: string
          example: "zhangsan"
        email:
          type: string
          example: "zhangsan@example.com"
        role:
          type: string
          enum: [admin, user, guest]
        disabled:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        mfa_enabled:
          type: boolean

    CreateUserRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 32
          pattern: '^[a-zA-Z][a-zA-Z0-9_-]*$'
        password:
          type: string
          minLength: 6
        email:
          type: string
          format: email
        role:
          type: string
          enum: [admin, user, guest]
          default: user
        home_dir:
          type: string
        groups:
          type: array
          items:
            type: string

    Group:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        members:
          type: array
          items:
            type: string

    # 数据去重相关
    ScanRequest:
      type: object
      properties:
        paths:
          type: array
          items:
            type: string
          description: 要扫描的路径列表
          example: ["/data/photos", "/data/documents"]
        min_size:
          type: integer
          description: 最小文件大小（字节）
          default: 0
        method:
          type: string
          enum: [hash, name, size]
          default: hash
          description: 扫描方法
        file_type:
          type: string
          enum: [all, images, documents, media]
          default: all
        exclude_dirs:
          type: array
          items:
            type: string
          description: 排除的目录
        user:
          type: string
          description: 用户名（用于权限检查）

    ScanResult:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        data:
          type: object
          properties:
            scanned:
              type: integer
              description: 已扫描文件数
            duplicates:
              type: integer
              description: 发现的重复文件数
            groups:
              type: integer
              description: 重复文件组数
            releasable:
              type: integer
              description: 可释放空间（字节）
            duration_ms:
              type: integer

    DuplicateGroup:
      type: object
      properties:
        hash:
          type: string
          description: 文件哈希值
        size:
          type: integer
          description: 文件大小
        files:
          type: array
          items:
            type: object
            properties:
              path:
                type: string
              name:
                type: string
              size:
                type: integer
              modified:
                type: string
                format: date-time

    DeduplicateRequest:
      type: object
      required:
        - checksum
        - keepPath
      properties:
        checksum:
          type: string
          description: 重复文件组的校验和
        keepPath:
          type: string
          description: 要保留的文件路径
        mode:
          type: string
          enum: [file, chunk, hybrid]
          default: file
        action:
          type: string
          enum: [report, softlink, hardlink]
          default: hardlink
        user:
          type: string
        crossUser:
          type: boolean
          default: false

    DeduplicateAllRequest:
      type: object
      properties:
        mode:
          type: string
          enum: [file, chunk, hybrid]
        action:
          type: string
          enum: [softlink, hardlink]
        dryRun:
          type: boolean
          default: false
          description: 是否只预览不执行
        crossUser:
          type: boolean
          default: false

    DeduplicateResult:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        data:
          type: object
          properties:
            processed:
              type: integer
            released:
              type: integer
              description: 释放的空间（字节）
            errors:
              type: array
              items:
                type: string

    BatchDedupResult:
      type: object
      properties:
        code:
          type: integer
        data:
          type: object
          properties:
            total_groups:
              type: integer
            processed_groups:
              type: integer
            total_files:
              type: integer
            released:
              type: integer
            dry_run:
              type: boolean
            details:
              type: array
              items:
                type: object

    DedupStats:
      type: object
      properties:
        scanned:
          type: integer
        duplicates:
          type: integer
        groups:
          type: integer
        releasable:
          type: integer
        released:
          type: integer
        chunks_stored:
          type: integer
        chunk_data_size:
          type: integer
        shared_chunks:
          type: integer
        shared_data_size:
          type: integer

    DedupConfig:
      type: object
      properties:
        enabled:
          type: boolean
        auto_scan:
          type: boolean
        scan_schedule:
          type: string
          description: cron 表达式
        min_file_size:
          type: integer
        scan_method:
          type: string
        exclude_dirs:
          type: array
          items:
            type: string
        default_action:
          type: string

    DedupReport:
      type: object
      properties:
        total_files:
          type: integer
        total_size:
          type: integer
        duplicate_files:
          type: integer
        duplicate_size:
          type: integer
        potential_savings:
          type: integer
        user_reports:
          type: array
          items:
            type: object
            properties:
              user:
                type: string
              files:
                type: integer
              duplicates:
                type: integer
              savings:
                type: integer

    # 健康监控相关
    SystemHealth:
      type: object
      properties:
        status:
          type: string
          enum: [healthy, degraded, unhealthy]
        score:
          type: integer
          minimum: 0
          maximum: 100
          description: 健康评分 0-100
        checks:
          type: array
          items:
            $ref: '#/components/schemas/HealthCheckResult'
        issues:
          type: array
          items:
            type: string
        uptime_seconds:
          type: integer
        last_checked:
          type: string
          format: date-time
        version:
          type: string

    HealthCheckResult:
      type: object
      properties:
        name:
          type: string
          enum: [cpu, memory, disk, disk_io, network, services, uptime]
        status:
          type: string
          enum: [healthy, degraded, unhealthy]
        message:
          type: string
        details:
          type: object
        duration_ms:
          type: integer
        timestamp:
          type: string
          format: date-time

    HealthThresholds:
      type: object
      properties:
        cpu_warning_percent:
          type: number
          default: 80
        cpu_critical_percent:
          type: number
          default: 95
        memory_warning_percent:
          type: number
          default: 85
        memory_critical_percent:
          type: number
          default: 95
        disk_warning_percent:
          type: number
          default: 85
        disk_critical_percent:
          type: number
          default: 95
        disk_latency_ms:
          type: number
          default: 50

    # 日志管理相关
    LoggingConfig:
      type: object
      properties:
        level:
          type: string
          enum: [debug, info, warn, error, fatal]
          default: info
        format:
          type: string
          enum: [json, text]
          default: json
        output:
          type: string
          description: 输出路径
        include_source:
          type: boolean
          default: true
        timestamp_format:
          type: string

    LogEntry:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        level:
          type: string
          enum: [DEBUG, INFO, WARN, ERROR, FATAL]
        message:
          type: string
        source:
          type: string
        fields:
          type: object
          additionalProperties: true
        request_id:
          type: string

    LogRotationConfig:
      type: object
      properties:
        enabled:
          type: boolean
          default: true
        max_size_mb:
          type: integer
          default: 100
          description: 单个日志文件最大大小（MB）
        max_backups:
          type: integer
          default: 10
          description: 最大备份文件数
        max_age_days:
          type: integer
          default: 30
          description: 日志保留天数
        compress:
          type: boolean
          default: true
          description: 是否压缩旧日志

    # 安全管理相关
    SecurityDashboard:
      type: object
      properties:
        security_score:
          type: integer
          minimum: 0
          maximum: 100
        encrypted_dirs:
          type: integer
        pending_alerts:
          type: integer
        mfa_coverage:
          type: number
          description: MFA 启用百分比
        today_audit_events:
          type: integer
        issues:
          type: array
          items:
            type: string
        recent_alerts:
          type: array
          items:
            $ref: '#/components/schemas/SecurityAlert'
        recommendations:
          type: array
          items:
            type: object
            properties:
              title:
                type: string
              description:
                type: string
              action:
                type: string

    EncryptedDirectory:
      type: object
      properties:
        name:
          type: string
        path:
          type: string
        status:
          type: string
          enum: [locked, unlocked]
        size:
          type: integer
        algorithm:
          type: string
          default: "AES-256-GCM"
        created_at:
          type: string
          format: date-time
        last_accessed:
          type: string
          format: date-time
        description:
          type: string

    CreateEncryptedDirRequest:
      type: object
      required:
        - path
        - password
      properties:
        path:
          type: string
          description: 目录路径
        password:
          type: string
          description: 加密密码
        name:
          type: string
          description: 显示名称
        description:
          type: string

    AuditLogEntry:
      type: object
      properties:
        id:
          type: string
        timestamp:
          type: string
          format: date-time
        level:
          type: string
          enum: [info, warning, error, critical]
        category:
          type: string
          enum: [auth, encryption, firewall, system, file]
        event:
          type: string
        message:
          type: string
        username:
          type: string
        ip:
          type: string
        user_agent:
          type: string
        status:
          type: string
          enum: [success, failure]
        details:
          type: object
          additionalProperties: true

    SecurityAlert:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
        severity:
          type: string
          enum: [low, medium, high, critical]
        category:
          type: string
        timestamp:
          type: string
          format: date-time
        source_ip:
          type: string
        acknowledged:
          type: boolean
        acknowledged_by:
          type: string
        acknowledged_at:
          type: string
          format: date-time

    # iSCSI 目标管理
    IscsiTarget:
      type: object
      properties:
        iqn:
          type: string
          description: iSCSI Qualified Name
        luns:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
              size:
                type: integer
              path:
                type: string
        size:
          type: integer
          description: 总容量（字节）
        active:
          type: boolean
        sessions:
          type: integer
          description: 活动会话数
        created_at:
          type: string
          format: date-time

    IscsiTargetCreate:
      type: object
      required:
        - name
        - path
        - sizeGB
      properties:
        name:
          type: string
          description: 目标名称
        path:
          type: string
          description: 存储路径
        sizeGB:
          type: integer
          description: 容量（GB）
        allowedInitiators:
          type: string
          description: 允许的发起程序（默认 ALL）

    # 在线文档
    OfficeConfig:
      type: object
      properties:
        url:
          type: string
          description: OnlyOffice 服务地址
        jwtSecret:
          type: string
          description: JWT 密钥
        storagePath:
          type: string
          description: 文档存储路径

    OfficeDocument:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        type:
          type: string
          enum: [docx, xlsx, pptx]
        size:
          type: integer
        modifiedAt:
          type: string
          format: date-time
        owner:
          type: string
        shared:
          type: boolean

    # 通知管理
    Notification:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        message:
          type: string
        type:
          type: string
          enum: [info, warning, error, success]
        category:
          type: string
          enum: [system, alert, user]
        read:
          type: boolean
        timestamp:
          type: string
          format: date-time
        metadata:
          type: object
          additionalProperties: true

    NotifyChannel:
      type: object
      properties:
        type:
          type: string
          enum: [email, wechat, telegram, webhook]
        enabled:
          type: boolean
        config:
          type: object
          additionalProperties: true

    # 性能优化
    OptimizerAnalysis:
      type: object
      properties:
        score:
          type: integer
          minimum: 0
          maximum: 100
        cpu:
          type: object
          properties:
            usage:
              type: number
            temperature:
              type: number
        memory:
          type: object
          properties:
            usage:
              type: number
            available:
              type: integer
            cached:
              type: integer
        disk:
          type: object
          properties:
            usage:
              type: number
            io:
              type: integer
            latency:
              type: number
        cache:
          type: object
          properties:
            hitRate:
              type: number
        network:
          type: object
          properties:
            throughput:
              type: integer
        recommendations:
          type: array
          items:
            $ref: '#/components/schemas/OptimizationRecommendation'
        tasks:
          type: array
          items:
            $ref: '#/components/schemas/OptimizationTask'

    OptimizationRecommendation:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
        priority:
          type: string
          enum: [high, medium, low]
        category:
          type: string
        impact:
          type: string
        autoFix:
          type: boolean

    OptimizationTask:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        status:
          type: string
          enum: [pending, running, completed, failed]
        progress:
          type: number
        completedAt:
          type: string
          format: date-time

    AutoExpandPolicy:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        target_type:
          type: string
          enum: [user, group, directory]
        target_id:
          type: string
        enabled:
          type: boolean
        trigger_threshold:
          type: number
          description: 触发扩展的使用率阈值（百分比）
        expand_by:
          type: integer
          description: 每次扩展的字节数
        max_limit:
          type: integer
          description: 最大配额限制
        cooldown_minutes:
          type: integer
          description: 扩展冷却时间（分钟）
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    # 错误响应
    ErrorResponse:
      type: object
      properties:
        code:
          type: integer
          example: 400
        message:
          type: string
          example: "请求参数错误"
        details:
          type: object
          description: 详细错误信息

  responses:
    Success:
      description: 操作成功
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/GenericResponse'
          example:
            code: 0
            message: "success"

    BadRequest:
      description: 请求参数错误
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: 400
            message: "请求参数错误"

    Unauthorized:
      description: 未认证或认证失败
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: 401
            message: "未授权访问"

    Forbidden:
      description: 权限不足
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: 403
            message: "权限不足"

    NotFound:
      description: 资源不存在
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: 404
            message: "资源不存在"

    InternalError:
      description: 服务器内部错误
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: 500
            message: "服务器内部错误"

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT 认证令牌

security:
  - BearerAuth: []

paths:
  # ==================== iSCSI 目标管理 API ====================
  /iscsi/targets:
    get:
      tags: [iscsi]
      summary: 获取 iSCSI 目标列表
      operationId: listIscsiTargets
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 0
                  data:
                    type: object
                    properties:
                      targets:
                        type: array
                        items:
                          $ref: '#/components/schemas/IscsiTarget'
    post:
      tags: [iscsi]
      summary: 创建 iSCSI 目标
      operationId: createIscsiTarget
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IscsiTargetCreate'
      responses:
        '200':
          $ref: '#/components/responses/Success'

  /iscsi/targets/{iqn}:
    get:
      tags: [iscsi]
      summary: 获取目标详情
      operationId: getIscsiTarget
      parameters:
        - name: iqn
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 成功
    delete:
      tags: [iscsi]
      summary: 删除 iSCSI 目标
      operationId: deleteIscsiTarget
      parameters:
        - name: iqn
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          $ref: '#/components/responses/Success'

  /iscsi/portal:
    get:
      tags: [iscsi]
      summary: 获取 Portal 信息
      operationId: getIscsiPortal
      responses:
        '200':
          description: 成功

  # ==================== 在线文档 API ====================
  /office/documents:
    get:
      tags: [office]
      summary: 获取文档列表
      operationId: listOfficeDocuments
      responses:
        '200':
          description: 成功
    post:
      tags: [office]
      summary: 创建文档
      operationId: createOfficeDocument
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                type:
                  type: string
                  enum: [docx, xlsx, pptx]
      responses:
        '200':
          $ref: '#/components/responses/Success'

  /office/documents/{id}:
    get:
      tags: [office]
      summary: 获取文档详情
      operationId: getOfficeDocument
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 成功
    delete:
      tags: [office]
      summary: 删除文档
      operationId: deleteOfficeDocument
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          $ref: '#/components/responses/Success'

  /office/editor/{id}:
    get:
      tags: [office]
      summary: 打开编辑器
      operationId: openOfficeEditor
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
      responses:
        '200':
          description: 编辑器页面

  /office/status:
    get:
      tags: [office]
      summary: 获取服务状态
      operationId: getOfficeStatus
      responses:
        '200':
          description: 成功

  /office/config:
    get:
      tags: [office]
      summary: 获取配置
      operationId: getOfficeConfig
      responses:
        '200':
          description: 成功
    put:
      tags: [office]
      summary: 更新配置
      operationId: updateOfficeConfig
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OfficeConfig'
      responses:
        '200':
          $ref: '#/components/responses/Success'

  # ==================== 通知中心 API ====================
  /notify/list:
    get:
      tags: [notify]
      summary: 获取通知列表
      operationId: listNotifications
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [all, info, warning, error, success]
        - name: unread
          in: query
          schema:
            type: boolean
      responses:
        '200':
          description: 成功

  /notify/{id}:
    get:
      tags: [notify]
      summary: 获取通知详情
      operationId: getNotification
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 成功

  /notify/{id}/read:
    post:
      tags: [notify]
      summary: 标记已读
      operationId: markNotificationRead
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          $ref: '#/components/responses/Success'

  /notify/read-all:
    post:
      tags: [notify]
      summary: 全部标记已读
      operationId: markAllNotificationsRead
      responses:
        '200':
          $ref: '#/components/responses/Success'

  /notify/channels:
    get:
      tags: [notify]
      summary: 获取通知渠道
      operationId: listNotifyChannels
      responses:
        '200':
          description: 成功

  /notify/channels/{type}:
    put:
      tags: [notify]
      summary: 更新渠道配置
      operationId: updateNotifyChannel
      parameters:
        - name: type
          in: path
          required: true
          schema:
            type: string
            enum: [email, wechat, telegram, webhook]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                enabled:
                  type: boolean
                config:
                  type: object
      responses:
        '200':
          $ref: '#/components/responses/Success'

  # ==================== 性能优化 API ====================
  /optimizer/analysis:
    get:
      tags: [optimizer]
      summary: 获取性能分析结果
      operationId: getOptimizerAnalysis
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OptimizerAnalysis'

  /optimizer/analyze:
    post:
      tags: [optimizer]
      summary: 执行性能分析
      operationId: runOptimizerAnalysis
      responses:
        '200':
          $ref: '#/components/responses/Success'

  /optimizer/trends:
    get:
      tags: [optimizer]
      summary: 获取性能趋势
      operationId: getOptimizerTrends
      parameters:
        - name: range
          in: query
          schema:
            type: string
            enum: [1h, 24h, 7d]
            default: 24h
      responses:
        '200':
          description: 成功

  /optimizer/recommendations:
    get:
      tags: [optimizer]
      summary: 获取优化建议
      operationId: getOptimizerRecommendations
      responses:
        '200':
          description: 成功

  /optimizer/apply/{id}:
    post:
      tags: [optimizer]
      summary: 应用单个优化
      operationId: applyOptimization
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          $ref: '#/components/responses/Success'

  /optimizer/apply-all:
    post:
      tags: [optimizer]
      summary: 应用所有优化
      operationId: applyAllOptimizations
      responses:
        '200':
          $ref: '#/components/responses/Success'

  # ==================== 媒体服务 API ====================
  /media/stream/{id}:
    get:
      tags: [media]
      summary: 获取媒体流
      description: 获取视频/音频的流媒体地址，支持 HLS/DASH
      operationId: getMediaStream
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: quality
          in: query
          schema:
            type: string
            enum: [original, 1080p, 720p, 480p]
            default: original
      responses:
        '200':
          description: 流媒体信息
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  data:
                    type: object
                    properties:
                      stream_url:
                        type: string
                      format:
                        type: string
                      duration:
                        type: integer

  /media/transcode:
    post:
      tags: [media]
      summary: 创建转码任务
      description: 创建视频转码任务
      operationId: createTranscodeTask
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                source_path:
                  type: string
                target_format:
                  type: string
                quality:
                  type: string
                output_path:
                  type: string
      responses:
        '200':
          description: 转码任务已创建
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  data:
                    type: object
                    properties:
                      task_id:
                        type: string
                      status:
                        type: string

  /media/transcode/{taskId}:
    get:
      tags: [media]
      summary: 获取转码任务状态
      operationId: getTranscodeStatus
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 转码任务状态
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  data:
                    type: object
                    properties:
                      task_id:
                        type: string
                      status:
                        type: string
                        enum: [pending, processing, completed, failed]
                      progress:
                        type: number
                      output_path:
                        type: string

  /media/thumbnail/{id}:
    get:
      tags: [media]
      summary: 获取媒体缩略图
      operationId: getMediaThumbnail
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: time
          in: query
          description: 视频时间点（秒）
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: string
            enum: [small, medium, large]
            default: medium
      responses:
        '200':
          description: 缩略图
          content:
            image/jpeg:
              schema:
                type: string
                format: binary

  /media/subtitles/{id}:
    get:
      tags: [media]
      summary: 获取字幕列表
      operationId: getMediaSubtitles
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 字幕列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        language:
                          type: string
                        format:
                          type: string
                        path:
                          type: string

  /media/subtitles/{id}/upload:
    post:
      tags: [media]
      summary: 上传字幕文件
      operationId: uploadSubtitle
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                language:
                  type: string
      responses:
        '200':
          $ref: '#/components/responses/Success'

  # ==================== 配额自动扩展 API ====================
  /quota/auto-expand:
    get:
      tags: [quota]
      summary: 获取自动扩展策略列表
      operationId: getAutoExpandPolicies
      responses:
        '200':
          description: 自动扩展策略列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/AutoExpandPolicy'

    post:
      tags: [quota]
      summary: 创建自动扩展策略
      operationId: createAutoExpandPolicy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AutoExpandPolicy'
      responses:
        '200':
          $ref: '#/components/responses/Success'

  /quota/auto-expand/{id}:
    get:
      tags: [quota]
      summary: 获取自动扩展策略详情
      operationId: getAutoExpandPolicy
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 策略详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AutoExpandPolicy'

    put:
      tags: [quota]
      summary: 更新自动扩展策略
      operationId: updateAutoExpandPolicy
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AutoExpandPolicy'
      responses:
        '200':
          $ref: '#/components/responses/Success'

    delete:
      tags: [quota]
      summary: 删除自动扩展策略
      operationId: deleteAutoExpandPolicy
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          $ref: '#/components/responses/Success'

  /quota/auto-expand/{id}/history:
    get:
      tags: [quota]
      summary: 获取自动扩展历史
      operationId: getAutoExpandHistory
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: 扩展历史
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        timestamp:
                          type: string
                          format: date-time
                        old_limit:
                          type: integer
                        new_limit:
                          type: integer
                        reason:
                          type: string
  # ==================== AI 分类 API ====================
  /ai/classify:
    post:
      tags: [ai]
      summary: AI 文件分类
      description: 使用 AI 对文件进行智能分类
      operationId: classifyFile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                path:
                  type: string
                  description: 文件路径
      responses:
        '200':
          description: 分类结果
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  data:
                    type: object
                    properties:
                      category:
                        type: string
                      confidence:
                        type: number
                      tags:
                        type: array
                        items:
                          type: string

  /ai/classify/batch:
    post:
      tags: [ai]
      summary: 批量分类
      description: 批量对文件进行 AI 分类
      operationId: classifyBatch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                paths:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: 批量分类结果

  /ai/classify/result/{id}:
    get:
      tags: [ai]
      summary: 获取分类结果
      operationId: getClassifyResult
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 分类结果详情

  # ==================== 备份管理 API ====================
  /backup/configs:
    get:
      tags: [backup]
      summary: 获取备份配置列表
      operationId: listBackupConfigs
