        in: query
        name: level
        type: string
      - description: 搜索关键词
        in: query
        name: keyword
        type: string
      - description: 日志来源
        in: query
        name: source
        type: string
      - description: 请求 ID
        in: query
        name: request_id
        type: string
      - description: 开始时间 (RFC3339)
        in: query
        name: start_time
        type: string
      - description: 结束时间 (RFC3339)
        in: query
        name: end_time
        type: string
      - default: 100
        description: 结果限制
        in: query
        name: limit
        type: integer
      - default: 0
        description: 偏移量
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_logging.Response'
      summary: 搜索日志
