<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- 渐变 -->
    <linearGradient id="primaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563EB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1D4ED8;stop-opacity:1" />
    </linearGradient>
    
    <!-- 阴影 -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- 背景圆角矩形 -->
  <rect x="20" y="20" width="160" height="160" rx="24" fill="url(#primaryGradient)" filter="url(#shadow)"/>
  
  <!-- 存储方块图标 -->
  <g transform="translate(100, 100)">
    <!-- 底层方块 -->
    <rect x="-32" y="-20" width="64" height="40" rx="6" fill="white" fill-opacity="0.95"/>
    
    <!-- 中层方块 -->
    <rect x="-32" y="-8" width="64" height="40" rx="6" fill="white" fill-opacity="0.9"/>
    
    <!-- 顶层方块 -->
    <rect x="-32" y="4" width="64" height="40" rx="6" fill="white" filter="url(#shadow)"/>
    
    <!-- 数据流线条 -->
    <circle cx="-16" cy="24" r="3" fill="#2563EB"/>
    <circle cx="0" cy="24" r="3" fill="#2563EB"/>
    <circle cx="16" cy="24" r="3" fill="#2563EB"/>
  </g>
  
  <!-- 云装饰 (右上角) -->
  <g transform="translate(140, 45)">
    <circle cx="0" cy="0" r="8" fill="white" fill-opacity="0.3"/>
    <circle cx="10" cy="2" r="6" fill="white" fill-opacity="0.3"/>
    <circle cx="-8" cy="2" r="6" fill="white" fill-opacity="0.3"/>
  </g>
</svg>
