# NAS-OS 备份调度器配置
# Ofelia 配置文件格式
# 
# v2.50.0 工部开发
#
# 时间格式: 秒 分 时 日 月 星期
# 示例:
#   0 0 2 * * *     - 每天凌晨 2:00
#   0 0 3 * * 0     - 每周日凌晨 3:00
#   0 0 4 1 * *     - 每月 1 日凌晨 4:00

[job-exec "nas-daily-backup"]
# 每天凌晨 2:00 执行完整备份
schedule = 0 0 2 * * *
container = backup-executor
command = /bin/bash /usr/local/bin/scripts/backup.sh -t full
no-overlap = true

[job-exec "nas-incremental-backup"]
# 每 6 小时执行增量备份
schedule = 0 0 */6 * * *
container = backup-executor
command = /bin/bash /usr/local/bin/scripts/backup.sh -t incremental
no-overlap = true

[job-exec "nas-weekly-cleanup"]
# 每周日凌晨 4:00 清理旧备份
schedule = 0 0 4 * * 0
container = backup-executor
command = /bin/bash /usr/local/bin/scripts/backup-cleanup.sh --force
no-overlap = true

# ========== 可选配置 ==========
# 如需自定义调度，取消注释并修改

