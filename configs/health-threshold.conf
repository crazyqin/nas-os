# =============================================================================
# NAS-OS 健康检查阈值配置
# =============================================================================
# 放置在 /etc/nas-os/health-threshold.conf
# =============================================================================

# 磁盘阈值（百分比）
DISK_THRESHOLD_WARNING=70
DISK_THRESHOLD_CRITICAL=85

# 内存阈值（百分比）
MEMORY_THRESHOLD_WARNING=75
MEMORY_THRESHOLD_CRITICAL=90

# CPU 阈值（百分比）
CPU_THRESHOLD_WARNING=80
CPU_THRESHOLD_CRITICAL=95

# API 响应超时（毫秒）
API_TIMEOUT_MS=3000

# 日志检查行数
LOG_CHECK_LINES=200

# 最大错误数（超过则告警）
MAX_ERROR_COUNT=10

# 最大警告数（超过则告警）
MAX_WARNING_COUNT=50