apiVersion: v1
kind: Service
metadata:
  name: {{ include "nas-os.fullname" . }}
  labels:
    {{- include "nas-os.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
      {{- if and (eq .Values.service.type "NodePort") .Values.service.nodePort }}
      nodePort: {{ .Values.service.nodePort }}
      {{- end }}
    - port: 445
      targetPort: smb
      protocol: TCP
      name: smb
    - port: 139
      targetPort: smb-netbios
      protocol: TCP
      name: smb-netbios
    - port: 2049
      targetPort: nfs
      protocol: TCP
      name: nfs
  selector:
    {{- include "nas-os.selectorLabels" . | nindent 4 }}