<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日志管理 - NAS-OS</title>
    <link rel="icon" type="image/png" sizes="32x32" href="../brand/logo/logo-32.png">
    <link rel="stylesheet" href="../css/design-system.css">
    <style>
        .logs-container { max-width: 1600px; margin: 0 auto; }
        
        .logs-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }
        
        .logs-toolbar {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
            padding: 1rem;
            background: var(--surface-color);
            border-radius: 12px;
            border: 1px solid var(--surface-border);
        }
        
        .filter-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .filter-label {
            font-size: 13px;
            color: var(--text-muted);
            white-space: nowrap;
        }
        
        .filter-select, .filter-input {
            padding: 0.5rem 0.75rem;
            border: 1px solid var(--surface-border);
            border-radius: 8px;
            font-size: 13px;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-width: 120px;
        }
        
        .filter-input {
            min-width: 200px;
        }
        
        .filter-select:focus, .filter-input:focus {
            outline: none;
            border-color: var(--color-primary);
        }
        
        .logs-layout {
            display: grid;
            grid-template-columns: 240px 1fr;
            gap: 1.5rem;
        }
        
        .logs-sidebar {
            background: var(--surface-color);
            border-radius: 12px;
            padding: 1rem;
            border: 1px solid var(--surface-border);
            height: fit-content;
            position: sticky;
            top: 1rem;
        }
        
        .sidebar-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.75rem;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid var(--surface-border);
        }
        
        .log-type-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        
        .log-type-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.625rem 0.75rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 13px;
            color: var(--text-secondary);
        }
        
        .log-type-item:hover {
            background: var(--bg-tertiary);
        }
        
        .log-type-item.active {
            background: var(--color-primary-light);
            color: var(--color-primary);
        }
        
        .log-type-count {
            font-size: 11px;
            padding: 0.125rem 0.5rem;
            border-radius: 999px;
            background: var(--bg-tertiary);
            color: var(--text-muted);
        }
        
        .log-type-item.active .log-type-count {
            background: var(--color-primary);
            color: white;
        }
        
        .logs-main {
            background: var(--surface-color);
            border-radius: 12px;
            border: 1px solid var(--surface-border);
            overflow: hidden;
        }
        
        .logs-stats {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 1px;
            background: var(--surface-border);
            border-bottom: 1px solid var(--surface-border);
        }
        
        .log-stat {
            background: var(--surface-color);
            padding: 1rem;
            text-align: center;
        }
        
        .log-stat-value {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 0.25rem;
        }
        
        .log-stat-label {
            font-size: 12px;
            color: var(--text-muted);
        }
        
        .log-stat.debug .log-stat-value { color: #6B7280; }
        .log-stat.info .log-stat-value { color: #3B82F6; }
        .log-stat.warn .log-stat-value { color: #F59E0B; }
        .log-stat.error .log-stat-value { color: #EF4444; }
        .log-stat.fatal .log-stat-value { color: #DC2626; }
        
        .logs-table-container {
            max-height: 600px;
            overflow-y: auto;
        }
        
        .logs-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .logs-table th {
            position: sticky;
            top: 0;
            background: var(--bg-tertiary);
            padding: 0.75rem 1rem;
            text-align: left;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid var(--surface-border);
            z-index: 1;
        }
        
        .logs-table td {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--surface-border);
            font-size: 13px;
            vertical-align: top;
        }
        
        .logs-table tr:hover td {
            background: var(--bg-tertiary);
        }
        
        .log-timestamp {
            white-space: nowrap;
            font-family: var(--font-family-mono);
            font-size: 12px;
            color: var(--text-muted);
        }
        
        .log-level {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.125rem 0.5rem;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            min-width: 50px;
        }
        
        .log-level.debug { background: #F3F4F6; color: #6B7280; }
        .log-level.info { background: #DBEAFE; color: #1D4ED8; }
        .log-level.warn { background: #FEF3C7; color: #92400E; }
        .log-level.error { background: #FEE2E2; color: #991B1B; }
        .log-level.fatal { background: #FEE2E2; color: #991B1B; }
        
        .log-source {
            font-size: 12px;
            color: var(--color-primary);
            background: var(--color-primary-light);
            padding: 0.125rem 0.5rem;
            border-radius: 4px;
        }
        
        .log-message {
            color: var(--text-primary);
            word-break: break-word;
        }
        
        .log-message.expanded {
            font-family: var(--font-family-mono);
            font-size: 12px;
            white-space: pre-wrap;
            background: var(--bg-tertiary);
            padding: 0.75rem;
            border-radius: 6px;
            margin-top: 0.5rem;
        }
        
        .log-details-btn {
            padding: 0.25rem 0.5rem;
            font-size: 11px;
            background: var(--bg-tertiary);
            border: 1px solid var(--surface-border);
            border-radius: 4px;
            cursor: pointer;
            color: var(--text-muted);
        }
        
        .log-details-btn:hover {
            background: var(--surface-border);
        }
        
        .log-fields {
            margin-top: 0.5rem;
            padding: 0.5rem;
            background: var(--bg-tertiary);
            border-radius: 6px;
            font-size: 11px;
            font-family: var(--font-family-mono);
        }
        
        .log-field {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 0.25rem;
        }
        
        .log-field:last-child { margin-bottom: 0; }
        
        .log-field-key {
            color: var(--color-primary);
            font-weight: 500;
        }
        
        .log-field-value {
            color: var(--text-secondary);
        }
        
        .logs-pagination {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem;
            border-top: 1px solid var(--surface-border);
        }
        
        .pagination-info {
            font-size: 13px;
            color: var(--text-muted);
        }
        
        .pagination-controls {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .pagination-btn {
            padding: 0.5rem 0.75rem;
            border: 1px solid var(--surface-border);
            border-radius: 6px;
            background: var(--surface-color);
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }
        
        .pagination-btn:hover:not(:disabled) {
            background: var(--bg-tertiary);
        }
        
        .pagination-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .pagination-btn.active {
            background: var(--color-primary);
            color: white;
            border-color: var(--color-primary);
        }
        
        .logs-actions {
            display: flex;
            gap: 0.5rem;
        }
        
        .live-indicator {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: var(--color-success-bg);
            color: #065F46;
            border-radius: 999px;
            font-size: 13px;
        }
        
        .live-dot {
            width: 8px;
            height: 8px;
            background: #10B981;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }
        
        .empty-logs {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-muted);
        }
        
        .empty-logs svg {
            width: 64px;
            height: 64px;
            margin-bottom: 1rem;
            opacity: 0.5;
        }
        
        /* 日志详情模态框 */
        .log-detail-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 1rem;
        }
        
        .log-detail-content {
            background: var(--surface-color);
            border-radius: 12px;
            width: 100%;
            max-width: 800px;
            max-height: 80vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        
        .log-detail-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--surface-border);
        }
        
        .log-detail-body {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
        }
        
        .log-detail-section {
            margin-bottom: 1.5rem;
        }
        
        .log-detail-section-title {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.75rem;
        }
        
        .log-detail-row {
            display: flex;
            padding: 0.5rem 0;
            border-bottom: 1px solid var(--surface-border);
        }
        
        .log-detail-label {
            width: 120px;
            color: var(--text-muted);
            font-size: 13px;
        }
        
        .log-detail-value {
            flex: 1;
            font-size: 13px;
            color: var(--text-primary);
            word-break: break-word;
        }
        
        @media (max-width: 1024px) {
            .logs-layout {
                grid-template-columns: 1fr;
            }
            
            .logs-sidebar {
                position: static;
            }
            
            .logs-stats {
                grid-template-columns: repeat(3, 1fr);
            }
        }
        
        @media (max-width: 768px) {
            .logs-stats {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .logs-toolbar {
                flex-direction: column;
                align-items: stretch;
            }
            
            .filter-group {
                width: 100%;
            }
            
            .filter-select, .filter-input {
                flex: 1;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <div class="header-brand">
                <img src="../brand/logo/logo-64.png" alt="Logo" width="40" height="40">
                <h1>NAS-OS</h1>
            </div>
            <nav class="header-nav">
                <a href="../index.html">仪表盘</a>
                <a href="storage.html">存储管理</a>
                <a href="users.html">用户管理</a>
                <a href="settings.html">设置</a>
            </nav>
        </div>
    </header>

    <main class="main">
        <div class="container logs-container">
            <div class="logs-header">
                <div>
                    <h1>📋 日志管理</h1>
                    <p class="text-muted">查看系统日志、审计日志和应用日志</p>
                </div>
                <div class="logs-actions">
                    <div class="live-indicator" id="live-indicator" style="display: none;">
                        <span class="live-dot"></span>
                        实时更新中
                    </div>
                    <button class="btn btn-secondary" onclick="toggleLive()">
                        🔄 实时模式
                    </button>
                    <button class="btn btn-secondary" onclick="exportLogs()">
                        📥 导出日志
                    </button>
                    <button class="btn btn-secondary" onclick="showRotationSettings()">
                        ⚙️ 轮转设置
                    </button>
                </div>
            </div>

            <!-- 工具栏 -->
            <div class="logs-toolbar">
                <div class="filter-group">
                    <span class="filter-label">时间范围:</span>
                    <select class="filter-select" id="time-range" onchange="loadLogs()">
                        <option value="1h">最近 1 小时</option>
                        <option value="6h">最近 6 小时</option>
                        <option value="24h" selected>最近 24 小时</option>
                        <option value="7d">最近 7 天</option>
                        <option value="30d">最近 30 天</option>
                        <option value="custom">自定义</option>
                    </select>
                </div>
                <div class="filter-group">
                    <span class="filter-label">日志级别:</span>
                    <select class="filter-select" id="level-filter" onchange="loadLogs()">
                        <option value="">全部</option>
                        <option value="debug">Debug</option>
                        <option value="info">Info</option>
                        <option value="warn">Warn</option>
                        <option value="error">Error</option>
                        <option value="fatal">Fatal</option>
                    </select>
                </div>
                <div class="filter-group">
                    <span class="filter-label">日志来源:</span>
                    <select class="filter-select" id="source-filter" onchange="loadLogs()">
                        <option value="">全部</option>
                        <option value="system">系统</option>
                        <option value="storage">存储</option>
                        <option value="network">网络</option>
                        <option value="security">安全</option>
                        <option value="user">用户</option>
                        <option value="app">应用</option>
                    </select>
                </div>
                <div class="filter-group" style="flex: 1;">
                    <input type="text" class="filter-input" id="search-input" placeholder="搜索日志内容..." oninput="debounceSearch()">
                </div>
                <button class="btn btn-primary" onclick="loadLogs()">
                    🔍 搜索
                </button>
            </div>

            <div class="logs-layout">
                <!-- 侧边栏 -->
                <div class="logs-sidebar">
                    <div class="sidebar-title">日志类型</div>
                    <ul class="log-type-list">
                        <li class="log-type-item active" onclick="selectLogType('all')">
                            <span>📋 全部日志</span>
                            <span class="log-type-count" id="count-all">0</span>
                        </li>
                        <li class="log-type-item" onclick="selectLogType('system')">
                            <span>💻 系统日志</span>
                            <span class="log-type-count" id="count-system">0</span>
                        </li>
                        <li class="log-type-item" onclick="selectLogType('storage')">
                            <span>💾 存储日志</span>
                            <span class="log-type-count" id="count-storage">0</span>
                        </li>
                        <li class="log-type-item" onclick="selectLogType('network')">
                            <span>🌐 网络日志</span>
                            <span class="log-type-count" id="count-network">0</span>
                        </li>
                        <li class="log-type-item" onclick="selectLogType('security')">
                            <span>🔒 安全日志</span>
                            <span class="log-type-count" id="count-security">0</span>
                        </li>
                        <li class="log-type-item" onclick="selectLogType('audit')">
                            <span>📝 审计日志</span>
                            <span class="log-type-count" id="count-audit">0</span>
                        </li>
                        <li class="log-type-item" onclick="selectLogType('app')">
                            <span>📦 应用日志</span>
                            <span class="log-type-count" id="count-app">0</span>
                        </li>
                    </ul>
                    
                    <div class="sidebar-title" style="margin-top: 1.5rem;">快速筛选</div>
                    <ul class="log-type-list">
                        <li class="log-type-item" onclick="filterErrors()">
                            <span>❌ 错误日志</span>
                        </li>
                        <li class="log-type-item" onclick="filterWarnings()">
                            <span>⚠️ 警告日志</span>
                        </li>
                        <li class="log-type-item" onclick="filterToday()">
                            <span>📅 今日日志</span>
                        </li>
                    </ul>
                </div>

                <!-- 主内容 -->
                <div class="logs-main">
                    <!-- 统计 -->
                    <div class="logs-stats">
                        <div class="log-stat debug">
                            <div class="log-stat-value" id="stat-debug">0</div>
                            <div class="log-stat-label">Debug</div>
                        </div>
                        <div class="log-stat info">
                            <div class="log-stat-value" id="stat-info">0</div>
                            <div class="log-stat-label">Info</div>
                        </div>
                        <div class="log-stat warn">
                            <div class="log-stat-value" id="stat-warn">0</div>
                            <div class="log-stat-label">Warn</div>
                        </div>
                        <div class="log-stat error">
                            <div class="log-stat-value" id="stat-error">0</div>
                            <div class="log-stat-label">Error</div>
                        </div>
                        <div class="log-stat fatal">
                            <div class="log-stat-value" id="stat-fatal">0</div>
                            <div class="log-stat-label">Fatal</div>
                        </div>
                    </div>

                    <!-- 日志列表 -->
                    <div class="logs-table-container" id="logs-container">
                        <table class="logs-table">
                            <thead>
                                <tr>
                                    <th style="width: 160px;">时间</th>
                                    <th style="width: 70px;">级别</th>
                                    <th style="width: 100px;">来源</th>
                                    <th>消息</th>
                                    <th style="width: 80px;">操作</th>
                                </tr>
                            </thead>
                            <tbody id="logs-body">
                                <tr>
                                    <td colspan="5">
                                        <div class="empty-logs">
                                            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                                            </svg>
                                            <p>加载中...</p>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <!-- 分页 -->
                    <div class="logs-pagination">
                        <div class="pagination-info">
                            显示 <span id="showing-start">0</span>-<span id="showing-end">0</span> 条，共 <span id="total-count">0</span> 条
                        </div>
                        <div class="pagination-controls">
                            <button class="pagination-btn" id="prev-btn" onclick="prevPage()" disabled>← 上一页</button>
                            <span id="page-numbers"></span>
                            <button class="pagination-btn" id="next-btn" onclick="nextPage()">下一页 →</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- 日志详情模态框 -->
    <div class="log-detail-modal" id="log-detail-modal" style="display: none;">
        <div class="log-detail-content">
            <div class="log-detail-header">
                <h3>📋 日志详情</h3>
                <button class="btn btn-secondary" onclick="closeLogDetail()">✕ 关闭</button>
            </div>
            <div class="log-detail-body" id="log-detail-body">
                <!-- 动态填充 -->
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/api/v1';
        
        let currentPage = 1;
        let pageSize = 50;
        let totalLogs = 0;
        let totalPages = 0;
        let currentType = 'all';
        let liveMode = false;
        let liveInterval = null;
        let searchTimeout = null;

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            loadLogs();
            loadLogStats();
        });

        // 加载日志
        async function loadLogs() {
            const timeRange = document.getElementById('time-range').value;
            const level = document.getElementById('level-filter').value;
            const source = document.getElementById('source-filter').value;
            const search = document.getElementById('search-input').value;

            const params = new URLSearchParams({
                page: currentPage,
                size: pageSize
            });

            if (timeRange && timeRange !== 'custom') {
                params.append('time', timeRange);
            }
            if (level) params.append('level', level);
            if (source) params.append('source', source);
            if (currentType !== 'all') params.append('category', currentType);
            if (search) params.append('search', search);

            try {
                const response = await fetch(`${API_BASE}/logging/entries?${params}`, {
                    headers: { 'Authorization': localStorage.getItem('token') }
                });
                const result = await response.json();

                if (result.code === 0) {
                    renderLogs(result.data);
                    totalLogs = result.data.total || 0;
                    totalPages = Math.ceil(totalLogs / pageSize);
                    updatePagination();
                } else {
                    showError('加载日志失败：' + result.message);
                }
            } catch (error) {
                console.error('加载日志失败:', error);
                // 使用模拟数据
                loadMockLogs();
            }
        }

        // 模拟日志数据
        function loadMockLogs() {
            const mockLogs = [];
            const levels = ['debug', 'info', 'warn', 'error'];
            const sources = ['system', 'storage', 'network', 'security', 'app'];
            const messages = [
                '系统启动完成',
                '磁盘 /dev/sda 温度警告: 52°C',
                '用户 admin 登录成功',
                '快照创建完成: data@daily-20260314',
                '网络接口 eth0 连接已建立',
                'SMB 共享 share1 已启用',
                '数据校验完成，无错误',
                '用户 zhangsan 访问文件 /data/docs/report.pdf',
                '防火墙规则更新',
                '自动备份任务已完成'
            ];

            for (let i = 0; i < 50; i++) {
                mockLogs.push({
                    timestamp: new Date(Date.now() - Math.random() * 86400000).toISOString(),
                    level: levels[Math.floor(Math.random() * levels.length)],
                    source: sources[Math.floor(Math.random() * sources.length)],
                    message: messages[Math.floor(Math.random() * messages.length)],
                    fields: {
                        request_id: `req-${Math.random().toString(36).substr(2, 9)}`,
                        user: 'admin',
                        ip: '192.168.1.100'
                    }
                });
            }

            renderLogs({ items: mockLogs, total: 150, page: currentPage, size: pageSize });
            totalLogs = 150;
            totalPages = 3;
            updatePagination();
            updateStats(mockLogs);
        }

        // 渲染日志
        function renderLogs(data) {
            const tbody = document.getElementById('logs-body');
            const logs = data.items || [];

            if (logs.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="5">
                            <div class="empty-logs">
                                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                                </svg>
                                <p>没有找到匹配的日志</p>
                            </div>
                        </td>
                    </tr>
                `;
                return;
            }

            tbody.innerHTML = logs.map((log, index) => `
                <tr onclick="toggleLogExpand(${index})" style="cursor: pointer;">
                    <td class="log-timestamp">${formatTimestamp(log.timestamp)}</td>
                    <td><span class="log-level ${log.level}">${log.level}</span></td>
                    <td><span class="log-source">${log.source || 'system'}</span></td>
                    <td>
                        <div class="log-message">${escapeHtml(log.message)}</div>
                        <div id="log-fields-${index}" style="display: none;">
                            ${log.fields ? renderFields(log.fields) : ''}
                        </div>
                    </td>
                    <td>
                        <button class="log-details-btn" onclick="event.stopPropagation(); showLogDetail(${index})">
                            详情
                        </button>
                    </td>
                </tr>
            `).join('');

            // 保存日志数据供详情查看
            window.currentLogs = logs;
        }

        // 渲染字段
        function renderFields(fields) {
            return `
                <div class="log-fields">
                    ${Object.entries(fields).map(([key, value]) => `
                        <div class="log-field">
                            <span class="log-field-key">${escapeHtml(key)}:</span>
                            <span class="log-field-value">${escapeHtml(String(value))}</span>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        // 更新统计
        function updateStats(logs) {
            const stats = { debug: 0, info: 0, warn: 0, error: 0, fatal: 0 };
            logs.forEach(log => {
                if (stats.hasOwnProperty(log.level)) {
                    stats[log.level]++;
                }
            });

            document.getElementById('stat-debug').textContent = stats.debug;
            document.getElementById('stat-info').textContent = stats.info;
            document.getElementById('stat-warn').textContent = stats.warn;
            document.getElementById('stat-error').textContent = stats.error;
            document.getElementById('stat-fatal').textContent = stats.fatal;
        }

        // 加载日志统计
        async function loadLogStats() {
            try {
                const response = await fetch(`${API_BASE}/logging/stats`, {
                    headers: { 'Authorization': localStorage.getItem('token') }
                });
                const result = await response.json();
                if (result.code === 0) {
                    // 更新侧边栏计数
                    const counts = result.data?.counts || {};
                    document.getElementById('count-all').textContent = counts.all || 0;
                    document.getElementById('count-system').textContent = counts.system || 0;
                    document.getElementById('count-storage').textContent = counts.storage || 0;
                    document.getElementById('count-network').textContent = counts.network || 0;
                    document.getElementById('count-security').textContent = counts.security || 0;
                    document.getElementById('count-audit').textContent = counts.audit || 0;
                    document.getElementById('count-app').textContent = counts.app || 0;
                }
            } catch (error) {
                // 使用模拟计数
                document.getElementById('count-all').textContent = '150';
                document.getElementById('count-system').textContent = '45';
                document.getElementById('count-storage').textContent = '32';
                document.getElementById('count-network').textContent = '28';
                document.getElementById('count-security').textContent = '15';
                document.getElementById('count-audit').textContent = '20';
                document.getElementById('count-app').textContent = '10';
            }
        }

        // 选择日志类型
        function selectLogType(type) {
            currentType = type;
            currentPage = 1;
            
            document.querySelectorAll('.log-type-item').forEach(item => {
                item.classList.remove('active');
            });
            event.currentTarget.classList.add('active');
            
            loadLogs();
        }

        // 快速筛选
        function filterErrors() {
            document.getElementById('level-filter').value = 'error';
            currentPage = 1;
            loadLogs();
        }

        function filterWarnings() {
            document.getElementById('level-filter').value = 'warn';
            currentPage = 1;
            loadLogs();
        }

        function filterToday() {
            document.getElementById('time-range').value = '24h';
            currentPage = 1;
            loadLogs();
        }

        // 分页
        function updatePagination() {
            const start = (currentPage - 1) * pageSize + 1;
            const end = Math.min(currentPage * pageSize, totalLogs);
            
            document.getElementById('showing-start').textContent = start;
            document.getElementById('showing-end').textContent = end;
            document.getElementById('total-count').textContent = totalLogs;
            
            document.getElementById('prev-btn').disabled = currentPage <= 1;
            document.getElementById('next-btn').disabled = currentPage >= totalPages;
            
            // 页码
            let pageNumbers = '';
            for (let i = 1; i <= Math.min(totalPages, 5); i++) {
                pageNumbers += `<button class="pagination-btn ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
            }
            document.getElementById('page-numbers').innerHTML = pageNumbers;
        }

        function prevPage() {
            if (currentPage > 1) {
                currentPage--;
                loadLogs();
            }
        }

        function nextPage() {
            if (currentPage < totalPages) {
                currentPage++;
                loadLogs();
            }
        }

        function goToPage(page) {
            currentPage = page;
            loadLogs();
        }

        // 展开日志详情
        function toggleLogExpand(index) {
            const fieldsDiv = document.getElementById(`log-fields-${index}`);
            if (fieldsDiv) {
                fieldsDiv.style.display = fieldsDiv.style.display === 'none' ? 'block' : 'none';
            }
        }

        // 显示日志详情
        function showLogDetail(index) {
            const log = window.currentLogs[index];
            if (!log) return;

            const detailBody = document.getElementById('log-detail-body');
            detailBody.innerHTML = `
                <div class="log-detail-section">
                    <div class="log-detail-section-title">基本信息</div>
                    <div class="log-detail-row">
                        <span class="log-detail-label">时间</span>
                        <span class="log-detail-value">${formatTimestamp(log.timestamp)}</span>
                    </div>
                    <div class="log-detail-row">
                        <span class="log-detail-label">级别</span>
                        <span class="log-detail-value"><span class="log-level ${log.level}">${log.level}</span></span>
                    </div>
                    <div class="log-detail-row">
                        <span class="log-detail-label">来源</span>
                        <span class="log-detail-value">${log.source || 'system'}</span>
                    </div>
                </div>
                <div class="log-detail-section">
                    <div class="log-detail-section-title">消息内容</div>
                    <div style="background: var(--bg-tertiary); padding: 1rem; border-radius: 8px; font-family: var(--font-family-mono); font-size: 13px; white-space: pre-wrap;">
                        ${escapeHtml(log.message)}
                    </div>
                </div>
                ${log.fields ? `
                    <div class="log-detail-section">
                        <div class="log-detail-section-title">附加字段</div>
                        ${Object.entries(log.fields).map(([key, value]) => `
                            <div class="log-detail-row">
                                <span class="log-detail-label">${escapeHtml(key)}</span>
                                <span class="log-detail-value">${escapeHtml(String(value))}</span>
                            </div>
                        `).join('')}
                    </div>
                ` : ''}
            `;

            document.getElementById('log-detail-modal').style.display = 'flex';
        }

        function closeLogDetail() {
            document.getElementById('log-detail-modal').style.display = 'none';
        }

        // 实时模式
        function toggleLive() {
            liveMode = !liveMode;
            const indicator = document.getElementById('live-indicator');
            
            if (liveMode) {
                indicator.style.display = 'flex';
                liveInterval = setInterval(loadLogs, 3000);
            } else {
                indicator.style.display = 'none';
                if (liveInterval) {
                    clearInterval(liveInterval);
                    liveInterval = null;
                }
            }
        }

        // 导出日志
        function exportLogs() {
            const format = prompt('导出格式 (json/csv):', 'json');
            if (!format) return;

            const timeRange = document.getElementById('time-range').value;
            const level = document.getElementById('level-filter').value;

            // 实际应该调用 API
            alert(`正在导出日志...\n格式: ${format}\n时间范围: ${timeRange}\n级别: ${level || '全部'}`);
        }

        // 轮转设置
        function showRotationSettings() {
            alert('日志轮转设置功能（待实现）');
        }

        // 防抖搜索
        function debounceSearch() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                currentPage = 1;
                loadLogs();
            }, 500);
        }

        // 工具函数
        function formatTimestamp(isoString) {
            const date = new Date(isoString);
            return date.toLocaleString('zh-CN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showError(message) {
            console.error(message);
        }

        // 点击模态框外部关闭
        document.getElementById('log-detail-modal').addEventListener('click', (e) => {
            if (e.target.id === 'log-detail-modal') {
                closeLogDetail();
            }
        });
    </script>
</body>
</html>
