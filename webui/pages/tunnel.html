<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>内网穿透 - NAS-OS</title>
    <link rel="icon" type="image/png" sizes="32x32" href="../brand/logo/logo-32.png">
    <link rel="stylesheet" href="../css/design-system.css">
    <style>
        .tunnel-container { max-width: 1400px; margin: 0 auto; padding: 2rem; }
        
        /* Header */
        .tunnel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }
        .tunnel-title {
            font-size: 24px;
            font-weight: 600;
            color: var(--text-primary);
        }
        .tunnel-subtitle {
            color: var(--text-muted);
            margin-top: 4px;
        }
        
        /* Status Banner */
        .status-banner {
            background: linear-gradient(135deg, #1e3a5f 0%, #2d5a87 100%);
            border-radius: 16px;
            padding: 2rem;
            margin-bottom: 2rem;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .status-banner.disconnected {
            background: linear-gradient(135deg, #4a5568 0%, #718096 100%);
        }
        .status-info h2 {
            font-size: 20px;
            margin-bottom: 0.5rem;
        }
        .status-details {
            display: flex;
            gap: 2rem;
            margin-top: 1rem;
            font-size: 14px;
            opacity: 0.9;
        }
        .status-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .status-icon {
            width: 60px;
            height: 60px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }
        
        /* Quick Actions */
        .quick-actions {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        .action-card {
            background: var(--surface-color);
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--surface-border);
            cursor: pointer;
            transition: all 0.2s;
        }
        .action-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }
        .action-icon {
            width: 48px;
            height: 48px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-bottom: 1rem;
        }
        .action-icon.quick { background: #DBEAFE; color: #2563EB; }
        .action-icon.config { background: #D1FAE5; color: #059669; }
        .action-icon.preset { background: #FEF3C7; color: #D97706; }
        .action-icon.advanced { background: #E0E7FF; color: #4F46E5; }
        .action-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }
        .action-desc {
            font-size: 13px;
            color: var(--text-muted);
        }
        
        /* Main Grid */
        .main-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 1.5rem;
        }
        @media (max-width: 1024px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }
        
        /* Proxy List */
        .proxy-section {
            background: var(--surface-color);
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: var(--shadow-md);
        }
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }
        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
        }
        .proxy-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .proxy-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem;
            background: var(--bg-color);
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }
        .proxy-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .proxy-icon {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            background: #EEF2FF;
            color: #4F46E5;
        }
        .proxy-name {
            font-weight: 500;
            color: var(--text-primary);
        }
        .proxy-addr {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 2px;
        }
        .proxy-status {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 13px;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }
        .status-dot.running { background: #10B981; }
        .status-dot.offline { background: #6B7280; }
        .status-dot.error { background: #EF4444; }
        
        /* Config Panel */
        .config-panel {
            background: var(--surface-color);
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: var(--shadow-md);
        }
        .config-form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .form-label {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-muted);
        }
        .form-input {
            padding: 0.75rem 1rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 14px;
            background: var(--bg-color);
            color: var(--text-primary);
        }
        .form-input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }
        
        /* Presets */
        .presets-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 1rem;
        }
        .preset-item {
            padding: 1rem;
            background: var(--bg-color);
            border-radius: 8px;
            border: 1px solid var(--border-color);
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .preset-item:hover {
            border-color: var(--primary-color);
            background: #EFF6FF;
        }
        .preset-icon {
            font-size: 24px;
            margin-bottom: 0.5rem;
        }
        .preset-name {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-primary);
        }
        .preset-port {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 2px;
        }
        
        /* Buttons */
        .btn {
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
        }
        .btn-primary {
            background: var(--primary-color);
            color: white;
        }
        .btn-primary:hover {
            background: #1D4ED8;
        }
        .btn-secondary {
            background: var(--bg-color);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }
        .btn-secondary:hover {
            background: var(--surface-color);
        }
        .btn-danger {
            background: #FEE2E2;
            color: #DC2626;
        }
        .btn-danger:hover {
            background: #FECACA;
        }
        .btn-group {
            display: flex;
            gap: 0.5rem;
        }
        
        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }
        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        .modal {
            background: var(--surface-color);
            border-radius: 16px;
            padding: 2rem;
            width: 100%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }
        .modal-title {
            font-size: 18px;
            font-weight: 600;
        }
        .modal-close {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--text-muted);
        }
        
        /* Stats */
        .stats-row {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .mini-stat {
            flex: 1;
            background: var(--bg-color);
            border-radius: 8px;
            padding: 1rem;
            text-align: center;
        }
        .mini-stat-value {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-primary);
        }
        .mini-stat-label {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 4px;
        }
        
        /* Toggle */
        .toggle-wrapper {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem;
            background: var(--bg-color);
            border-radius: 8px;
            margin-bottom: 1rem;
        }
        .toggle-label {
            font-weight: 500;
        }
        .toggle {
            width: 48px;
            height: 26px;
            background: var(--border-color);
            border-radius: 13px;
            position: relative;
            cursor: pointer;
            transition: background 0.3s;
        }
        .toggle.active {
            background: var(--primary-color);
        }
        .toggle::after {
            content: '';
            position: absolute;
            width: 22px;
            height: 22px;
            background: white;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: transform 0.3s;
        }
        .toggle.active::after {
            transform: translateX(22px);
        }
        
        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
        }
        .empty-icon {
            font-size: 48px;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <div class="tunnel-container">
        <!-- Header -->
        <div class="tunnel-header">
            <div>
                <h1 class="tunnel-title">🔒 内网穿透</h1>
                <p class="tunnel-subtitle">安全访问您的NAS设备，无需公网IP</p>
            </div>
            <div class="btn-group">
                <button class="btn btn-secondary" onclick="openConfigModal()">⚙️ 设置</button>
                <button class="btn btn-primary" id="mainToggle" onclick="toggleConnection()">启动服务</button>
            </div>
        </div>
        
        <!-- Status Banner -->
        <div class="status-banner disconnected" id="statusBanner">
            <div class="status-info">
                <h2 id="statusTitle">服务未连接</h2>
                <div class="status-details">
                    <div class="status-item">
                        <span>🌐</span>
                        <span id="publicIP">未获取</span>
                    </div>
                    <div class="status-item">
                        <span>📍</span>
                        <span id="natType">检测中...</span>
                    </div>
                    <div class="status-item">
                        <span>🔗</span>
                        <span id="proxyCount">0 个代理</span>
                    </div>
                </div>
            </div>
            <div class="status-icon" id="statusIcon">🔓</div>
        </div>
        
        <!-- Quick Actions -->
        <div class="quick-actions">
            <div class="action-card" onclick="openQuickConnect()">
                <div class="action-icon quick">⚡</div>
                <div class="action-title">一键连接</div>
                <div class="action-desc">快速配置常用服务的远程访问</div>
            </div>
            <div class="action-card" onclick="openAddProxyModal()">
                <div class="action-icon config">➕</div>
                <div class="action-title">添加代理</div>
                <div class="action-desc">手动配置端口映射规则</div>
            </div>
            <div class="action-card" onclick="showPresets()">
                <div class="action-icon preset">📋</div>
                <div class="action-title">预设服务</div>
                <div class="action-desc">Web、SSH、SMB等常用服务模板</div>
            </div>
            <div class="action-card" onclick="openConfigModal()">
                <div class="action-icon advanced">🔧</div>
                <div class="action-title">高级设置</div>
                <div class="action-desc">配置服务器、认证等高级选项</div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="main-grid">
            <!-- Proxy List -->
            <div class="proxy-section">
                <div class="section-header">
                    <h3 class="section-title">代理列表</h3>
                    <button class="btn btn-secondary" onclick="refreshProxies()">🔄 刷新</button>
                </div>
                <div id="proxyList" class="proxy-list">
                    <div class="empty-state">
                        <div class="empty-icon">📭</div>
                        <p>暂无代理配置</p>
                        <p style="font-size: 13px; margin-top: 0.5rem;">点击上方"一键连接"快速添加</p>
                    </div>
                </div>
            </div>
            
            <!-- Stats & Config -->
            <div>
                <!-- Stats -->
                <div class="config-panel" style="margin-bottom: 1.5rem;">
                    <h3 class="section-title" style="margin-bottom: 1rem;">📊 流量统计</h3>
                    <div class="stats-row">
                        <div class="mini-stat">
                            <div class="mini-stat-value" id="trafficIn">0</div>
                            <div class="mini-stat-label">入站流量</div>
                        </div>
                        <div class="mini-stat">
                            <div class="mini-stat-value" id="trafficOut">0</div>
                            <div class="mini-stat-label">出站流量</div>
                        </div>
                    </div>
                    <div class="stats-row">
                        <div class="mini-stat">
                            <div class="mini-stat-value" id="uptime">0s</div>
                            <div class="mini-stat-label">运行时间</div>
                        </div>
                        <div class="mini-stat">
                            <div class="mini-stat-value" id="connections">0</div>
                            <div class="mini-stat-label">当前连接</div>
                        </div>
                    </div>
                </div>
                
                <!-- Quick Config -->
                <div class="config-panel">
                    <h3 class="section-title" style="margin-bottom: 1rem;">⚡ 快速配置</h3>
                    <div class="toggle-wrapper">
                        <span class="toggle-label">自动重连</span>
                        <div class="toggle active" id="autoReconnect" onclick="toggleOption('autoReconnect')"></div>
                    </div>
                    <div class="toggle-wrapper">
                        <span class="toggle-label">开机自启</span>
                        <div class="toggle active" id="autoStart" onclick="toggleOption('autoStart')"></div>
                    </div>
                    <div class="toggle-wrapper">
                        <span class="toggle-label">TLS加密</span>
                        <div class="toggle" id="tlsEnabled" onclick="toggleOption('tlsEnabled')"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Quick Connect Modal -->
    <div class="modal-overlay" id="quickConnectModal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">⚡ 一键连接</h3>
                <button class="modal-close" onclick="closeModal('quickConnectModal')">&times;</button>
            </div>
            <div class="form-group">
                <label class="form-label">本地端口</label>
                <input type="number" class="form-input" id="qcLocalPort" placeholder="如: 80, 22, 445">
            </div>
            <div class="form-group">
                <label class="form-label">服务名称（可选）</label>
                <input type="text" class="form-input" id="qcServiceName" placeholder="如: web, ssh, smb">
            </div>
            <button class="btn btn-primary" style="width: 100%; margin-top: 1rem;" onclick="doQuickConnect()">
                连接
            </button>
        </div>
    </div>
    
    <!-- Add Proxy Modal -->
    <div class="modal-overlay" id="addProxyModal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">➕ 添加代理</h3>
                <button class="modal-close" onclick="closeModal('addProxyModal')">&times;</button>
            </div>
            <div class="form-group">
                <label class="form-label">代理名称</label>
                <input type="text" class="form-input" id="proxyName" placeholder="my-proxy">
            </div>
            <div class="form-group">
                <label class="form-label">类型</label>
                <select class="form-input" id="proxyType">
                    <option value="tcp">TCP</option>
                    <option value="udp">UDP</option>
                    <option value="http">HTTP</option>
                    <option value="https">HTTPS</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">本地IP</label>
                <input type="text" class="form-input" id="proxyLocalIP" value="127.0.0.1">
            </div>
            <div class="form-group">
                <label class="form-label">本地端口</label>
                <input type="number" class="form-input" id="proxyLocalPort" placeholder="80">
            </div>
            <div class="form-group">
                <label class="form-label">远程端口</label>
                <input type="number" class="form-input" id="proxyRemotePort" placeholder="自动分配">
            </div>
            <button class="btn btn-primary" style="width: 100%; margin-top: 1rem;" onclick="addProxy()">
                添加
            </button>
        </div>
    </div>
    
    <!-- Config Modal -->
    <div class="modal-overlay" id="configModal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">⚙️ 服务配置</h3>
                <button class="modal-close" onclick="closeModal('configModal')">&times;</button>
            </div>
            <div class="form-group">
                <label class="form-label">FRP服务器地址</label>
                <input type="text" class="form-input" id="configServerAddr" placeholder="frp.example.com">
            </div>
            <div class="form-group">
                <label class="form-label">服务器端口</label>
                <input type="number" class="form-input" id="configServerPort" value="7000">
            </div>
            <div class="form-group">
                <label class="form-label">认证令牌</label>
                <input type="password" class="form-input" id="configToken" placeholder="可选">
            </div>
            <div class="form-group">
                <label class="form-label">设备ID</label>
                <input type="text" class="form-input" id="configDeviceID" readonly>
            </div>
            <button class="btn btn-primary" style="width: 100%; margin-top: 1rem;" onclick="saveConfig()">
                保存配置
            </button>
        </div>
    </div>
    
    <!-- Presets Modal -->
    <div class="modal-overlay" id="presetsModal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">📋 预设服务</h3>
                <button class="modal-close" onclick="closeModal('presetsModal')">&times;</button>
            </div>
            <div class="presets-grid" id="presetsGrid">
                <!-- Dynamically filled -->
            </div>
        </div>
    </div>

    <script>
        // State
        let state = {
            connected: false,
            proxies: [],
            config: {},
            presets: []
        };
        
        // API Base
        const API_BASE = '/api/v1';
        
        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadDashboard();
            loadPresets();
            // Auto refresh
            setInterval(loadDashboard, 10000);
        });
        
        // Load Dashboard Data
        async function loadDashboard() {
            try {
                const response = await fetch(`${API_BASE}/tunnel/dashboard`);
                if (response.ok) {
                    const data = await response.json();
                    updateUI(data);
                }
            } catch (error) {
                console.error('Failed to load dashboard:', error);
            }
        }
        
        // Update UI
        function updateUI(data) {
            state.connected = data.overallStatus?.connected || false;
            
            // Status Banner
            const banner = document.getElementById('statusBanner');
            const title = document.getElementById('statusTitle');
            const icon = document.getElementById('statusIcon');
            
            if (state.connected) {
                banner.classList.remove('disconnected');
                title.textContent = '服务已连接';
                icon.textContent = '🔒';
                document.getElementById('mainToggle').textContent = '停止服务';
            } else {
                banner.classList.add('disconnected');
                title.textContent = '服务未连接';
                icon.textContent = '🔓';
                document.getElementById('mainToggle').textContent = '启动服务';
            }
            
            // Details
            document.getElementById('publicIP').textContent = data.overallStatus?.publicIp || '未获取';
            document.getElementById('natType').textContent = data.p2p?.natType || '未知';
            document.getElementById('proxyCount').textContent = `${data.frp?.proxyCount || 0} 个代理`;
            
            // Stats
            document.getElementById('trafficIn').textContent = formatBytes(data.frp?.totalTraffic || 0);
            document.getElementById('trafficOut').textContent = formatBytes(data.frp?.totalTraffic || 0);
            document.getElementById('uptime').textContent = formatDuration(data.frp?.uptime || 0);
            
            // Proxy List
            renderProxies(data.frp?.proxies || []);
        }
        
        // Render Proxies
        function renderProxies(proxies) {
            const container = document.getElementById('proxyList');
            
            if (proxies.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📭</div>
                        <p>暂无代理配置</p>
                        <p style="font-size: 13px; margin-top: 0.5rem;">点击上方"一键连接"快速添加</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = proxies.map(p => `
                <div class="proxy-item">
                    <div class="proxy-info">
                        <div class="proxy-icon">${getServiceIcon(p.name)}</div>
                        <div>
                            <div class="proxy-name">${p.name}</div>
                            <div class="proxy-addr">${p.localAddr} → ${p.remoteAddr}</div>
                        </div>
                    </div>
                    <div class="proxy-status">
                        <span class="status-dot ${p.status}"></span>
                        <span>${p.status === 'running' ? '运行中' : '已停止'}</span>
                        <button class="btn btn-danger" style="padding: 0.25rem 0.5rem; font-size: 12px;" 
                                onclick="deleteProxy('${p.name}')">删除</button>
                    </div>
                </div>
            `).join('');
        }
        
        // Load Presets
        async function loadPresets() {
            try {
                const response = await fetch(`${API_BASE}/tunnel/presets`);
                if (response.ok) {
                    state.presets = await response.json();
                }
            } catch (error) {
                // Use default presets
                state.presets = [
                    { name: 'Web管理', localPort: 80, protocol: 'tcp', icon: '🌐' },
                    { name: 'HTTPS', localPort: 443, protocol: 'tcp', icon: '🔒' },
                    { name: 'SSH', localPort: 22, protocol: 'tcp', icon: '💻' },
                    { name: 'SMB', localPort: 445, protocol: 'tcp', icon: '📁' },
                    { name: 'FTP', localPort: 21, protocol: 'tcp', icon: '📤' },
                    { name: 'WebDAV', localPort: 5005, protocol: 'tcp', icon: '☁️' },
                ];
            }
        }
        
        // Toggle Connection
        async function toggleConnection() {
            const btn = document.getElementById('mainToggle');
            btn.disabled = true;
            btn.textContent = '处理中...';
            
            try {
                const endpoint = state.connected ? 'stop' : 'start';
                const response = await fetch(`${API_BASE}/tunnel/frp/${endpoint}`, { method: 'POST' });
                
                if (response.ok) {
                    setTimeout(loadDashboard, 1000);
                }
            } catch (error) {
                console.error('Toggle failed:', error);
            }
            
            btn.disabled = false;
        }
        
        // Quick Connect
        function openQuickConnect() {
            document.getElementById('quickConnectModal').classList.add('active');
        }
        
        async function doQuickConnect() {
            const localPort = parseInt(document.getElementById('qcLocalPort').value);
            const serviceName = document.getElementById('qcServiceName').value || 'service';
            
            if (!localPort) {
                alert('请输入本地端口');
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/tunnel/frp/quick-connect`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ localPort, serviceName })
                });
                
                if (response.ok) {
                    const result = await response.json();
                    alert(`连接成功！\n公网地址: ${result.publicUrl}`);
                    closeModal('quickConnectModal');
                    loadDashboard();
                }
            } catch (error) {
                console.error('Quick connect failed:', error);
            }
        }
        
        // Add Proxy
        function openAddProxyModal() {
            document.getElementById('addProxyModal').classList.add('active');
        }
        
        async function addProxy() {
            const proxy = {
                name: document.getElementById('proxyName').value,
                type: document.getElementById('proxyType').value,
                localIp: document.getElementById('proxyLocalIP').value,
                localPort: parseInt(document.getElementById('proxyLocalPort').value),
                remotePort: parseInt(document.getElementById('proxyRemotePort').value) || 0
            };
            
            if (!proxy.name || !proxy.localPort) {
                alert('请填写必要信息');
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/tunnel/frp/proxies`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(proxy)
                });
                
                if (response.ok) {
                    closeModal('addProxyModal');
                    loadDashboard();
                }
            } catch (error) {
                console.error('Add proxy failed:', error);
            }
        }
        
        // Delete Proxy
        async function deleteProxy(name) {
            if (!confirm(`确定删除代理 ${name}?`)) return;
            
            try {
                await fetch(`${API_BASE}/tunnel/frp/proxies/${name}`, { method: 'DELETE' });
                loadDashboard();
            } catch (error) {
                console.error('Delete failed:', error);
            }
        }
        
        // Config
        function openConfigModal() {
            document.getElementById('configModal').classList.add('active');
        }
        
        async function saveConfig() {
            const config = {
                serverAddr: document.getElementById('configServerAddr').value,
                serverPort: parseInt(document.getElementById('configServerPort').value),
                token: document.getElementById('configToken').value
            };
            
            try {
                await fetch(`${API_BASE}/tunnel/frp/config`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(config)
                });
                closeModal('configModal');
            } catch (error) {
                console.error('Save config failed:', error);
            }
        }
        
        // Presets
        function showPresets() {
            const grid = document.getElementById('presetsGrid');
            grid.innerHTML = state.presets.map(p => `
                <div class="preset-item" onclick="usePreset(${p.localPort}, '${p.name}')">
                    <div class="preset-icon">${p.icon || '🔌'}</div>
                    <div class="preset-name">${p.name}</div>
                    <div class="preset-port">端口 ${p.localPort}</div>
                </div>
            `).join('');
            document.getElementById('presetsModal').classList.add('active');
        }
        
        function usePreset(port, name) {
            closeModal('presetsModal');
            document.getElementById('qcLocalPort').value = port;
            document.getElementById('qcServiceName').value = name.toLowerCase();
            openQuickConnect();
        }
        
        // Toggle Options
        function toggleOption(id) {
            document.getElementById(id).classList.toggle('active');
        }
        
        // Modal Helpers
        function closeModal(id) {
            document.getElementById(id).classList.remove('active');
        }
        
        function refreshProxies() {
            loadDashboard();
        }
        
        // Utility Functions
        function formatBytes(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }
        
        function formatDuration(ms) {
            if (!ms) return '0s';
            const seconds = Math.floor(ms / 1000);
            if (seconds < 60) return `${seconds}s`;
            if (seconds < 3600) return `${Math.floor(seconds / 60)}m`;
            if (seconds < 86400) return `${Math.floor(seconds / 3600)}h`;
            return `${Math.floor(seconds / 86400)}d`;
        }
        
        function getServiceIcon(name) {
            if (name.includes('web') || name.includes('http')) return '🌐';
            if (name.includes('ssh')) return '💻';
            if (name.includes('smb') || name.includes('file')) return '📁';
            if (name.includes('ftp')) return '📤';
            if (name.includes('mysql') || name.includes('db')) return '🗄️';
            return '🔌';
        }
    </script>
</body>
</html>
