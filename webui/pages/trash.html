<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>回收站 - NAS-OS</title>
    <link rel="icon" type="image/png" sizes="32x32" href="../brand/logo/logo-32.png">
    <link rel="stylesheet" href="../css/design-system.css">
    <style>
        .trash-container { max-width: 1400px; margin: 0 auto; padding: 2rem; }
        .trash-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }
        .stats-bar {
            display: flex;
            gap: 2rem;
            background: var(--surface-color);
            padding: 1.5rem;
            border-radius: 12px;
            margin-bottom: 2rem;
            box-shadow: var(--shadow-md);
        }
        .stat-item {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .stat-label {
            font-size: 14px;
            color: var(--text-muted);
        }
        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-primary);
        }
        .progress-bar {
            width: 200px;
            height: 8px;
            background: var(--border-color);
            border-radius: 4px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #2563EB, #3B82F6);
            transition: width 0.3s;
        }
        .progress-fill.warning { background: linear-gradient(90deg, #F59E0B, #FBBF24); }
        .progress-fill.danger { background: linear-gradient(90deg, #DC2626, #EF4444); }
        
        .trash-list {
            background: var(--surface-color);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: var(--shadow-md);
        }
        .trash-item {
            display: flex;
            align-items: center;
            padding: 1.25rem;
            border-bottom: 1px solid var(--border-color);
            transition: background 0.2s;
        }
        .trash-item:hover { background: var(--hover-color); }
        .trash-item:last-child { border-bottom: none; }
        .item-icon {
            width: 48px;
            height: 48px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-right: 1rem;
            background: var(--bg-tertiary);
        }
        .item-info { flex: 1; }
        .item-name {
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.25rem;
        }
        .item-meta {
            font-size: 13px;
            color: var(--text-muted);
        }
        .item-actions {
            display: flex;
            gap: 0.5rem;
        }
        .btn {
            padding: 0.5rem 1rem;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }
        .btn-primary { background: var(--color-primary); color: white; }
        .btn-primary:hover { background: #1D4ED8; }
        .btn-secondary { background: var(--surface-color); border: 1px solid var(--border-color); }
        .btn-secondary:hover { background: var(--hover-color); }
        .btn-danger { background: #DC2626; color: white; }
        .btn-danger:hover { background: #B91C1C; }
        .btn-sm { padding: 0.375rem 0.75rem; font-size: 13px; }
        
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-muted);
        }
        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 1rem;
        }
        
        .badge {
            display: inline-block;
            padding: 0.25rem 0.625rem;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 600;
        }
        .badge-warning { background: #FEF3C7; color: #92400E; }
        .badge-danger { background: #FEE2E2; color: #991B1B; }
        .badge-success { background: #D1FAE5; color: #065F46; }
    </style>
</head>
<body>
    <div class="trash-container">
        <!-- 头部 -->
        <div class="trash-header">
            <div>
                <h1 style="margin: 0 0 0.5rem 0;">🗑️ 回收站</h1>
                <p style="margin: 0; color: var(--text-muted);">管理已删除的文件，{{retentionDays}} 天后自动清理</p>
            </div>
            <div>
                <button class="btn btn-secondary" onclick="showSettings()">⚙️ 设置</button>
                <button class="btn btn-danger" onclick="confirmEmpty()">🗑️ 清空回收站</button>
            </div>
        </div>

        <!-- 统计栏 -->
        <div class="stats-bar">
            <div class="stat-item">
                <span class="stat-label">文件数量</span>
                <span class="stat-value" id="statCount">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">占用空间</span>
                <span class="stat-value" id="statSize">0 B</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">空间使用率</span>
                <div style="display: flex; align-items: center; gap: 0.75rem;">
                    <div class="progress-bar">
                        <div class="progress-fill" id="sizeProgress" style="width: 0%"></div>
                    </div>
                    <span class="stat-value" id="statPercent">0%</span>
                </div>
            </div>
            <div class="stat-item">
                <span class="stat-label">最大容量</span>
                <span class="stat-value" id="statMax">10 GB</span>
            </div>
        </div>

        <!-- 回收站列表 -->
        <div class="trash-list" id="trashList">
            <div class="empty-state">
                <div class="empty-state-icon">🗑️</div>
                <h3>回收站是空的</h3>
                <p>删除的文件将显示在这里</p>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/api/v1/trash';
        let trashItems = [];

        // 加载回收站数据
        async function loadTrash() {
            try {
                const [itemsRes, statsRes] = await Promise.all([
                    fetch(`${API_BASE}`),
                    fetch(`${API_BASE}/stats`)
                ]);

                const itemsData = await itemsRes.json();
                const statsData = await statsRes.json();

                if (itemsData.code === 0) {
                    trashItems = itemsData.data || [];
                    renderList();
                }

                if (statsData.code === 0) {
                    updateStats(statsData.data);
                }
            } catch (error) {
                console.error('加载回收站失败:', error);
            }
        }

        // 更新统计
        function updateStats(stats) {
            document.getElementById('statCount').textContent = stats.total_items || 0;
            document.getElementById('statSize').textContent = formatSize(stats.total_size || 0);
            document.getElementById('statMax').textContent = formatSize(stats.max_size || 0);
            
            const percent = stats.usage_percent || 0;
            document.getElementById('statPercent').textContent = percent.toFixed(1) + '%';
            
            const progress = document.getElementById('sizeProgress');
            progress.style.width = Math.min(percent, 100) + '%';
            progress.className = 'progress-fill' + (percent > 90 ? ' danger' : percent > 75 ? ' warning' : '');
        }

        // 渲染列表
        function renderList() {
            const list = document.getElementById('trashList');
            
            if (trashItems.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">🗑️</div>
                        <h3>回收站是空的</h3>
                        <p>删除的文件将显示在这里</p>
                    </div>
                `;
                return;
            }

            list.innerHTML = trashItems.map(item => {
                const icon = item.is_dir ? '📁' : getFileIcon(item.name);
                const daysLeft = item.days_left || 0;
                const badgeClass = daysLeft <= 3 ? 'badge-danger' : daysLeft <= 7 ? 'badge-warning' : 'badge-success';
                
                return `
                    <div class="trash-item">
                        <div class="item-icon">${icon}</div>
                        <div class="item-info">
                            <div class="item-name">${escapeHtml(item.name)}</div>
                            <div class="item-meta">
                                原路径：${escapeHtml(item.original_path)} • 
                                大小：${formatSize(item.size)} • 
                                删除时间：${formatDate(item.deleted_at)} • 
                                <span class="badge ${badgeClass}">剩余 ${daysLeft} 天</span>
                            </div>
                        </div>
                        <div class="item-actions">
                            <button class="btn btn-primary btn-sm" onclick="restore('${item.id}')">↩️ 恢复</button>
                            <button class="btn btn-danger btn-sm" onclick="deletePermanent('${item.id}')">🗑️ 删除</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // 恢复文件
        async function restore(id) {
            if (!confirm('确定要恢复此文件？')) return;
            
            try {
                const res = await fetch(`${API_BASE}/${id}/restore`, { method: 'POST' });
                const data = await res.json();
                
                if (data.code === 0) {
                    alert('文件已恢复');
                    loadTrash();
                } else {
                    alert('恢复失败：' + data.message);
                }
            } catch (error) {
                alert('恢复失败：' + error.message);
            }
        }

        // 永久删除
        async function deletePermanent(id) {
            if (!confirm('确定要永久删除此文件？此操作不可恢复！')) return;
            
            try {
                const res = await fetch(`${API_BASE}/${id}`, { method: 'DELETE' });
                const data = await res.json();
                
                if (data.code === 0) {
                    alert('文件已永久删除');
                    loadTrash();
                } else {
                    alert('删除失败：' + data.message);
                }
            } catch (error) {
                alert('删除失败：' + error.message);
            }
        }

        // 清空回收站
        async function confirmEmpty() {
            if (!confirm('确定要清空回收站？所有文件将永久删除！')) return;
            
            try {
                const res = await fetch(`${API_BASE}`, { method: 'DELETE' });
                const data = await res.json();
                
                if (data.code === 0) {
                    alert('回收站已清空');
                    loadTrash();
                } else {
                    alert('清空失败：' + data.message);
                }
            } catch (error) {
                alert('清空失败：' + error.message);
            }
        }

        // 显示设置
        function showSettings() {
            alert('回收站设置功能待实现');
        }

        // 工具函数
        function formatSize(bytes) {
            if (bytes >= 1073741824) return (bytes / 1073741824).toFixed(1) + ' GB';
            if (bytes >= 1048576) return (bytes / 1048576).toFixed(1) + ' MB';
            if (bytes >= 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return bytes + ' B';
        }

        function formatDate(dateStr) {
            const date = new Date(dateStr);
            return date.toLocaleString('zh-CN');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function getFileIcon(filename) {
            const ext = filename.split('.').pop().toLowerCase();
            const icons = {
                'jpg': '🖼️', 'jpeg': '🖼️', 'png': '🖼️', 'gif': '🖼️', 'bmp': '🖼️',
                'mp4': '🎬', 'avi': '🎬', 'mkv': '🎬', 'mov': '🎬',
                'mp3': '🎵', 'wav': '🎵', 'flac': '🎵',
                'doc': '📄', 'docx': '📄', 'pdf': '📄', 'txt': '📄',
                'xls': '📊', 'xlsx': '📊', 'csv': '📊',
                'zip': '📦', 'rar': '📦', '7z': '📦',
                'exe': '⚙️', 'msi': '⚙️',
                'sh': '⚙️', 'py': '⚙️', 'js': '⚙️'
            };
            return icons[ext] || '📄';
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', loadTrash);
        
        // 自动刷新（每 30 秒）
        setInterval(loadTrash, 30000);
    </script>
</body>
</html>
