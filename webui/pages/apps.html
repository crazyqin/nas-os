<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#2563EB">
    <title>应用商店 - NAS-OS</title>
    <link rel="icon" type="image/png" sizes="32x32" href="../brand/logo/logo-32.png">
    <link rel="stylesheet" href="../css/design-system.css">
    <style>
        /* 安装进度条组件 */
        .install-progress {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: white;
            border-radius: 12px;
            padding: 1rem 1.5rem;
            box-shadow: var(--shadow-lg);
            z-index: 1001;
            min-width: 300px;
            display: none;
        }
        .install-progress.active {
            display: block;
        }
        .install-progress-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.75rem;
        }
        .install-progress-icon {
            font-size: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .install-progress-bar {
            height: 8px;
            background: var(--color-gray-200);
            border-radius: 4px;
            overflow: hidden;
        }
        .install-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--color-primary), var(--color-success));
            border-radius: 4px;
            transition: width 0.3s ease;
        }
        .install-progress-text {
            font-size: 12px;
            color: var(--color-gray-500);
            margin-top: 0.5rem;
        }
        .install-progress-status {
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }
        .install-progress-status.success {
            color: var(--color-success);
        }
        .install-progress-status.error {
            color: var(--color-error);
        }
        
        /* 分类图标样式 */
        .category-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            font-size: 14px;
            margin-right: 0.25rem;
        }
        .category-btn {
            display: inline-flex;
            align-items: center;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            border: 1px solid var(--color-gray-300);
            background: white;
            color: var(--color-gray-600);
            cursor: pointer;
            transition: all 0.2s;
        }
        .category-btn:hover, .category-btn.active {
            background: var(--color-primary);
            color: white;
            border-color: var(--color-primary);
        }
        .category-btn.active .category-icon {
            transform: scale(1.1);
        }
        
        /* 搜索空状态提示 */
        .search-empty-state {
            display: none;
            text-align: center;
            padding: 3rem 2rem;
            background: var(--color-gray-50);
            border-radius: 12px;
            margin-bottom: 1.5rem;
        }
        .search-empty-state.active {
            display: block;
        }
        .search-empty-icon {
            font-size: 48px;
            margin-bottom: 1rem;
            opacity: 0.5;
        }
        .search-empty-title {
            font-size: 18px;
            color: var(--color-gray-700);
            margin-bottom: 0.5rem;
        }
        .search-empty-desc {
            color: var(--color-gray-500);
            margin-bottom: 1rem;
        }
        .search-empty-btn {
            display: inline-block;
            padding: 0.5rem 1rem;
            background: var(--color-primary);
            color: white;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .search-empty-btn:hover {
            background: var(--color-primary-dark);
        }
        
        /* 搜索框样式 */
        .search-box {
            position: relative;
            margin-bottom: 1rem;
        }
        .search-input {
            width: 100%;
            padding: 0.75rem 1rem 0.75rem 2.5rem;
            border: 1px solid var(--color-gray-300);
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.2s;
        }
        .search-input:focus {
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px var(--color-primary-light);
            outline: none;
        }
        .search-icon {
            position: absolute;
            left: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--color-gray-400);
        }
        .search-count {
            font-size: 12px;
            color: var(--color-gray-500);
            margin-left: 0.5rem;
        }
        
        /* 搜索高亮样式 */
        .search-highlight {
            background: linear-gradient(120deg, #ffd54f 0%, #fff176 100%);
            border-radius: 2px;
            padding: 0 2px;
        }
        
        /* 搜索历史和建议 */
        .search-suggestions {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 1px solid var(--color-gray-200);
            border-radius: 0 0 8px 8px;
            box-shadow: var(--shadow-lg);
            z-index: 100;
            max-height: 300px;
            overflow-y: auto;
            display: none;
        }
        .search-suggestions.active {
            display: block;
        }
        .search-suggestion-item {
            padding: 0.75rem 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: background 0.15s;
        }
        .search-suggestion-item:hover {
            background: var(--color-gray-50);
        }
        .search-suggestion-icon {
            color: var(--color-gray-400);
            font-size: 14px;
        }
        .search-suggestion-text {
            flex: 1;
        }
        .search-suggestion-type {
            font-size: 11px;
            color: var(--color-gray-500);
            background: var(--color-gray-100);
            padding: 2px 6px;
            border-radius: 4px;
        }
        
        /* 热门应用区域 */
        .hot-section {
            margin-bottom: 2rem;
        }
        .section-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }
        .section-title {
            font-size: 18px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .section-badge {
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 12px;
            background: linear-gradient(135deg, #ff6b6b, #ffa502);
            color: white;
        }
        .hot-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1rem;
        }
        .hot-card {
            background: linear-gradient(135deg, var(--color-primary-light), white);
            border: 1px solid var(--color-primary-light);
            border-radius: 12px;
            padding: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }
        .hot-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }
        .hot-card::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 60px;
            height: 60px;
            background: radial-gradient(circle at top right, rgba(255,255,255,0.3), transparent);
        }
        .hot-rank {
            position: absolute;
            top: 8px;
            left: 8px;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
        }
        .hot-rank-1 { background: linear-gradient(135deg, #ffd700, #ffb347); color: white; }
        .hot-rank-2 { background: linear-gradient(135deg, #c0c0c0, #a8a8a8); color: white; }
        .hot-rank-3 { background: linear-gradient(135deg, #cd7f32, #b8860b); color: white; }
        .hot-rank-other { background: var(--color-gray-200); color: var(--color-gray-600); }
        .hot-icon {
            font-size: 36px;
            margin-bottom: 0.5rem;
        }
        .hot-name {
            font-weight: 600;
            margin-bottom: 0.25rem;
        }
        .hot-category {
            font-size: 12px;
            color: var(--color-gray-500);
        }
        .hot-installs {
            font-size: 11px;
            color: var(--color-gray-400);
            margin-top: 0.5rem;
        }
        
        /* 快捷分类入口 */
        .quick-categories {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }
        .quick-cat-btn {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: white;
            border: 1px solid var(--color-gray-200);
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
        }
        .quick-cat-btn:hover {
            border-color: var(--color-primary);
            background: var(--color-primary-light);
        }
        .quick-cat-btn.active {
            background: var(--color-primary);
            color: white;
            border-color: var(--color-primary);
        }
        .quick-cat-icon {
            font-size: 16px;
        }
        .quick-cat-count {
            font-size: 11px;
            background: var(--color-gray-100);
            padding: 1px 6px;
            border-radius: 10px;
        }
        .quick-cat-btn.active .quick-cat-count {
            background: rgba(255,255,255,0.3);
        }
        
        /* 应用卡片热门标记 */
        .app-card-hot {
            position: absolute;
            top: -8px;
            right: -8px;
            background: linear-gradient(135deg, #ff6b6b, #ffa502);
            color: white;
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: 600;
        }
        
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            bottom: 0;
            width: 240px;
            background: white;
            border-right: 1px solid var(--color-gray-200);
            padding: 1.5rem;
            overflow-y: auto;
        }
        .main-content {
            margin-left: 240px;
            padding: 2rem;
        }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            color: var(--color-gray-600);
            border-radius: 8px;
            margin-bottom: 0.25rem;
            transition: all 0.2s;
            cursor: pointer;
        }
        .nav-item:hover, .nav-item.active {
            background: var(--color-primary-light);
            color: var(--color-primary);
        }
        .nav-item svg { width: 20px; height: 20px; }
        
        .app-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
        }
        .app-card {
            background: white;
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: var(--shadow-md);
            transition: all 0.2s;
            border: 2px solid transparent;
        }
        .app-card:hover {
            box-shadow: var(--shadow-lg);
            border-color: var(--color-primary-light);
        }
        .app-card.installed {
            border-color: var(--color-success);
        }
        .app-header {
            display: flex;
            align-items: flex-start;
            gap: 1rem;
            margin-bottom: 1rem;
        }
        .app-icon {
            font-size: 48px;
            line-height: 1;
        }
        .app-info h3 {
            margin-bottom: 0.25rem;
        }
        .app-category {
            font-size: 12px;
            color: var(--color-gray-500);
            background: var(--color-gray-100);
            padding: 2px 8px;
            border-radius: 4px;
        }
        .app-desc {
            color: var(--color-gray-600);
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 1rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .app-meta {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 1rem;
        }
        .app-tag {
            font-size: 11px;
            padding: 2px 6px;
            border-radius: 4px;
            background: var(--color-gray-100);
            color: var(--color-gray-600);
        }
        .app-actions {
            display: flex;
            gap: 0.5rem;
        }
        
        .category-filter {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }
        .category-btn {
            padding: 0.5rem 1rem;
            border-radius: 20px;
            border: 1px solid var(--color-gray-300);
            background: white;
            color: var(--color-gray-600);
            cursor: pointer;
            transition: all 0.2s;
        }
        .category-btn:hover, .category-btn.active {
            background: var(--color-primary);
            color: white;
            border-color: var(--color-primary);
        }
        
        .installed-section {
            margin-bottom: 2rem;
        }
        .installed-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1rem;
        }
        .installed-item {
            background: white;
            border-radius: 8px;
            padding: 1rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            box-shadow: var(--shadow-sm);
        }
        .installed-item .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }
        .status-running { background: var(--color-success); }
        .status-stopped { background: var(--color-gray-400); }
        .status-error { background: var(--color-error); }
        
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.2s;
        }
        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        .modal {
            background: white;
            border-radius: 16px;
            width: 90%;
            max-width: 600px;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--color-gray-200);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .modal-body {
            padding: 1.5rem;
        }
        .modal-footer {
            padding: 1.5rem;
            border-top: 1px solid var(--color-gray-200);
            display: flex;
            gap: 0.5rem;
            justify-content: flex-end;
        }
        
        .port-config, .volume-config {
            background: var(--color-gray-50);
            padding: 0.75rem;
            border-radius: 8px;
            margin-bottom: 0.75rem;
        }
        
        .install-type-btn {
            flex: 1;
            padding: 0.75rem 1rem;
            border: 2px solid var(--color-gray-300);
            background: white;
            color: var(--color-gray-600);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .install-type-btn:hover {
            border-color: var(--color-primary);
            color: var(--color-primary);
        }
        .install-type-btn.active {
            background: var(--color-primary);
            border-color: var(--color-primary);
            color: white;
        }
        
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .main-content { margin-left: 0; }
        }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <nav class="sidebar">
        <div class="header-brand" style="margin-bottom: 2rem;">
            <img src="../brand/logo/logo-64.png" alt="NAS-OS Logo" width="40" height="40">
            <h1 style="font-size: 20px;">NAS-OS</h1>
        </div>
        
        <div class="nav-item" onclick="window.location.href='../index.html'">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
            仪表盘
        </div>
        <div class="nav-item" onclick="window.location.href='storage.html'">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h14M5 12a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v4a2 2 0 01-2 2M5 12a2 2 0 00-2 2v4a2 2 0 002 2h14a2 2 0 002-2v-4a2 2 0 00-2-2m-2-4h.01M17 16h.01"/></svg>
            存储管理
        </div>
        <div class="nav-item" onclick="window.location.href='files.html'">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/></svg>
            文件管理
        </div>
        <div class="nav-item active">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/></svg>
            应用商店
        </div>
        <div class="nav-item" onclick="window.location.href='monitor.html'">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
            系统监控
        </div>
        <div class="nav-item" onclick="window.location.href='network.html'">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.111 16.404a5.5 5.5 0 017.778 0M12 20h.01m-7.08-7.071c3.904-3.905 10.236-3.905 14.141 0M1.394 9.393c5.857-5.857 15.355-5.857 21.213 0"/></svg>
            网络配置
        </div>
        <div class="nav-item" onclick="window.location.href='settings.html'">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
            设置
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <div class="container">
            <div style="margin-bottom: 2rem; display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <h1 style="margin-bottom: 0.5rem;">📦 应用商店</h1>
                    <p class="text-muted">发现和安装常用应用</p>
                </div>
                <button class="btn btn-primary" onclick="showManualInstallModal()">
                    ➕ 手动安装
                </button>
            </div>

            <!-- 已安装应用 -->
            <div class="installed-section card" id="installed-section" style="display: none;">
                <div class="card-header">
                    <h2 class="card-title">✅ 已安装应用</h2>
                </div>
                <div class="installed-list" id="installed-list"></div>
            </div>

            <!-- 搜索框 -->
            <div class="search-box">
                <svg class="search-icon" width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                </svg>
                <input type="text" class="search-input" id="app-search" 
                       placeholder="搜索应用名称、描述或分类..." 
                       oninput="searchApps(this.value)" 
                       onfocus="showSuggestions()" 
                       onblur="hideSuggestionsDelayed()">
                <span class="search-count" id="search-count"></span>
                
                <!-- 搜索建议下拉 -->
                <div class="search-suggestions" id="search-suggestions">
                    <!-- 动态加载 -->
                </div>
            </div>

            <!-- 快捷分类入口 -->
            <div class="quick-categories" id="quick-categories">
                <!-- 动态加载 -->
            </div>

            <!-- 热门应用推荐 -->
            <div class="hot-section card" id="hot-section">
                <div class="section-header">
                    <h2 class="section-title">
                        🔥 热门推荐
                        <span class="section-badge">TOP 6</span>
                    </h2>
                </div>
                <div class="hot-grid" id="hot-grid">
                    <!-- 动态加载 -->
                </div>
            </div>

            <!-- 分类筛选（详细版） -->
            <div class="category-filter" id="category-filter" style="display: none;">
                <button class="category-btn active" data-category="">
                    <span class="category-icon">📦</span>全部
                </button>
            </div>

            <!-- 搜索空状态提示 -->
            <div class="search-empty-state" id="search-empty">
                <div class="search-empty-icon">🔍</div>
                <div class="search-empty-title">未找到匹配的应用</div>
                <div class="search-empty-desc">尝试使用其他关键词搜索，或清除筛选条件</div>
                <button class="search-empty-btn" onclick="clearSearch()">清除搜索</button>
            </div>

            <!-- 应用目录 -->
            <div class="app-grid" id="app-grid">
                <!-- 动态加载 -->
            </div>
        </div>
    </main>

    <!-- 安装进度条组件 -->
    <div class="install-progress" id="install-progress">
        <div class="install-progress-header">
            <span class="install-progress-icon" id="progress-icon">⏳</span>
            <span class="font-medium" id="progress-title">正在安装...</span>
        </div>
        <div class="install-progress-bar">
            <div class="install-progress-fill" id="progress-fill" style="width: 0%"></div>
        </div>
        <div class="install-progress-text">
            <span id="progress-text">准备安装环境...</span>
        </div>
    </div>

    <!-- 安装配置 Modal -->
    <div class="modal-overlay" id="install-modal">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modal-title">安装应用</h3>
                <button class="btn btn-secondary btn-sm" onclick="closeModal()">✕</button>
            </div>
            <div class="modal-body" id="modal-body">
                <!-- 动态内容 -->
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal()">取消</button>
                <button class="btn btn-primary" id="install-btn" onclick="confirmInstall()">安装</button>
            </div>
        </div>
    </div>

    <!-- 应用详情 Modal -->
    <div class="modal-overlay" id="detail-modal">
        <div class="modal">
            <div class="modal-header">
                <h3 id="detail-title">应用详情</h3>
                <button class="btn btn-secondary btn-sm" onclick="closeDetailModal()">✕</button>
            </div>
            <div class="modal-body" id="detail-body">
                <!-- 动态内容 -->
            </div>
            <div class="modal-footer" id="detail-footer">
                <!-- 动态按钮 -->
            </div>
        </div>
    </div>

    <!-- 手动安装 Modal -->
    <div class="modal-overlay" id="manual-install-modal">
        <div class="modal" style="max-width: 700px;">
            <div class="modal-header">
                <h3>🔧 手动安装应用</h3>
                <button class="btn btn-secondary btn-sm" onclick="closeManualInstallModal()">✕</button>
            </div>
            <div class="modal-body">
                <!-- 安装类型选择 -->
                <div style="display: flex; gap: 0.5rem; margin-bottom: 1.5rem;">
                    <button class="btn install-type-btn active" data-type="compose" onclick="switchInstallType('compose')">Docker Compose</button>
                    <button class="btn install-type-btn" data-type="image" onclick="switchInstallType('image')">Docker 镜像</button>
                </div>

                <!-- Compose 表单 -->
                <div id="compose-form">
                    <div class="form-group">
                        <label class="form-label">Docker Compose 内容</label>
                        <textarea id="compose-content" class="form-input" rows="10" 
                            placeholder="粘贴 docker-compose.yml 内容..."></textarea>
                    </div>
                    <div class="form-group">
                        <label class="form-label">或从 URL 获取</label>
                        <input type="text" id="compose-url" class="form-input" 
                            placeholder="https://github.com/user/repo/docker-compose.yml">
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                        <div class="form-group">
                            <label class="form-label">显示名称</label>
                            <input type="text" id="compose-display-name" class="form-input" placeholder="我的应用">
                        </div>
                        <div class="form-group">
                            <label class="form-label">分类</label>
                            <select id="compose-category" class="form-input">
                                <option value="custom">自定义</option>
                                <option value="Media">媒体</option>
                                <option value="Productivity">生产力</option>
                                <option value="Development">开发</option>
                                <option value="Network">网络</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">描述</label>
                        <input type="text" id="compose-desc" class="form-input" placeholder="应用描述">
                    </div>
                    <div class="form-group">
                        <label class="form-label">图标</label>
                        <input type="text" id="compose-icon" class="form-input" value="📦" style="width: 100px;">
                    </div>
                </div>

                <!-- Image 表单 -->
                <div id="image-form" style="display: none;">
                    <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 1rem;">
                        <div class="form-group">
                            <label class="form-label">镜像名称 *</label>
                            <input type="text" id="image-name" class="form-input" placeholder="nginx">
                        </div>
                        <div class="form-group">
                            <label class="form-label">标签</label>
                            <input type="text" id="image-tag" class="form-input" value="latest" placeholder="latest">
                        </div>
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                        <div class="form-group">
                            <label class="form-label">容器名称</label>
                            <input type="text" id="container-name" class="form-input" placeholder="自动生成">
                        </div>
                        <div class="form-group">
                            <label class="form-label">显示名称</label>
                            <input type="text" id="app-display-name" class="form-input" placeholder="Nginx">
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">端口映射 (每行一个: 主机端口:容器端口[:协议])</label>
                        <textarea id="port-mappings" class="form-input" rows="3" 
                            placeholder="8080:80&#10;8443:443:tcp"></textarea>
                    </div>
                    <div class="form-group">
                        <label class="form-label">卷映射 (每行一个: 主机路径:容器路径)</label>
                        <textarea id="volume-mappings" class="form-input" rows="3" 
                            placeholder="/data/nginx:/usr/share/nginx/html&#10;/data/config:/etc/nginx"></textarea>
                    </div>
                    <div class="form-group">
                        <label class="form-label">环境变量 (每行一个: KEY=value)</label>
                        <textarea id="env-vars" class="form-input" rows="3" 
                            placeholder="TZ=Asia/Shanghai&#10;PUID=1000"></textarea>
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                        <div class="form-group">
                            <label class="form-label">网络模式</label>
                            <select id="network-mode" class="form-input">
                                <option value="">默认 (bridge)</option>
                                <option value="host">host</option>
                                <option value="none">none</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">重启策略</label>
                            <select id="restart-policy" class="form-input">
                                <option value="unless-stopped">unless-stopped</option>
                                <option value="always">always</option>
                                <option value="on-failure">on-failure</option>
                                <option value="no">no</option>
                            </select>
                        </div>
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                        <div class="form-group">
                            <label class="form-label">分类</label>
                            <select id="image-category" class="form-input">
                                <option value="custom">自定义</option>
                                <option value="Media">媒体</option>
                                <option value="Productivity">生产力</option>
                                <option value="Development">开发</option>
                                <option value="Network">网络</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">图标</label>
                            <input type="text" id="image-icon" class="form-input" value="📦" style="width: 100px;">
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">描述</label>
                        <input type="text" id="image-desc" class="form-input" placeholder="应用描述">
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeManualInstallModal()">取消</button>
                <button class="btn btn-primary" id="manual-install-btn" onclick="submitManualInstall()">安装</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/api/v1';
        let templates = [];
        let installedApps = [];
        let currentTemplate = null;
        let currentInstalled = null;
        let searchHistory = []; // 搜索历史
        const MAX_HISTORY = 10;
        
        // 热门应用定义（基于安装量和用户偏好）
        const HOT_APPS = [
            { id: 'jellyfin', name: 'Jellyfin', icon: '🎬', category: 'Media', installs: 12580 },
            { id: 'nextcloud', name: 'Nextcloud', icon: '☁️', category: 'Productivity', installs: 10890 },
            { id: 'homeassistant', name: 'Home Assistant', icon: '🏠', category: 'Smart Home', installs: 9520 },
            { id: 'plex', name: 'Plex', icon: '🎥', category: 'Media', installs: 8930 },
            { id: 'qbittorrent', name: 'qBittorrent', icon: '📥', category: 'Download', installs: 7850 },
            { id: 'syncthing', name: 'Syncthing', icon: '🔄', category: 'Backup', installs: 6420 }
        ];

        // 加载应用目录
        async function loadCatalog() {
            try {
                const res = await fetch(`${API_BASE}/apps/catalog`);
                const data = await res.json();
                if (data.code === 0) {
                    templates = data.data.templates || [];
                    
                    // 渲染分类按钮
                    const categories = Object.keys(data.data.categories || {});
                    renderCategoryFilter(categories);
                    renderQuickCategories(categories);
                    
                    // 渲染热门应用
                    renderHotApps();
                    
                    // 渲染应用
                    renderApps();
                }
            } catch (e) {
                console.error('加载应用目录失败:', e);
            }
        }

        // 加载已安装应用
        async function loadInstalled() {
            try {
                const res = await fetch(`${API_BASE}/apps/installed`);
                const data = await res.json();
                if (data.code === 0) {
                    installedApps = data.data || [];
                    renderInstalled();
                }
            } catch (e) {
                console.error('加载已安装应用失败:', e);
            }
        }

        // 渲染分类筛选
        function renderCategoryFilter(categories) {
            const container = document.getElementById('category-filter');
            container.innerHTML = '<button class="category-btn active" data-category=""><span class="category-icon">📦</span>全部</button>';
            
            categories.forEach(cat => {
                const info = getCategoryInfo(cat);
                const btn = document.createElement('button');
                btn.className = 'category-btn';
                btn.dataset.category = cat;
                btn.innerHTML = `<span class="category-icon">${info.icon}</span>${info.name}`;
                btn.onclick = () => filterByCategory(cat);
                container.appendChild(btn);
            });
        }

        // 获取分类中文名和图标
        function getCategoryInfo(cat) {
            const info = {
                'Productivity': { name: '生产力', icon: '💼', color: '#4CAF50' },
                'Media': { name: '媒体', icon: '🎬', color: '#E91E63' },
                'Smart Home': { name: '智能家居', icon: '🏠', color: '#2196F3' },
                'Network': { name: '网络', icon: '🌐', color: '#9C27B0' },
                'Download': { name: '下载', icon: '📥', color: '#FF5722' },
                'Development': { name: '开发', icon: '💻', color: '#00BCD4' },
                'Security': { name: '安全', icon: '🔒', color: '#F44336' },
                'Storage': { name: '存储', icon: '💾', color: '#607D8B' },
                'Backup': { name: '备份', icon: '💿', color: '#795548' },
                'custom': { name: '自定义', icon: '📦', color: '#9E9E9E' }
            };
            return info[cat] || { name: cat, icon: '📦', color: '#9E9E9E' };
        }

        // 获取分类中文名
        function getCategoryName(cat) {
            return getCategoryInfo(cat).name;
        }

        // 渲染快捷分类入口
        function renderQuickCategories(categories) {
            const container = document.getElementById('quick-categories');
            container.innerHTML = '';
            
            categories.forEach(cat => {
                const info = getCategoryInfo(cat);
                const count = templates.filter(t => t.category === cat).length;
                const btn = document.createElement('button');
                btn.className = 'quick-cat-btn';
                btn.dataset.category = cat;
                btn.innerHTML = `
                    <span class="quick-cat-icon">${info.icon}</span>
                    <span>${info.name}</span>
                    <span class="quick-cat-count">${count}</span>
                `;
                btn.onclick = () => filterByCategory(cat);
                container.appendChild(btn);
            });
        }

        // 渲染热门应用推荐
        function renderHotApps() {
            const container = document.getElementById('hot-grid');
            let hotHtml = '';
            
            HOT_APPS.forEach((hot, idx) => {
                const template = templates.find(t => t.id === hot.id);
                const installed = installedApps.find(a => a.templateId === hot.id);
                const rankClass = idx < 3 ? `hot-rank-${idx + 1}` : 'hot-rank-other';
                
                hotHtml += `
                    <div class="hot-card" onclick="showTemplateDetail('${hot.id}')">
                        <div class="hot-rank ${rankClass}">${idx + 1}</div>
                        <div class="hot-icon">${hot.icon}</div>
                        <div class="hot-name">${hot.name}</div>
                        <div class="hot-category">${getCategoryName(hot.category)}</div>
                        <div class="hot-installs">
                            ${installed ? '✅ 已安装' : `${hot.installs.toLocaleString()} 人使用`}
                        </div>
                    </div>
                `;
            });
            
            container.innerHTML = hotHtml;
            
            // 如果搜索或筛选激活，隐藏热门区域
            if (searchQuery || currentCategory) {
                document.getElementById('hot-section').style.display = 'none';
            } else {
                document.getElementById('hot-section').style.display = 'block';
            }
        }

        // 搜索建议功能
        function showSuggestions() {
            const input = document.getElementById('app-search');
            const suggestionsEl = document.getElementById('search-suggestions');
            const query = input.value.toLowerCase().trim();
            
            let suggestions = [];
            
            // 搜索历史（如果有）
            if (!query && searchHistory.length > 0) {
                searchHistory.slice(0, 5).forEach(h => {
                    suggestions.push({ type: 'history', text: h, icon: '🕐' });
                });
            }
            
            // 推荐应用名称
            if (query) {
                const matched = templates.filter(t => 
                    t.displayName.toLowerCase().includes(query) ||
                    t.category.toLowerCase().includes(query)
                ).slice(0, 5);
                
                matched.forEach(t => {
                    suggestions.push({ 
                        type: 'app', 
                        text: t.displayName, 
                        icon: t.icon,
                        category: getCategoryName(t.category)
                    });
                });
                
                // 推荐分类
                const matchedCategories = [...new Set(templates.map(t => t.category))]
                    .filter(cat => cat.toLowerCase().includes(query))
                    .slice(0, 3);
                
                matchedCategories.forEach(cat => {
                    const info = getCategoryInfo(cat);
                    suggestions.push({ 
                        type: 'category', 
                        text: info.name, 
                        icon: info.icon,
                        categoryKey: cat
                    });
                });
            }
            
            if (suggestions.length > 0) {
                suggestionsEl.innerHTML = suggestions.map(s => `
                    <div class="search-suggestion-item" onclick="${s.type === 'category' ? `filterByCategory('${s.categoryKey}')` : `selectSuggestion('${s.text}')`}">
                        <span class="search-suggestion-icon">${s.icon}</span>
                        <span class="search-suggestion-text">${s.text}</span>
                        <span class="search-suggestion-type">${s.type === 'history' ? '历史' : s.type === 'category' ? '分类' : s.category || '应用'}</span>
                    </div>
                `).join('');
                suggestionsEl.classList.add('active');
            } else {
                suggestionsEl.classList.remove('active');
            }
        }

        function hideSuggestionsDelayed() {
            setTimeout(() => {
                document.getElementById('search-suggestions').classList.remove('active');
            }, 200);
        }

        function selectSuggestion(text) {
            document.getElementById('app-search').value = text;
            searchApps(text);
            addToSearchHistory(text);
            document.getElementById('search-suggestions').classList.remove('active');
        }

        function addToSearchHistory(query) {
            if (query && !searchHistory.includes(query)) {
                searchHistory.unshift(query);
                if (searchHistory.length > MAX_HISTORY) {
                    searchHistory.pop();
                }
            }
        }

        // 搜索高亮
        function highlightText(text, query) {
            if (!query) return text;
            const regex = new RegExp(`(${query})`, 'gi');
            return text.replace(regex, '<span class="search-highlight">$1</span>');
        }

        // 按分类筛选
        function filterByCategory(category) {
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.category === category);
            });
            renderApps(category);
        }

        // 渲染已安装应用
        function renderInstalled() {
            const section = document.getElementById('installed-section');
            const container = document.getElementById('installed-list');
            
            if (installedApps.length === 0) {
                section.style.display = 'none';
                return;
            }
            
            section.style.display = 'block';
            container.innerHTML = installedApps.map(app => `
                <div class="installed-item" onclick="showInstalledDetail('${app.id}')">
                    <div class="status-dot status-${app.status === 'running' ? 'running' : 'stopped'}"></div>
                    <div style="flex: 1;">
                        <div class="font-medium">${app.displayName}</div>
                        <div class="text-sm text-muted">${app.status === 'running' ? '运行中' : '已停止'}</div>
                    </div>
                    <div class="app-actions">
                        ${app.status === 'running' ? 
                            `<button class="btn btn-sm btn-secondary" onclick="event.stopPropagation(); stopApp('${app.id}')">停止</button>` :
                            `<button class="btn btn-sm btn-secondary" onclick="event.stopPropagation(); startApp('${app.id}')">启动</button>`
                        }
                        <button class="btn btn-sm btn-danger" onclick="event.stopPropagation(); uninstallApp('${app.id}')">卸载</button>
                    </div>
                </div>
            `).join('');
        }

        // 搜索应用
        let searchQuery = '';
        function searchApps(query) {
            searchQuery = query.toLowerCase().trim();
            if (searchQuery) {
                addToSearchHistory(searchQuery);
            }
            renderApps(currentCategory);
            renderHotApps(); // 更新热门区域显示状态
        }

        // 清除搜索
        function clearSearch() {
            searchQuery = '';
            document.getElementById('app-search').value = '';
            renderApps(currentCategory);
            renderHotApps();
        }

        // 渲染应用列表
        let currentCategory = '';
        function renderApps(category = '') {
            const container = document.getElementById('app-grid');
            const emptyState = document.getElementById('search-empty');
            const searchCount = document.getElementById('search-count');
            let filtered = templates;
            
            // 分类筛选
            if (category) {
                filtered = filtered.filter(t => t.category === category);
            }
            
            // 搜索筛选
            if (searchQuery) {
                filtered = filtered.filter(t => 
                    t.displayName.toLowerCase().includes(searchQuery) ||
                    t.description.toLowerCase().includes(searchQuery) ||
                    t.category.toLowerCase().includes(searchQuery) ||
                    (t.tags && t.tags.some(tag => tag.toLowerCase().includes(searchQuery)))
                );
            }
            
            currentCategory = category;
            
            // 更新搜索计数
            if (searchQuery) {
                searchCount.textContent = `找到 ${filtered.length} 个结果`;
            } else {
                searchCount.textContent = '';
            }
            
            // 显示/隐藏空状态
            if (filtered.length === 0) {
                container.innerHTML = '';
                emptyState.classList.add('active');
                return;
            } else {
                emptyState.classList.remove('active');
            }
            
            container.innerHTML = filtered.map(template => {
                const installed = installedApps.find(a => a.templateId === template.id);
                const isHot = HOT_APPS.some(h => h.id === template.id);
                const hotIdx = HOT_APPS.findIndex(h => h.id === template.id);
                return `
                    <div class="app-card ${installed ? 'installed' : ''}" style="position: relative;">
                        ${isHot ? `<div class="app-card-hot">🔥 TOP ${hotIdx + 1}</div>` : ''}
                        <div class="app-header">
                            <div class="app-icon">${template.icon}</div>
                            <div class="app-info">
                                <h3>${highlightText(template.displayName, searchQuery)}</h3>
                                <span class="app-category">${highlightText(getCategoryName(template.category), searchQuery)}</span>
                            </div>
                        </div>
                        <p class="app-desc">${highlightText(template.description, searchQuery)}</p>
                        <div class="app-meta">
                            ${template.ports ? template.ports.map(p => `<span class="app-tag">端口: ${p.default}</span>`).join('') : ''}
                        </div>
                        <div class="app-actions">
                            ${installed ? 
                                `<button class="btn btn-secondary" style="flex:1;" onclick="showInstalledDetail('${installed.id}')">管理</button>` :
                                `<button class="btn btn-primary" style="flex:1;" onclick="showInstallModal('${template.id}')">安装</button>`
                            }
                            <button class="btn btn-secondary" onclick="showTemplateDetail('${template.id}')">详情</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // 显示安装配置弹窗
        function showInstallModal(templateId) {
            const template = templates.find(t => t.id === templateId);
            if (!template) return;
            
            currentTemplate = template;
            document.getElementById('modal-title').textContent = `安装 ${template.displayName}`;
            
            let bodyHtml = `<p class="text-muted mb-4">${template.description}</p>`;
            
            // 端口配置
            if (template.ports && template.ports.length > 0) {
                bodyHtml += '<h4 style="margin-bottom: 0.75rem;">端口配置</h4>';
                template.ports.forEach(port => {
                    bodyHtml += `
                        <div class="port-config">
                            <div class="flex justify-between items-center">
                                <div>
                                    <div class="font-medium">${port.description}</div>
                                    <div class="text-sm text-muted">容器端口: ${port.port}/${port.protocol}</div>
                                </div>
                                <input type="number" class="form-input" style="width: 100px;" 
                                       id="port_${port.port}" value="${port.default}" min="1" max="65535">
                            </div>
                        </div>
                    `;
                });
            }
            
            // 存储卷配置
            if (template.volumes && template.volumes.length > 0) {
                bodyHtml += '<h4 style="margin: 1.5rem 0 0.75rem;">存储配置</h4>';
                template.volumes.forEach(vol => {
                    bodyHtml += `
                        <div class="volume-config">
                            <div class="font-medium mb-1">${vol.description}</div>
                            <div class="text-sm text-muted mb-2">容器路径: ${vol.containerPath}</div>
                            <input type="text" class="form-input" 
                                   id="vol_${vol.containerPath.replace(/\//g, '_')}" 
                                   value="${vol.default}" placeholder="主机路径">
                        </div>
                    `;
                });
            }
            
            // 环境变量
            if (template.environment && Object.keys(template.environment).length > 0) {
                bodyHtml += '<h4 style="margin: 1.5rem 0 0.75rem;">环境变量</h4>';
                Object.entries(template.environment).forEach(([key, value]) => {
                    bodyHtml += `
                        <div class="form-group">
                            <label class="form-label">${key}</label>
                            <input type="text" class="form-input" id="env_${key}" value="${value}">
                        </div>
                    `;
                });
            }
            
            // 注意事项
            if (template.notes) {
                bodyHtml += `
                    <div class="alert alert-info mt-4">
                        <strong>注意:</strong> ${template.notes}
                    </div>
                `;
            }
            
            document.getElementById('modal-body').innerHTML = bodyHtml;
            document.getElementById('install-modal').classList.add('active');
        }

        // 关闭弹窗
        function closeModal() {
            document.getElementById('install-modal').classList.remove('active');
            currentTemplate = null;
        }

        // === 安装进度条控制 ===
        function showInstallProgress(title = '正在安装...') {
            const progress = document.getElementById('install-progress');
            const progressTitle = document.getElementById('progress-title');
            const progressFill = document.getElementById('progress-fill');
            const progressText = document.getElementById('progress-text');
            const progressIcon = document.getElementById('progress-icon');
            
            progressTitle.textContent = title;
            progressFill.style.width = '0%';
            progressText.textContent = '准备安装环境...';
            progressIcon.textContent = '⏳';
            progressIcon.style.animation = 'spin 1s linear infinite';
            progress.classList.add('active');
        }

        function updateInstallProgress(percent, text) {
            const progressFill = document.getElementById('progress-fill');
            const progressText = document.getElementById('progress-text');
            
            progressFill.style.width = percent + '%';
            progressText.textContent = text;
        }

        function hideInstallProgress(success = true, message = '') {
            const progress = document.getElementById('install-progress');
            const progressIcon = document.getElementById('progress-icon');
            const progressTitle = document.getElementById('progress-title');
            const progressText = document.getElementById('progress-text');
            
            progressIcon.style.animation = 'none';
            
            if (success) {
                progressIcon.textContent = '✅';
                progressTitle.textContent = '安装成功';
                progressText.innerHTML = `<span class="install-progress-status success">✓ ${message || '应用已成功安装'}</span>`;
            } else {
                progressIcon.textContent = '❌';
                progressTitle.textContent = '安装失败';
                progressText.innerHTML = `<span class="install-progress-status error">✗ ${message || '安装过程中出现错误'}</span>`;
            }
            
            setTimeout(() => {
                progress.classList.remove('active');
            }, 3000);
        }

        // 确认安装
        async function confirmInstall() {
            if (!currentTemplate) return;
            
            closeModal();
            showInstallProgress(`安装 ${currentTemplate.displayName}`);
            
            // 模拟进度更新
            updateInstallProgress(10, '拉取镜像...');
            await new Promise(r => setTimeout(r, 500));
            updateInstallProgress(30, '创建容器...');
            await new Promise(r => setTimeout(r, 500));
            updateInstallProgress(50, '配置网络...');
            await new Promise(r => setTimeout(r, 500));
            updateInstallProgress(70, '设置存储卷...');
            await new Promise(r => setTimeout(r, 500));
            
            // 收集配置
            const config = { ports: {}, volumes: {}, environment: {} };
            
            currentTemplate.ports?.forEach(port => {
                const input = document.getElementById(`port_${port.port}`);
                if (input) config.ports[`port_${port.port}`] = parseInt(input.value);
            });
            
            currentTemplate.volumes?.forEach(vol => {
                const input = document.getElementById(`vol_${vol.containerPath.replace(/\//g, '_')}`);
                if (input) config.volumes[`vol_${vol.containerPath.replace(/\//g, '_')}`] = input.value;
            });
            
            Object.keys(currentTemplate.environment || {}).forEach(key => {
                const input = document.getElementById(`env_${key}`);
                if (input) config.environment[key] = input.value;
            });
            
            updateInstallProgress(90, '启动服务...');
            
            try {
                const res = await fetch(`${API_BASE}/apps/install/${currentTemplate.id}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(config)
                });
                const data = await res.json();
                
                if (data.code === 0) {
                    updateInstallProgress(100, '完成');
                    hideInstallProgress(true, '应用已成功安装');
                    loadInstalled();
                    renderApps();
                } else {
                    hideInstallProgress(false, data.message);
                }
            } catch (e) {
                hideInstallProgress(false, e.message);
            }
            
            currentTemplate = null;
        }

        // 显示模板详情
        function showTemplateDetail(templateId) {
            const template = templates.find(t => t.id === templateId);
            if (!template) return;
            
            document.getElementById('detail-title').textContent = template.displayName;
            
            const body = `
                <div style="text-align: center; margin-bottom: 1.5rem;">
                    <div style="font-size: 64px;">${template.icon}</div>
                </div>
                <p style="margin-bottom: 1rem;">${template.description}</p>
                <div class="mb-4">
                    <strong>分类:</strong> ${getCategoryName(template.category)}<br>
                    <strong>版本:</strong> ${template.version}<br>
                    <strong>镜像:</strong> <code>${template.image}</code>
                </div>
                ${template.notes ? `<div class="alert alert-info">${template.notes}</div>` : ''}
                ${template.website ? `<a href="${template.website}" target="_blank" class="btn btn-secondary">访问官网</a>` : ''}
            `;
            
            document.getElementById('detail-body').innerHTML = body;
            document.getElementById('detail-footer').innerHTML = `
                <button class="btn btn-secondary" onclick="closeDetailModal()">关闭</button>
                <button class="btn btn-primary" onclick="closeDetailModal(); showInstallModal('${template.id}')">安装</button>
            `;
            
            document.getElementById('detail-modal').classList.add('active');
        }

        // 关闭详情弹窗
        function closeDetailModal() {
            document.getElementById('detail-modal').classList.remove('active');
        }

        // 显示已安装应用详情
        function showInstalledDetail(appId) {
            const app = installedApps.find(a => a.id === appId);
            if (!app) return;
            
            currentInstalled = app;
            
            document.getElementById('detail-title').textContent = app.displayName;
            
            let portsHtml = '';
            if (app.ports) {
                Object.entries(app.ports).forEach(([container, host]) => {
                    portsHtml += `<span class="app-tag">${host}:${container}</span> `;
                });
            }
            
            const body = `
                <div style="margin-bottom: 1.5rem;">
                    <div class="flex items-center gap-2 mb-2">
                        <div class="status-dot status-${app.status === 'running' ? 'running' : 'stopped'}"></div>
                        <span class="font-medium">${app.status === 'running' ? '运行中' : '已停止'}</span>
                    </div>
                    <div class="text-sm text-muted">安装时间: ${new Date(app.installTime).toLocaleString()}</div>
                </div>
                
                <h4 style="margin-bottom: 0.5rem;">端口映射</h4>
                <div class="mb-4">${portsHtml || '无'}</div>
                
                <h4 style="margin-bottom: 0.5rem;">存储卷</h4>
                <div class="mb-4">
                    ${Object.entries(app.volumes || {}).map(([container, host]) => 
                        `<div class="text-sm mb-1"><code>${host}</code> → <code>${container}</code></div>`
                    ).join('') || '无'}
                </div>
                
                ${app.status === 'running' ? `
                    <h4 style="margin-bottom: 0.5rem;">访问地址</h4>
                    ${Object.entries(app.ports || {}).map(([container, host]) => 
                        `<a href="http://${window.location.hostname}:${host}" target="_blank" class="btn btn-secondary btn-sm">打开 :${host}</a>`
                    ).join(' ')}
                ` : ''}
            `;
            
            document.getElementById('detail-body').innerHTML = body;
            document.getElementById('detail-footer').innerHTML = `
                <button class="btn btn-danger" onclick="uninstallApp('${app.id}')">卸载</button>
                ${app.status === 'running' ? 
                    `<button class="btn btn-secondary" onclick="stopApp('${app.id}')">停止</button>` :
                    `<button class="btn btn-success" onclick="startApp('${app.id}')">启动</button>`
                }
                <button class="btn btn-secondary" onclick="restartApp('${app.id}')">重启</button>
                <button class="btn btn-primary" onclick="updateApp('${app.id}')">更新</button>
            `;
            
            document.getElementById('detail-modal').classList.add('active');
        }

        // 启动应用
        async function startApp(id) {
            try {
                const res = await fetch(`${API_BASE}/apps/installed/${id}/start`, { method: 'POST' });
                const data = await res.json();
                if (data.code === 0) {
                    loadInstalled();
                    renderApps();
                    closeDetailModal();
                } else {
                    alert('启动失败: ' + data.message);
                }
            } catch (e) {
                alert('启动失败: ' + e.message);
            }
        }

        // 停止应用
        async function stopApp(id) {
            try {
                const res = await fetch(`${API_BASE}/apps/installed/${id}/stop`, { method: 'POST' });
                const data = await res.json();
                if (data.code === 0) {
                    loadInstalled();
                    renderApps();
                    closeDetailModal();
                } else {
                    alert('停止失败: ' + data.message);
                }
            } catch (e) {
                alert('停止失败: ' + e.message);
            }
        }

        // 重启应用
        async function restartApp(id) {
            try {
                const res = await fetch(`${API_BASE}/apps/installed/${id}/restart`, { method: 'POST' });
                const data = await res.json();
                if (data.code === 0) {
                    loadInstalled();
                    alert('应用已重启');
                } else {
                    alert('重启失败: ' + data.message);
                }
            } catch (e) {
                alert('重启失败: ' + e.message);
            }
        }

        // 更新应用
        async function updateApp(id) {
            if (!confirm('确定要更新此应用吗？')) return;
            
            try {
                const res = await fetch(`${API_BASE}/apps/installed/${id}/update`, { method: 'POST' });
                const data = await res.json();
                if (data.code === 0) {
                    alert('应用已更新');
                } else {
                    alert('更新失败: ' + data.message);
                }
            } catch (e) {
                alert('更新失败: ' + e.message);
            }
        }

        // 卸载应用
        async function uninstallApp(id) {
            const removeData = confirm('是否同时删除应用数据？\n\n确定 = 删除数据\n取消 = 保留数据');
            
            try {
                const res = await fetch(`${API_BASE}/apps/installed/${id}?removeData=${removeData}`, { 
                    method: 'DELETE' 
                });
                const data = await res.json();
                if (data.code === 0) {
                    loadInstalled();
                    loadCatalog();
                    closeDetailModal();
                } else {
                    alert('卸载失败: ' + data.message);
                }
            } catch (e) {
                alert('卸载失败: ' + e.message);
            }
        }

        // === 手动安装功能 ===
        let installType = 'compose';

        function showManualInstallModal() {
            document.getElementById('manual-install-modal').classList.add('active');
            switchInstallType('compose');
        }

        function closeManualInstallModal() {
            document.getElementById('manual-install-modal').classList.remove('active');
        }

        function switchInstallType(type) {
            installType = type;
            document.querySelectorAll('.install-type-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.type === type);
            });
            document.getElementById('compose-form').style.display = type === 'compose' ? 'block' : 'none';
            document.getElementById('image-form').style.display = type === 'image' ? 'block' : 'none';
        }

        function submitManualInstall() {
            const btn = document.getElementById('manual-install-btn');
            btn.disabled = true;
            btn.textContent = '安装中...';

            const req = { type: installType };

            if (installType === 'compose') {
                req.composeContent = document.getElementById('compose-content').value;
                req.composeUrl = document.getElementById('compose-url').value;
                if (!req.composeContent && !req.composeUrl) {
                    alert('请提供 docker-compose 内容或 URL');
                    btn.disabled = false;
                    btn.textContent = '安装';
                    return;
                }
            } else {
                req.image = document.getElementById('image-name').value;
                if (!req.image) {
                    alert('请提供镜像名称');
                    btn.disabled = false;
                    btn.textContent = '安装';
                    return;
                }
                req.tag = document.getElementById('image-tag').value || 'latest';
                req.name = document.getElementById('container-name').value;
                req.displayName = document.getElementById('app-display-name').value;
                
                // 端口映射
                const portsText = document.getElementById('port-mappings').value;
                if (portsText) {
                    req.ports = portsText.split('\n').filter(l => l.trim()).map(line => {
                        const [host, container, protocol] = line.split(':');
                        return {
                            hostPort: parseInt(host),
                            containerPort: parseInt(container),
                            protocol: protocol || 'tcp'
                        };
                    });
                }

                // 卷映射
                const volumesText = document.getElementById('volume-mappings').value;
                if (volumesText) {
                    req.volumes = volumesText.split('\n').filter(l => l.trim()).map(line => {
                        const [host, container] = line.split(':');
                        return { hostPath: host, containerPath: container };
                    });
                }

                // 环境变量
                const envText = document.getElementById('env-vars').value;
                if (envText) {
                    req.environment = {};
                    envText.split('\n').filter(l => l.trim()).forEach(line => {
                        const [key, ...values] = line.split('=');
                        req.environment[key] = values.join('=');
                    });
                }

                req.network = document.getElementById('network-mode').value;
                req.restart = document.getElementById('restart-policy').value;
            }

            req.displayName = req.displayName || document.getElementById('compose-display-name').value;
            req.description = document.getElementById('compose-desc').value || document.getElementById('image-desc').value;
            req.category = document.getElementById('compose-category').value || document.getElementById('image-category').value || 'custom';
            req.icon = document.getElementById('compose-icon').value || document.getElementById('image-icon').value || '📦';

            fetch(`${API_BASE}/apps/install`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(req)
            })
            .then(res => res.json())
            .then(data => {
                if (data.code === 0) {
                    alert('安装成功！');
                    closeManualInstallModal();
                    loadInstalled();
                    loadCatalog();
                    // 显示依赖信息
                    if (data.data.dependencies && data.data.dependencies.length > 0) {
                        alert('检测到依赖服务: ' + data.data.dependencies.join(', ') + '\n请确保这些服务已启动。');
                    }
                } else {
                    alert('安装失败: ' + data.message);
                }
            })
            .catch(e => alert('安装失败: ' + e.message))
            .finally(() => {
                btn.disabled = false;
                btn.textContent = '安装';
            });
        }

        // 初始化
        loadInstalled();
        loadCatalog();
        
        // 定时刷新
        setInterval(loadInstalled, 30000);
    </script>
</body>
</html>
