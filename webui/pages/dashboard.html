<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>仪表板 - NAS-OS</title>
    <link rel="icon" type="image/png" sizes="32x32" href="../brand/logo/logo-32.png">
    <link rel="stylesheet" href="../css/design-system.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* 仪表板专用样式 */
        .dashboard-page {
            padding: 24px;
            max-width: 1600px;
            margin: 0 auto;
        }

        /* 头部 */
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 16px;
        }

        .dashboard-title {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .dashboard-controls {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: var(--surface-color);
            border-radius: 20px;
            border: 1px solid var(--surface-border);
            font-size: 14px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            transition: all 0.3s;
        }

        .status-dot.connected {
            background: var(--color-success);
            box-shadow: 0 0 8px var(--color-success);
            animation: pulse 2s infinite;
        }

        .status-dot.disconnected {
            background: var(--color-error);
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* 统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: linear-gradient(135deg, var(--color-primary) 0%, #1D4ED8 100%);
            border-radius: 16px;
            padding: 24px;
            color: white;
            position: relative;
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .stat-card:nth-child(2) {
            background: linear-gradient(135deg, #10B981 0%, #059669 100%);
        }

        .stat-card:nth-child(3) {
            background: linear-gradient(135deg, #F59E0B 0%, #D97706 100%);
        }

        .stat-card:nth-child(4) {
            background: linear-gradient(135deg, #8B5CF6 0%, #7C3AED 100%);
        }

        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px rgba(0,0,0,0.15);
        }

        .stat-card-icon {
            position: absolute;
            right: 16px;
            top: 16px;
            font-size: 48px;
            opacity: 0.3;
        }

        .stat-card-label {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 8px;
        }

        .stat-card-value {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .stat-card-detail {
            font-size: 13px;
            opacity: 0.8;
        }

        .stat-card-progress {
            margin-top: 12px;
            height: 4px;
            background: rgba(255,255,255,0.3);
            border-radius: 2px;
            overflow: hidden;
        }

        .stat-card-progress-bar {
            height: 100%;
            background: rgba(255,255,255,0.9);
            border-radius: 2px;
            transition: width 0.5s;
        }

        /* 主内容区 */
        .main-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 24px;
            margin-bottom: 24px;
        }

        /* 卡片 */
        .panel {
            background: var(--surface-color);
            border-radius: 16px;
            border: 1px solid var(--surface-border);
            overflow: hidden;
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 24px;
            border-bottom: 1px solid var(--surface-border);
        }

        .panel-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .panel-body {
            padding: 24px;
        }

        /* 图表容器 */
        .chart-container {
            height: 250px;
            position: relative;
        }

        .charts-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 24px;
            margin-bottom: 24px;
        }

        .mini-chart {
            height: 200px;
        }

        /* 服务列表 */
        .service-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px;
            border-radius: 12px;
            background: var(--bg-tertiary);
            margin-bottom: 12px;
            transition: all 0.2s;
        }

        .service-item:last-child {
            margin-bottom: 0;
        }

        .service-item:hover {
            background: var(--color-primary-light);
        }

        .service-icon {
            font-size: 24px;
            margin-right: 12px;
        }

        .service-name {
            font-weight: 600;
            color: var(--text-primary);
            flex: 1;
        }

        /* 活动日志 */
        .activity-item {
            display: flex;
            align-items: flex-start;
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 12px;
            background: var(--bg-tertiary);
            transition: all 0.2s;
        }

        .activity-item:hover {
            background: var(--bg-secondary);
        }

        .activity-icon {
            font-size: 20px;
            margin-right: 12px;
            flex-shrink: 0;
        }

        .activity-content {
            flex: 1;
        }

        .activity-message {
            font-size: 14px;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .activity-time {
            font-size: 12px;
            color: var(--text-muted);
        }

        .activity-success .activity-icon { color: var(--color-success); }
        .activity-warning .activity-icon { color: var(--color-warning); }
        .activity-error .activity-icon { color: var(--color-error); }
        .activity-info .activity-icon { color: var(--color-info); }

        /* 磁盘列表 */
        .disk-item {
            padding: 16px;
            border-radius: 12px;
            background: var(--bg-tertiary);
            margin-bottom: 12px;
        }

        .disk-item:last-child {
            margin-bottom: 0;
        }

        .disk-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .disk-name {
            font-weight: 600;
            color: var(--text-primary);
        }

        .disk-mount {
            font-size: 13px;
            color: var(--text-muted);
        }

        .disk-info {
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
            font-size: 12px;
            color: var(--text-muted);
        }

        /* 快速操作 */
        .quick-actions {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .quick-action-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: var(--bg-tertiary);
            border: 1px solid var(--surface-border);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }

        .quick-action-btn:hover {
            background: var(--color-primary-light);
            border-color: var(--color-primary);
            transform: translateY(-2px);
        }

        .quick-action-btn.danger:hover {
            background: var(--color-error-bg);
            border-color: var(--color-error);
        }

        .quick-action-icon {
            font-size: 28px;
            margin-bottom: 8px;
        }

        .quick-action-label {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
        }

        /* 系统信息 */
        .info-list {
            list-style: none;
        }

        .info-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid var(--surface-border);
        }

        .info-item:last-child {
            border-bottom: none;
        }

        .info-label {
            color: var(--text-muted);
            font-size: 14px;
        }

        .info-value {
            color: var(--text-primary);
            font-weight: 500;
            font-size: 14px;
        }

        /* 进度条颜色 */
        .progress-bar.success { background: var(--color-success); }
        .progress-bar.warning { background: var(--color-warning); }
        .progress-bar.error { background: var(--color-error); }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
        }

        /* 模态框 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .modal {
            background: var(--surface-color);
            border-radius: 16px;
            width: 90%;
            max-width: 480px;
            box-shadow: var(--shadow-xl);
        }

        .modal-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--surface-border);
        }

        .modal-header h3 {
            margin: 0;
            font-size: 18px;
        }

        .modal-body {
            padding: 24px;
        }

        .modal-footer {
            padding: 16px 24px;
            border-top: 1px solid var(--surface-border);
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }

        /* 响应式 */
        @media (max-width: 1200px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .main-grid { grid-template-columns: 1fr; }
            .charts-grid { grid-template-columns: 1fr; }
        }

        @media (max-width: 768px) {
            .dashboard-page { padding: 16px; }
            .stats-grid { grid-template-columns: 1fr; }
            .dashboard-header { flex-direction: column; align-items: flex-start; }
            .quick-actions { grid-template-columns: 1fr; }
        }

        /* 刷新控制 */
        .refresh-controls {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .refresh-toggle {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: var(--text-muted);
        }

        .refresh-toggle input {
            width: 16px;
            height: 16px;
        }

        .refresh-rate-select {
            padding: 6px 12px;
            border-radius: 8px;
            border: 1px solid var(--surface-border);
            background: var(--surface-color);
            font-size: 13px;
            color: var(--text-primary);
        }
    </style>
</head>
<body>
    <div class="dashboard-page">
        <!-- 头部 -->
        <div class="dashboard-header">
            <h1 class="dashboard-title">
                <span>📊</span>
                系统仪表板
            </h1>
            <div class="dashboard-controls">
                <div class="status-indicator">
                    <span class="status-dot connected" id="ws-status"></span>
                    <span id="connection-status">实时连接中</span>
                </div>
                <div class="refresh-controls">
                    <label class="refresh-toggle">
                        <input type="checkbox" id="auto-refresh-toggle" checked>
                        自动刷新
                    </label>
                    <select class="refresh-rate-select" id="refresh-rate">
                        <option value="3000">3秒</option>
                        <option value="5000" selected>5秒</option>
                        <option value="10000">10秒</option>
                        <option value="30000">30秒</option>
                    </select>
                </div>
                <button class="btn btn-secondary" id="refresh-btn">🔄 刷新</button>
                <button class="btn btn-secondary" id="theme-toggle">🌙</button>
            </div>
        </div>

        <!-- 统计卡片 -->
        <div class="stats-grid">
            <div class="stat-card">
                <span class="stat-card-icon">⚡</span>
                <div class="stat-card-label">CPU 使用率</div>
                <div class="stat-card-value" id="cpu-value">0%</div>
                <div class="stat-card-detail">
                    <span id="cpu-cores">0</span> 核心 · <span id="cpu-temp">--</span>°C
                </div>
                <div class="stat-card-progress">
                    <div class="stat-card-progress-bar" id="cpu-bar" style="width: 0%"></div>
                </div>
            </div>

            <div class="stat-card">
                <span class="stat-card-icon">💾</span>
                <div class="stat-card-label">内存使用</div>
                <div class="stat-card-value" id="memory-value">0%</div>
                <div class="stat-card-detail" id="memory-detail">0 / 0 GB</div>
                <div class="stat-card-progress">
                    <div class="stat-card-progress-bar" id="memory-bar" style="width: 0%"></div>
                </div>
            </div>

            <div class="stat-card">
                <span class="stat-card-icon">💿</span>
                <div class="stat-card-label">存储使用</div>
                <div class="stat-card-value" id="storage-value">0%</div>
                <div class="stat-card-detail"><span id="disk-count">0</span> 个磁盘</div>
                <div class="stat-card-progress">
                    <div class="stat-card-progress-bar" id="storage-bar" style="width: 0%"></div>
                </div>
            </div>

            <div class="stat-card">
                <span class="stat-card-icon">🌐</span>
                <div class="stat-card-label">网络流量</div>
                <div class="stat-card-value" id="network-value">0 Mbps</div>
                <div class="stat-card-detail">
                    ↓ <span id="rx-speed">0</span> MB/s · ↑ <span id="tx-speed">0</span> MB/s
                </div>
            </div>
        </div>

        <!-- 图表区域 -->
        <div class="charts-grid">
            <div class="panel">
                <div class="panel-header">
                    <h3 class="panel-title">📈 CPU 使用趋势</h3>
                </div>
                <div class="panel-body">
                    <div class="mini-chart">
                        <canvas id="cpu-chart"></canvas>
                    </div>
                </div>
            </div>

            <div class="panel">
                <div class="panel-header">
                    <h3 class="panel-title">📊 内存使用趋势</h3>
                </div>
                <div class="panel-body">
                    <div class="mini-chart">
                        <canvas id="memory-chart"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <!-- 主内容区 -->
        <div class="main-grid">
            <div>
                <!-- 存储使用趋势 -->
                <div class="panel" style="margin-bottom: 24px;">
                    <div class="panel-header">
                        <h3 class="panel-title">💾 存储使用分布</h3>
                    </div>
                    <div class="panel-body">
                        <div class="chart-container">
                            <canvas id="storage-chart"></canvas>
                        </div>
                    </div>
                </div>

                <!-- 网络流量 -->
                <div class="panel">
                    <div class="panel-header">
                        <h3 class="panel-title">🌐 网络流量</h3>
                    </div>
                    <div class="panel-body">
                        <div class="chart-container">
                            <canvas id="network-chart"></canvas>
                        </div>
                    </div>
                </div>
            </div>

            <div>
                <!-- 服务状态 -->
                <div class="panel" style="margin-bottom: 24px;">
                    <div class="panel-header">
                        <h3 class="panel-title">🔌 服务状态</h3>
                    </div>
                    <div class="panel-body">
                        <div id="services-list">
                            <div class="empty-state">加载中...</div>
                        </div>
                    </div>
                </div>

                <!-- 系统信息 -->
                <div class="panel">
                    <div class="panel-header">
                        <h3 class="panel-title">ℹ️ 系统信息</h3>
                    </div>
                    <div class="panel-body">
                        <ul class="info-list">
                            <li class="info-item">
                                <span class="info-label">主机名</span>
                                <span class="info-value" id="hostname">--</span>
                            </li>
                            <li class="info-item">
                                <span class="info-label">运行时间</span>
                                <span class="info-value" id="system-uptime">--</span>
                            </li>
                            <li class="info-item">
                                <span class="info-label">系统负载</span>
                                <span class="info-value" id="load-avg">--</span>
                            </li>
                            <li class="info-item">
                                <span class="info-label">进程数</span>
                                <span class="info-value" id="process-count">--</span>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>

        <!-- 磁盘健康 & 活动日志 -->
        <div class="main-grid">
            <div class="panel">
                <div class="panel-header">
                    <h3 class="panel-title">💿 磁盘健康</h3>
                </div>
                <div class="panel-body">
                    <div id="disk-list">
                        <div class="empty-state">加载中...</div>
                    </div>
                </div>
            </div>

            <div class="panel">
                <div class="panel-header">
                    <h3 class="panel-title">📋 最近活动</h3>
                </div>
                <div class="panel-body">
                    <div id="activities-list">
                        <div class="empty-state">加载中...</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- I/O 性能图表 -->
        <div class="panel" style="margin-bottom: 24px;">
            <div class="panel-header">
                <h3 class="panel-title">⚡ I/O 性能</h3>
            </div>
            <div class="panel-body">
                <div class="chart-container">
                    <canvas id="io-chart"></canvas>
                </div>
            </div>
        </div>

        <!-- 快速操作 -->
        <div class="panel">
            <div class="panel-header">
                <h3 class="panel-title">⚡ 快速操作</h3>
            </div>
            <div class="panel-body">
                <div class="quick-actions">
                    <button class="quick-action-btn" id="create-snapshot-btn">
                        <span class="quick-action-icon">📸</span>
                        <span class="quick-action-label">创建快照</span>
                    </button>
                    <button class="quick-action-btn" id="create-share-btn">
                        <span class="quick-action-icon">📁</span>
                        <span class="quick-action-label">创建共享</span>
                    </button>
                    <button class="quick-action-btn danger" id="reboot-btn">
                        <span class="quick-action-icon">🔄</span>
                        <span class="quick-action-label">重启系统</span>
                    </button>
                    <button class="quick-action-btn danger" id="shutdown-btn">
                        <span class="quick-action-icon">⏻</span>
                        <span class="quick-action-label">关闭系统</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast 容器 -->
    <div id="toast-container"></div>

    <!-- 加载 Dashboard JS -->
    <script src="../js/dashboard.js"></script>
</body>
</html>
