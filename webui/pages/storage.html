<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>存储管理 - NAS-OS</title>
    <link rel="icon" type="image/png" sizes="32x32" href="../brand/logo/logo-32.png">
    <link rel="stylesheet" href="../css/design-system.css">
    <style>
        .storage-container { max-width: 1400px; margin: 0 auto; }
        
        /* Tab 切换 */
        .tab-nav {
            display: flex;
            gap: 0;
            border-bottom: 2px solid var(--surface-border);
            margin-bottom: 1.5rem;
        }
        .tab-btn {
            padding: 0.75rem 1.5rem;
            font-size: 15px;
            font-weight: 500;
            color: var(--text-muted);
            background: none;
            border: none;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .tab-btn:hover {
            color: var(--text-primary);
        }
        .tab-btn.active {
            color: var(--color-primary);
            border-bottom-color: var(--color-primary);
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }

        /* 磁盘卡片 */
        .disk-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .disk-card {
            background: var(--surface-color);
            border-radius: 12px;
            padding: 1.25rem;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--surface-border);
            border-left: 4px solid var(--color-success);
            transition: box-shadow 0.2s;
        }
        .disk-card:hover {
            box-shadow: var(--shadow-md);
        }
        .disk-card.warning { border-left-color: var(--color-warning); }
        .disk-card.error { border-left-color: var(--color-error); }
        .disk-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
        }
        .disk-name {
            font-weight: 600;
            font-size: 15px;
            color: var(--text-primary);
        }
        .disk-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.5rem;
            margin-bottom: 0.75rem;
        }
        .disk-stat {
            background: var(--bg-tertiary);
            padding: 0.5rem 0.75rem;
            border-radius: 6px;
        }
        .disk-stat-label {
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 0.125rem;
        }
        .disk-stat-value {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
        }

        /* 卷卡片 */
        .volume-card {
            background: var(--surface-color);
            border-radius: 12px;
            padding: 1.25rem;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--surface-border);
            margin-bottom: 1rem;
        }
        .volume-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
        }
        .volume-name {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
        }
        .volume-meta {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 0.25rem;
        }
        .volume-usage {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .volume-usage-bar {
            width: 200px;
        }
        .volume-usage-text {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            min-width: 60px;
            text-align: right;
        }
        .volume-actions {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        /* 快照时间线 */
        .timeline-bar {
            display: flex;
            align-items: center;
            gap: 2px;
            height: 36px;
            margin: 1rem 0;
        }
        .timeline-block {
            flex: 1;
            height: 100%;
            background: var(--bg-tertiary);
            border-radius: 2px;
            transition: background 0.2s;
        }
        .timeline-block.has-snapshot {
            background: var(--color-primary);
        }
        .timeline-block:hover {
            opacity: 0.8;
        }

        /* 模态框 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .modal-overlay.show {
            display: flex;
        }
        .modal-content {
            background: var(--surface-color);
            border-radius: 12px;
            padding: 1.5rem;
            width: 100%;
            max-width: 480px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: var(--shadow-xl);
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }
        .modal-title {
            font-size: 18px;
            font-weight: 600;
        }
        .modal-close {
            background: none;
            border: none;
            font-size: 24px;
            color: var(--text-muted);
            cursor: pointer;
            padding: 0;
            line-height: 1;
        }
        .modal-close:hover {
            color: var(--text-primary);
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
        }
        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        /* 加载状态 */
        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid var(--surface-border);
            border-top-color: var(--color-primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .disk-grid {
                grid-template-columns: 1fr;
            }
            .volume-header {
                flex-direction: column;
                gap: 1rem;
            }
            .volume-usage-bar {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-content">
            <div class="header-brand">
                <img src="../brand/logo/logo-64.png" alt="Logo" width="40" height="40">
                <h1>NAS-OS</h1>
            </div>
            <nav class="header-nav">
                <a href="../index.html">仪表盘</a>
                <a href="#" class="active">存储管理</a>
                <a href="settings.html">设置</a>
            </nav>
            <div class="header-actions">
                <button class="theme-toggle" id="theme-toggle" title="切换主题"></button>
            </div>
        </div>
    </header>

    <!-- Main -->
    <main class="main">
        <div class="container storage-container">
            <!-- 页面标题 -->
            <div style="margin-bottom: 1.5rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem;">
                <div>
                    <h1 style="margin-bottom: 0.25rem;">💾 存储管理</h1>
                    <p class="text-muted" style="margin: 0;">管理存储卷、子卷和快照</p>
                </div>
                <div style="display: flex; gap: 0.5rem;">
                    <button class="btn btn-secondary" onclick="refreshAll()">🔄 刷新</button>
                    <button class="btn btn-primary" onclick="showCreateVolumeModal()">➕ 创建卷</button>
                </div>
            </div>

            <!-- Tab 导航 -->
            <div class="tab-nav">
                <button class="tab-btn active" data-tab="volumes">📦 存储卷</button>
                <button class="tab-btn" data-tab="subvolumes">📁 子卷</button>
                <button class="tab-btn" data-tab="snapshots">📸 快照</button>
                <button class="tab-btn" data-tab="disks">💿 物理磁盘</button>
                <button class="tab-btn" data-tab="quota">📊 存储配额</button>
            </div>

            <!-- 存储配额 Tab -->
            <div class="tab-content" id="tab-quota">
                <div style="margin-bottom: 1rem; display: flex; justify-content: space-between; align-items: center;">
                    <div>
                        <h3 style="margin: 0 0 0.25rem 0;">用户存储配额</h3>
                        <p class="text-muted" style="margin: 0; font-size: 13px;">管理用户和用户组的存储空间配额</p>
                    </div>
                    <button class="btn btn-primary btn-sm" onclick="showSetQuotaModal()">➕ 设置配额</button>
                </div>
                
                <!-- 配额概览 -->
                <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 1.5rem;">
                    <div style="background: var(--surface-color); border-radius: 12px; padding: 1.25rem; border: 1px solid var(--surface-border);">
                        <div style="font-size: 12px; color: var(--text-muted); margin-bottom: 0.5rem;">总配额</div>
                        <div style="font-size: 24px; font-weight: 700; color: var(--text-primary);" id="quota-total">10 TB</div>
                    </div>
                    <div style="background: var(--surface-color); border-radius: 12px; padding: 1.25rem; border: 1px solid var(--surface-border);">
                        <div style="font-size: 12px; color: var(--text-muted); margin-bottom: 0.5rem;">已分配</div>
                        <div style="font-size: 24px; font-weight: 700; color: var(--color-primary);" id="quota-allocated">6.5 TB</div>
                    </div>
                    <div style="background: var(--surface-color); border-radius: 12px; padding: 1.25rem; border: 1px solid var(--surface-border);">
                        <div style="font-size: 12px; color: var(--text-muted); margin-bottom: 0.5rem;">已使用</div>
                        <div style="font-size: 24px; font-weight: 700; color: var(--color-success);" id="quota-used">4.2 TB</div>
                    </div>
                    <div style="background: var(--surface-color); border-radius: 12px; padding: 1.25rem; border: 1px solid var(--surface-border);">
                        <div style="font-size: 12px; color: var(--text-muted); margin-bottom: 0.5rem;">超额用户</div>
                        <div style="font-size: 24px; font-weight: 700; color: var(--color-error);" id="quota-exceeded">2</div>
                    </div>
                </div>
                
                <div class="table-container">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>用户/组</th>
                                <th>类型</th>
                                <th>配额限制</th>
                                <th>已使用</th>
                                <th>使用率</th>
                                <th>状态</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="quota-tbody"></tbody>
                    </table>
                </div>
            </div>

            <!-- 存储卷 Tab -->
            <div class="tab-content active" id="tab-volumes">
                <div id="volumes-list"></div>
            </div>

            <!-- 子卷 Tab -->
            <div class="tab-content" id="tab-subvolumes">
                <div style="margin-bottom: 1rem; display: flex; justify-content: space-between; align-items: center;">
                    <select class="form-select" id="subvol-volume-filter" style="width: auto;" onchange="loadSubvolumes()">
                        <option value="">全部卷</option>
                    </select>
                    <button class="btn btn-primary btn-sm" onclick="showCreateSubvolumeModal()">➕ 创建子卷</button>
                </div>
                <div class="table-container">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>子卷名称</th>
                                <th>所属卷</th>
                                <th>路径</th>
                                <th>只读</th>
                                <th>快照数</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="subvolumes-tbody"></tbody>
                    </table>
                </div>
            </div>

            <!-- 快照 Tab -->
            <div class="tab-content" id="tab-snapshots">
                <div style="margin-bottom: 1rem; display: flex; justify-content: space-between; align-items: center;">
                    <select class="form-select" id="snapshot-volume-filter" style="width: auto;" onchange="loadSnapshots()">
                        <option value="">全部卷</option>
                    </select>
                    <button class="btn btn-primary btn-sm" onclick="showCreateSnapshotModal()">➕ 创建快照</button>
                </div>
                
                <!-- 快照时间线 -->
                <div style="background: var(--bg-tertiary); border-radius: 8px; padding: 1rem; margin-bottom: 1rem;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
                        <span style="font-size: 13px; font-weight: 600; color: var(--text-muted);">快照时间线 (最近 24 小时)</span>
                    </div>
                    <div class="timeline-bar" id="snapshot-timeline"></div>
                    <div style="display: flex; justify-content: space-between; font-size: 11px; color: var(--text-muted);">
                        <span>24小时前</span>
                        <span>现在</span>
                    </div>
                </div>

                <div class="table-container">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>快照名称</th>
                                <th>所属卷</th>
                                <th>子卷</th>
                                <th>创建时间</th>
                                <th>类型</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="snapshots-tbody"></tbody>
                    </table>
                </div>
            </div>

            <!-- 物理磁盘 Tab -->
            <div class="tab-content" id="tab-disks">
                <div class="disk-grid" id="disks-grid"></div>
            </div>
        </div>
    </main>

    <!-- 创建卷模态框 -->
    <div class="modal-overlay" id="modal-create-volume">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">📦 创建存储卷</h3>
                <button class="modal-close" onclick="closeModal('modal-create-volume')">&times;</button>
            </div>
            <div class="form-group">
                <label class="form-label">卷名称 *</label>
                <input type="text" class="form-input" id="volume-name" placeholder="例如: data">
            </div>
            <div class="form-group">
                <label class="form-label">设备路径 * (逗号分隔)</label>
                <input type="text" class="form-input" id="volume-devices" placeholder="例如: /dev/sda,/dev/sdb">
            </div>
            <div class="form-group">
                <label class="form-label">RAID 配置</label>
                <select class="form-select" id="volume-profile">
                    <option value="single">Single - 单盘模式</option>
                    <option value="raid0">RAID0 - 条带模式</option>
                    <option value="raid1">RAID1 - 镜像模式</option>
                    <option value="raid10">RAID10 - 条带镜像</option>
                    <option value="raid5">RAID5 - 分布式奇偶校验</option>
                    <option value="raid6">RAID6 - 双奇偶校验</option>
                </select>
                <p class="form-hint" id="profile-hint">无冗余，适合单盘</p>
            </div>
            <div style="display: flex; justify-content: flex-end; gap: 0.75rem; margin-top: 1.5rem;">
                <button class="btn btn-secondary" onclick="closeModal('modal-create-volume')">取消</button>
                <button class="btn btn-primary" onclick="createVolume()">创建</button>
            </div>
        </div>
    </div>

    <!-- 创建子卷模态框 -->
    <div class="modal-overlay" id="modal-create-subvolume">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">📁 创建子卷</h3>
                <button class="modal-close" onclick="closeModal('modal-create-subvolume')">&times;</button>
            </div>
            <div class="form-group">
                <label class="form-label">所属卷 *</label>
                <select class="form-select" id="subvol-volume"></select>
            </div>
            <div class="form-group">
                <label class="form-label">子卷名称 *</label>
                <input type="text" class="form-input" id="subvol-name" placeholder="例如: @home">
            </div>
            <div style="display: flex; justify-content: flex-end; gap: 0.75rem; margin-top: 1.5rem;">
                <button class="btn btn-secondary" onclick="closeModal('modal-create-subvolume')">取消</button>
                <button class="btn btn-primary" onclick="createSubvolume()">创建</button>
            </div>
        </div>
    </div>

    <!-- 创建快照模态框 -->
    <div class="modal-overlay" id="modal-create-snapshot">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">📸 创建快照</h3>
                <button class="modal-close" onclick="closeModal('modal-create-snapshot')">&times;</button>
            </div>
            <div class="form-group">
                <label class="form-label">所属卷 *</label>
                <select class="form-select" id="snap-volume" onchange="updateSubvolumeOptions()"></select>
            </div>
            <div class="form-group">
                <label class="form-label">子卷 *</label>
                <select class="form-select" id="snap-subvolume"></select>
            </div>
            <div class="form-group">
                <label class="form-label">快照名称</label>
                <input type="text" class="form-input" id="snap-name" placeholder="留空自动生成">
            </div>
            <div class="form-group">
                <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                    <input type="checkbox" id="snap-readonly" checked>
                    <span>只读快照</span>
                </label>
            </div>
            <div style="display: flex; justify-content: flex-end; gap: 0.75rem; margin-top: 1.5rem;">
                <button class="btn btn-secondary" onclick="closeModal('modal-create-snapshot')">取消</button>
                <button class="btn btn-primary" onclick="createSnapshot()">创建</button>
            </div>
        </div>
    </div>

    <!-- Toast 容器 -->
    <div id="toast-container"></div>

    <script src="../js/app.js"></script>
    <script>
        const API_BASE = '/api/v1';
        let volumesData = [];

        // ========== 初始化 ==========
        document.addEventListener('DOMContentLoaded', () => {
            initTabs();
            initProfileHints();
            loadVolumes();
        });

        // Tab 切换
        function initTabs() {
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                    btn.classList.add('active');
                    document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
                    
                    // 按需加载数据
                    if (btn.dataset.tab === 'subvolumes') loadSubvolumes();
                    if (btn.dataset.tab === 'snapshots') loadSnapshots();
                    if (btn.dataset.tab === 'disks') loadDisks();
                });
            });
        }

        // RAID 配置提示
        function initProfileHints() {
            const hints = {
                single: '无冗余，适合单盘',
                raid0: '条带模式，性能最佳，无冗余',
                raid1: '镜像模式，允许 1 盘故障',
                raid10: '条带镜像，性能与冗余平衡',
                raid5: '分布式奇偶校验，允许 1 盘故障，需 3+ 盘',
                raid6: '双奇偶校验，允许 2 盘故障，需 4+ 盘'
            };
            document.getElementById('volume-profile').addEventListener('change', (e) => {
                document.getElementById('profile-hint').textContent = hints[e.target.value] || '';
            });
        }

        // ========== 卷管理 ==========
        async function loadVolumes() {
            try {
                const res = await fetch(`${API_BASE}/volumes`);
                const data = await res.json();
                
                if (data.code === 0) {
                    volumesData = data.data || [];
                    renderVolumes(volumesData);
                    updateVolumeFilters();
                } else {
                    showToast('加载卷列表失败: ' + data.message, 'error');
                }
            } catch (err) {
                console.error('加载卷列表失败:', err);
                // 显示示例数据
                volumesData = [
                    { name: 'data', total: 500000000000, used: 225000000000, profile: 'raid1', devices: ['/dev/sda', '/dev/sdb'], healthy: true, subvolCount: 3 },
                    { name: 'backup', total: 2000000000000, used: 1560000000000, profile: 'single', devices: ['/dev/sdc'], healthy: true, subvolCount: 1 }
                ];
                renderVolumes(volumesData);
                updateVolumeFilters();
            }
        }

        function renderVolumes(volumes) {
            const container = document.getElementById('volumes-list');
            
            if (!volumes || volumes.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📦</div>
                        <p>暂无存储卷</p>
                        <button class="btn btn-primary" onclick="showCreateVolumeModal()">创建第一个卷</button>
                    </div>
                `;
                return;
            }

            container.innerHTML = volumes.map(vol => {
                const usagePercent = vol.total > 0 ? Math.round((vol.used / vol.total) * 100) : 0;
                const progressClass = usagePercent > 90 ? 'error' : (usagePercent > 75 ? 'warning' : 'success');
                
                return `
                    <div class="volume-card">
                        <div class="volume-header">
                            <div>
                                <div class="volume-name">${vol.name}</div>
                                <div class="volume-meta">
                                    <span class="badge badge-info">${vol.profile || 'single'}</span>
                                    <span style="margin-left: 0.5rem;">${vol.devices?.join(', ') || '-'}</span>
                                </div>
                            </div>
                            <div class="volume-usage">
                                <div class="volume-usage-bar">
                                    <div class="progress">
                                        <div class="progress-bar ${progressClass}" style="width: ${usagePercent}%"></div>
                                    </div>
                                </div>
                                <div class="volume-usage-text">${usagePercent}%</div>
                            </div>
                        </div>
                        <div style="display: flex; justify-content: space-between; align-items: center; font-size: 13px; color: var(--text-muted); margin-bottom: 0.75rem;">
                            <span>已用 ${formatSize(vol.used)} / ${formatSize(vol.total)}</span>
                            <span>${vol.subvolCount || 0} 个子卷</span>
                        </div>
                        <div class="volume-actions">
                            <button class="btn btn-sm btn-secondary" onclick="manageVolume('${vol.name}')">管理</button>
                            <button class="btn btn-sm btn-secondary" onclick="startScrub('${vol.name}')">🔍 校验</button>
                            <button class="btn btn-sm btn-secondary" onclick="startBalance('${vol.name}')">⚖️ 平衡</button>
                            <button class="btn btn-sm btn-secondary" onclick="createSnapshotFor('${vol.name}')">📸 快照</button>
                            <button class="btn btn-sm btn-danger" onclick="deleteVolume('${vol.name}')">删除</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function updateVolumeFilters() {
            const options = volumesData.map(v => `<option value="${v.name}">${v.name}</option>`).join('');

        function renderTimeline(snapshots) {
            const container = document.getElementById('snapshot-timeline');
            const now = new Date();
            let html = '';
            
            for (let i = 23; i >= 0; i--) {
                const hour = new Date(now - i * 3600000);
                const hasSnapshot = snapshots?.some(s => {
                    const snapTime = new Date(s.createdAt);
                    return Math.abs(snapTime - hour) < 3600000;
                });
                html += `<div class="timeline-block ${hasSnapshot ? 'has-snapshot' : ''}" title="${hour.getHours()}:00"></div>`;
            }
            
            container.innerHTML = html;
        }

        // ========== 工具函数 ==========
        function formatSize(bytes) {
            if (!bytes || bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB', 'TB', 'PB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return (bytes / Math.pow(k, i)).toFixed(1) + ' ' + sizes[i];
        }

                <div class="toast-header">

                    <button class="toast-close" onclick="this.closest('.toast').remove()">×</button>
                </div>
                <div class="toast-body">${message}</div>
            `;
            container.appendChild(toast);
            
            setTimeout(() => {
                toast.classList.add('toast-fade-out');
                setTimeout(() => toast.remove(), 300);
            }, 5000);
        }

            if (!confirm(`确定要删除 "${name}" 的配额限制吗？`)) return;
            
            fetch(`${API_BASE}/quotas/${name}`, { method: 'DELETE' })
            .then(res => res.json())
            .then(data => {
                if (data.code === 0) {
                    showToast('配额已删除', 'success');
                    loadQuotas();
                } else {
                    showToast('删除失败: ' + data.message, 'error');
                }
            })
            .catch(err => showToast('删除失败: ' + err.message, 'error'));
        }

        // 点击模态框外部关闭
        document.querySelectorAll('.modal-overlay').forEach(overlay => {
            overlay.addEventListener('click', (e) => {
                if (e.target === overlay) {
                    overlay.classList.remove('show');
                }
            });
        });
    </script>
</body>
</html>
