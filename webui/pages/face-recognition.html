<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>人脸识别管理 - NAS-OS</title>
    <link rel="stylesheet" href="/css/design-system.css">
    <style>
        /* 人脸识别管理界面 */
        
        .main-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
        }

        /* 顶部统计 */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 32px;
        }

        @media (max-width: 900px) {
            .stats-row {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .stat-box {
            background: var(--surface-color);
            border-radius: var(--radius-lg);
            padding: 24px;
            box-shadow: var(--shadow-sm);
        }

        .stat-number {
            font-size: 36px;
            font-weight: 700;
            color: var(--color-primary);
            margin-bottom: 4px;
        }

        .stat-label {
            font-size: 14px;
            color: var(--text-muted);
        }

        /* 人物卡片网格 */
        .people-section {
            margin-bottom: 40px;
        }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 20px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .people-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }

        .person-card {
            background: var(--surface-color);
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            cursor: pointer;
            transition: all var(--transition-base);
            position: relative;
        }

        .person-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
        }

        .person-avatar {
            aspect-ratio: 1;
            background: linear-gradient(135deg, var(--color-primary-light) 0%, var(--bg-tertiary) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 64px;
            color: var(--color-primary);
            position: relative;
        }

        .person-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .person-badge {
            position: absolute;
            bottom: 12px;
            right: 12px;
            background: var(--color-primary);
            color: white;
            font-size: 12px;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: var(--radius-full);
        }

        .person-info {
            padding: 16px;
        }

        .person-name {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .person-name input {
            border: none;
            background: transparent;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            padding: 0;
        }

        .person-name input:focus {
            outline: none;
            border-bottom: 2px solid var(--color-primary);
        }

        .person-count {
            font-size: 14px;
            color: var(--text-muted);
        }

        .person-actions {
            display: flex;
            gap: 8px;
            padding: 12px 16px;
            border-top: 1px solid var(--surface-border);
        }

        /* 未命名人物 */
        .unnamed-section {
            background: var(--bg-tertiary);
            border-radius: var(--radius-lg);
            padding: 24px;
            margin-bottom: 40px;
        }

        .unnamed-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .unnamed-face {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            overflow: hidden;
            cursor: pointer;
            border: 3px solid transparent;
            transition: all var(--transition-fast);
        }

        .unnamed-face:hover {
            border-color: var(--color-primary);
            transform: scale(1.1);
        }

        .unnamed-face img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 人脸详情模态框 */
        .face-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .face-modal.active {
            display: flex;
        }

        .face-modal-content {
            background: var(--surface-color);
            border-radius: var(--radius-xl);
            max-width: 900px;
            width: 100%;
            max-height: 90vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .face-modal-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--surface-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .face-modal-title {
            font-size: 20px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .face-modal-body {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
        }

        /* 照片中的人脸标注 */
        .face-annotation {
            position: relative;
            margin-bottom: 24px;
        }

        .face-annotation img {
            width: 100%;
            border-radius: var(--radius-lg);
        }

        .face-box {
            position: absolute;
            border: 2px solid var(--color-primary);
            background: rgba(37, 99, 235, 0.1);
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .face-box:hover {
            background: rgba(37, 99, 235, 0.2);
        }

        .face-box-label {
            position: absolute;
            top: -24px;
            left: 0;
            background: var(--color-primary);
            color: white;
            font-size: 11px;
            padding: 2px 8px;
            border-radius: var(--radius-sm);
            white-space: nowrap;
        }

        /* 照片缩略图网格 */
        .photo-thumbnails {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 12px;
        }

        .photo-thumb {
            aspect-ratio: 1;
            border-radius: var(--radius-md);
            overflow: hidden;
            cursor: pointer;
            position: relative;
            background: var(--bg-tertiary);
        }

        .photo-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform var(--transition-fast);
        }

        .photo-thumb:hover img {
            transform: scale(1.05);
        }

        .photo-thumb-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity var(--transition-fast);
        }

        .photo-thumb:hover .photo-thumb-overlay {
            opacity: 1;
        }

        /* 合并面板 */
        .merge-panel {
            background: var(--bg-tertiary);
            border-radius: var(--radius-lg);
            padding: 20px;
            margin-bottom: 24px;
        }

        .merge-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
        }

        .merge-candidates {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .merge-candidate {
            width: 100px;
            text-align: center;
            cursor: pointer;
            padding: 12px;
            border-radius: var(--radius-md);
            border: 2px solid transparent;
            transition: all var(--transition-fast);
        }

        .merge-candidate:hover {
            background: var(--surface-color);
        }

        .merge-candidate.selected {
            border-color: var(--color-primary);
            background: var(--color-primary-light);
        }

        .merge-candidate-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            margin: 0 auto 8px;
            overflow: hidden;
        }

        .merge-candidate-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .merge-candidate-name {
            font-size: 12px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* 设置面板 */
        .settings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 24px;
        }

        .settings-card {
            background: var(--surface-color);
            border-radius: var(--radius-lg);
            padding: 24px;
            box-shadow: var(--shadow-sm);
        }

        .settings-card-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* 进度条 */
        .progress-container {
            margin-top: 16px;
        }

        .progress-label {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .empty-icon {
            font-size: 64px;
            margin-bottom: 16px;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <div class="main-container">
        <!-- 顶部统计 -->
        <div class="stats-row">
            <div class="stat-box">
                <div class="stat-number" id="stat-people">0</div>
                <div class="stat-label">已识别人物</div>
            </div>
            <div class="stat-box">
                <div class="stat-number" id="stat-faces">0</div>
                <div class="stat-label">总人脸数</div>
            </div>
            <div class="stat-box">
                <div class="stat-number" id="stat-unnamed">0</div>
                <div class="stat-label">待命名</div>
            </div>
            <div class="stat-box">
                <div class="stat-number" id="stat-photos">0</div>
                <div class="stat-label">已分析照片</div>
            </div>
        </div>

        <!-- 未命名人物提示 -->
        <div class="unnamed-section" id="unnamed-section" style="display: none;">
            <div class="section-header">
                <div class="section-title">
                    <span>❓</span>
                    待命名的人脸
                </div>
                <button class="btn btn-secondary btn-sm" onclick="hideUnnamed()">稍后处理</button>
            </div>
            <div class="unnamed-grid" id="unnamed-grid"></div>
        </div>

        <!-- 已命名人物 -->
        <div class="people-section">
            <div class="section-header">
                <div class="section-title">
                    <span>👥</span>
                    人物
                </div>
                <div style="display: flex; gap: 12px;">
                    <input type="text" class="form-input" placeholder="搜索人物..." style="width: 200px;" oninput="searchPeople(this.value)">
                    <button class="btn btn-secondary" onclick="showMergePanel()">
                        <span>🔗</span> 合并人物
                    </button>
                </div>
            </div>
            <div class="people-grid" id="people-grid"></div>
        </div>

        <!-- 设置 -->
        <div class="settings-grid">
            <div class="settings-card">
                <div class="settings-card-title">
                    <span>⚙️</span> 人脸识别设置
                </div>
                <div class="setting-item">
                    <div>
                        <div class="setting-label">自动检测新人脸</div>
                        <div class="setting-desc">上传照片时自动检测人脸</div>
                    </div>
                    <div class="toggle active" onclick="toggleSetting(this)">
                        <div class="toggle-knob"></div>
                    </div>
                </div>
                <div class="setting-item">
                    <div>
                        <div class="setting-label">人脸聚类</div>
                        <div class="setting-desc">自动将相似人脸归类为同一人</div>
                    </div>
                    <div class="toggle active" onclick="toggleSetting(this)">
                        <div class="toggle-knob"></div>
                    </div>
                </div>
            </div>

            <div class="settings-card">
                <div class="settings-card-title">
                    <span>🔄</span> 处理状态
                </div>
                <div class="progress-container">
                    <div class="progress-label">
                        <span>人脸检测进度</span>
                        <span id="face-progress-text">0%</span>
                    </div>
                    <div class="progress">
                        <div class="progress-bar" id="face-progress-bar" style="width: 0%"></div>
                    </div>
                </div>
                <div class="progress-container">
                    <div class="progress-label">
                        <span>人脸聚类进度</span>
                        <span id="cluster-progress-text">0%</span>
                    </div>
                    <div class="progress">
                        <div class="progress-bar" id="cluster-progress-bar" style="width: 0%"></div>
                    </div>
                </div>
                <button class="btn btn-primary" onclick="startFaceAnalysis()" style="margin-top: 16px; width: 100%;">
                    <span>▶️</span> 开始分析
                </button>
            </div>
        </div>
    </div>

    <!-- 人脸详情模态框 -->
    <div class="face-modal" id="face-modal">
        <div class="face-modal-content">
            <div class="face-modal-header">
                <div class="face-modal-title">
                    <div style="width: 48px; height: 48px; border-radius: 50%; overflow: hidden; background: var(--bg-tertiary);">
                        <img id="modal-avatar" src="" alt="" style="width: 100%; height: 100%; object-fit: cover;">
                    </div>
                    <input type="text" id="modal-name" class="form-input" placeholder="输入名字" style="font-size: 18px; font-weight: 600;">
                </div>
                <button class="btn btn-icon" onclick="closeFaceModal()">✕</button>
            </div>
            <div class="face-modal-body">
                <h4 style="font-size: 14px; color: var(--text-muted); margin-bottom: 16px;">
                    出现在 <span id="modal-count">0</span> 张照片中
                </h4>
                <div class="photo-thumbnails" id="modal-photos"></div>
            </div>
            <div style="padding: 16px 24px; border-top: 1px solid var(--surface-border); display: flex; justify-content: space-between;">
                <button class="btn btn-danger" onclick="deletePerson()">
                    <span>🗑️</span> 删除人物
                </button>
                <div style="display: flex; gap: 12px;">
                    <button class="btn btn-secondary" onclick="closeFaceModal()">取消</button>
                    <button class="btn btn-primary" onclick="savePerson()">保存</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 合并面板模态框 -->
    <div class="face-modal" id="merge-modal">
        <div class="face-modal-content">
            <div class="face-modal-header">
                <div class="face-modal-title">
                    <span>🔗</span>
                    合并人物
                </div>
                <button class="btn btn-icon" onclick="closeMergeModal()">✕</button>
            </div>
            <div class="face-modal-body">
                <p style="color: var(--text-muted); margin-bottom: 24px;">
                    选择要合并的人物，他们将合并为一个人物。
                </p>
                <div class="merge-candidates" id="merge-candidates"></div>
            </div>
            <div style="padding: 16px 24px; border-top: 1px solid var(--surface-border); display: flex; justify-content: flex-end; gap: 12px;">
                <button class="btn btn-secondary" onclick="closeMergeModal()">取消</button>
                <button class="btn btn-primary" onclick="confirmMerge()">确认合并</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/api/photos';
        let people = [];
        let currentPerson = null;
        let mergeSelection = new Set();

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            loadStats();
            loadPeople();
            loadUnnamedFaces();
        });

        // 加载统计
        async function loadStats() {
            try {
                const [statsRes, personsRes] = await Promise.all([
                    fetch(`${API_BASE}/ai/stats`),
                    fetch(`${API_BASE}/persons`)
                ]);
                
                const statsData = await statsRes.json();
                const personsData = await personsRes.json();
                
                let totalFaces = 0;
                let totalPhotos = statsData.data?.totalAnalyzed || 0;
                let unnamedCount = 0;
                
                if (personsData.data) {
                    people = personsData.data;
                    totalFaces = people.reduce((sum, p) => sum + (p.faceCount || p.photoCount || 0), 0);
                    unnamedCount = people.filter(p => !p.name || p.name === '未命名').length;
                }
                
                document.getElementById('stat-people').textContent = people.length;
                document.getElementById('stat-faces').textContent = totalFaces;
                document.getElementById('stat-unnamed').textContent = unnamedCount;
                document.getElementById('stat-photos').textContent = totalPhotos;
            } catch (error) {
                console.error('加载统计失败:', error);
            }
        }

        // 加载人物
        async function loadPeople() {
            try {
                const response = await fetch(`${API_BASE}/persons`);
                const data = await response.json();
                
                if (data.code === 0 && data.data) {
                    people = data.data;
                    renderPeople();
                }
            } catch (error) {
                console.error('加载人物失败:', error);
            }
        }

        // 渲染人物
        function renderPeople(filter = '') {
            const grid = document.getElementById('people-grid');
            const filtered = filter 
                ? people.filter(p => p.name?.toLowerCase().includes(filter.toLowerCase()))
                : people;
            
            if (filtered.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state" style="grid-column: 1 / -1;">
                        <div class="empty-icon">👥</div>
                        <div>还没有识别到人物</div>
                    </div>
                `;
                return;
            }
            
            grid.innerHTML = filtered.map(person => `
                <div class="person-card" onclick="openPersonDetail('${person.id}')">
                    <div class="person-avatar">
                        ${person.avatar 
                            ? `<img src="${API_BASE}/persons/${person.id}/avatar" alt="${person.name}">`
                            : '👤'}
                        <div class="person-badge">${person.photoCount || 0}</div>
                    </div>
                    <div class="person-info">
                        <div class="person-name">${person.name || '未命名'}</div>
                        <div class="person-count">${person.photoCount || 0} 张照片</div>
                    </div>
                    <div class="person-actions">
                        <button class="btn btn-sm btn-secondary" onclick="event.stopPropagation(); renamePerson('${person.id}')">
                            ✏️ 重命名
                        </button>
                    </div>
                </div>
            `).join('');
        }

        // 加载未命名人脸
        async function loadUnnamedFaces() {
            try {
                const response = await fetch(`${API_BASE}/ai/faces/unnamed`);
                const data = await response.json();
                
                if (data.code === 0 && data.data?.length > 0) {
                    const section = document.getElementById('unnamed-section');
                    const grid = document.getElementById('unnamed-grid');
                    
                    section.style.display = 'block';
                    grid.innerHTML = data.data.map(face => `
                        <div class="unnamed-face" onclick="nameFace('${face.id}')">
                            <img src="${API_BASE}/faces/${face.id}/thumbnail" alt="未命名">
                        </div>
                    `).join('');
                }
            } catch (error) {
                console.error('加载未命名人脸失败:', error);
            }
        }

        // 打开人物详情
        function openPersonDetail(personId) {
            const person = people.find(p => p.id === personId);
            if (!person) return;
            
            currentPerson = person;
            
            document.getElementById('modal-avatar').src = `${API_BASE}/persons/${personId}/avatar`;
            document.getElementById('modal-name').value = person.name || '';
            document.getElementById('modal-count').textContent = person.photoCount || 0;
            
            // 加载照片
            loadPersonPhotos(personId);
            
            document.getElementById('face-modal').classList.add('active');
        }

        // 加载人物照片
        async function loadPersonPhotos(personId) {
            try {
                const response = await fetch(`${API_BASE}/persons/${personId}/photos`);
                const data = await response.json();
                
                if (data.code === 0 && data.data) {
                    document.getElementById('modal-photos').innerHTML = data.data.map(photo => `
                        <div class="photo-thumb" onclick="viewPhoto('${photo.id}')">
                            <img src="${API_BASE}/${photo.id}/thumbnail" alt="${photo.name}">
                            <div class="photo-thumb-overlay">
                                <span style="color: white;">👁️</span>
                            </div>
                        </div>
                    `).join('');
                }
            } catch (error) {
                console.error('加载照片失败:', error);
            }
        }

        // 保存人物
        async function savePerson() {
            if (!currentPerson) return;
            
            const name = document.getElementById('modal-name').value;
            
            try {
                const response = await fetch(`${API_BASE}/persons/${currentPerson.id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name })
                });
                
                if ((await response.json()).code === 0) {
                    currentPerson.name = name;
                    renderPeople();
                    closeFaceModal();
                }
            } catch (error) {
                console.error('保存失败:', error);
            }
        }

        // 删除人物
        async function deletePerson() {
            if (!currentPerson || !confirm('确定要删除这个人物吗？关联的照片不会被删除。')) {
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/persons/${currentPerson.id}`, {
                    method: 'DELETE'
                });
                
                if ((await response.json()).code === 0) {
                    people = people.filter(p => p.id !== currentPerson.id);
                    renderPeople();
                    loadStats();
                    closeFaceModal();
                }
            } catch (error) {
                console.error('删除失败:', error);
            }
        }

        // 显示合并面板
        function showMergePanel() {
            const container = document.getElementById('merge-candidates');
            mergeSelection.clear();
            
            container.innerHTML = people.map(person => `
                <div class="merge-candidate" onclick="toggleMergeSelect('${person.id}')" data-id="${person.id}">
                    <div class="merge-candidate-avatar">
                        ${person.avatar 
                            ? `<img src="${API_BASE}/persons/${person.id}/avatar" alt="${person.name}">`
                            : '👤'}
                    </div>
                    <div class="merge-candidate-name">${person.name || '未命名'}</div>
                </div>
            `).join('');
            
            document.getElementById('merge-modal').classList.add('active');
        }

        // 切换合并选择
        function toggleMergeSelect(personId) {
            if (mergeSelection.has(personId)) {
                mergeSelection.delete(personId);
                document.querySelector(`.merge-candidate[data-id="${personId}"]`).classList.remove('selected');
            } else {
                mergeSelection.add(personId);
                document.querySelector(`.merge-candidate[data-id="${personId}"]`).classList.add('selected');
            }
        }

        // 确认合并
        async function confirmMerge() {
            if (mergeSelection.size < 2) {
                alert('请至少选择两个人物进行合并');
                return;
            }
            
            if (!confirm('确定要合并选中的这些人物吗？')) {
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/persons/merge`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        personIds: Array.from(mergeSelection),
                        targetName: prompt('请输入合并后的名字:') || ''
                    })
                });
                
                if ((await response.json()).code === 0) {
                    loadPeople();
                    loadStats();
                    closeMergeModal();
                }
            } catch (error) {
                console.error('合并失败:', error);
            }
        }

        // 关闭模态框
        function closeFaceModal() {
            document.getElementById('face-modal').classList.remove('active');
            currentPerson = null;
        }

        function closeMergeModal() {
            document.getElementById('merge-modal').classList.remove('active');
            mergeSelection.clear();
        }

        // 其他功能
        function searchPeople(query) {
            renderPeople(query);
        }

        function renamePerson(id) {
            openPersonDetail(id);
            setTimeout(() => {
                document.getElementById('modal-name').focus();
            }, 100);
        }

        function nameFace(faceId) {
            const name = prompt('请输入名字:');
            if (name) {
                fetch(`${API_BASE}/faces/${faceId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name })
                }).then(() => {
                    loadUnnamedFaces();
                    loadPeople();
                    loadStats();
                });
            }
        }

        function hideUnnamed() {
            document.getElementById('unnamed-section').style.display = 'none';
        }

        function toggleSetting(el) {
            el.classList.toggle('active');
        }

        function startFaceAnalysis() {
            alert('人脸分析任务已启动，请稍后刷新页面查看结果');
        }

        function viewPhoto(photoId) {
            window.open(`/pages/photos-browser.html?photo=${photoId}`, '_blank');
        }
    </script>
</body>
</html>
