<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#2563EB">
    <title>容器管理 - NAS-OS</title>
    <link rel="icon" type="image/png" sizes="32x32" href="../brand/logo/logo-32.png">
    <link rel="stylesheet" href="../css/design-system.css">
    <style>
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            bottom: 0;
            width: 240px;
            background: white;
            border-right: 1px solid var(--color-gray-200);
            padding: 1.5rem;
            overflow-y: auto;
        }
        .main-content {
            margin-left: 240px;
            padding: 2rem;
        }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            color: var(--color-gray-600);
            border-radius: 8px;
            margin-bottom: 0.25rem;
            transition: all 0.2s;
            cursor: pointer;
        }
        .nav-item:hover, .nav-item.active {
            background: var(--color-primary-light);
            color: var(--color-primary);
        }
        .nav-item svg { width: 20px; height: 20px; }
        
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }
        .page-title {
            font-size: 24px;
            font-weight: 600;
            color: var(--color-gray-900);
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.625rem 1.25rem;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }
        .btn-primary {
            background: var(--color-primary);
            color: white;
        }
        .btn-primary:hover {
            background: var(--color-primary-dark);
        }
        .btn-secondary {
            background: var(--color-gray-100);
            color: var(--color-gray-700);
        }
        .btn-secondary:hover {
            background: var(--color-gray-200);
        }
        .btn-success {
            background: var(--color-success);
            color: white;
        }
        .btn-danger {
            background: var(--color-danger);
            color: white;
        }
        .btn-warning {
            background: var(--color-warning);
            color: white;
        }
        .btn-sm {
            padding: 0.375rem 0.75rem;
            font-size: 13px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        .stat-card {
            background: white;
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: var(--shadow-md);
        }
        .stat-label {
            font-size: 13px;
            color: var(--color-gray-500);
            margin-bottom: 0.5rem;
        }
        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: var(--color-gray-900);
        }
        .stat-icon {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1rem;
        }
        .stat-icon.blue { background: #EFF6FF; color: #3B82F6; }
        .stat-icon.green { background: #ECFDF5; color: #10B981; }
        .stat-icon.yellow { background: #FFFBEB; color: #F59E0B; }
        .stat-icon.red { background: #FEF2F2; color: #EF4444; }

        .container-list {
            background: white;
            border-radius: 12px;
            box-shadow: var(--shadow-md);
            overflow: hidden;
        }
        .container-table {
            width: 100%;
            border-collapse: collapse;
        }
        .container-table th {
            background: var(--color-gray-50);
            padding: 1rem;
            text-align: left;
            font-size: 13px;
            font-weight: 600;
            color: var(--color-gray-600);
            border-bottom: 1px solid var(--color-gray-200);
        }
        .container-table td {
            padding: 1rem;
            border-bottom: 1px solid var(--color-gray-100);
            font-size: 14px;
        }
        .container-table tr:hover {
            background: var(--color-gray-50);
        }
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.375rem;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 12px;
            font-weight: 500;
        }
        .status-running {
            background: #ECFDF5;
            color: #059669;
        }
        .status-stopped {
            background: #F3F4F6;
            color: #6B7280;
        }
        .status-exited {
            background: #FEF2F2;
            color: #DC2626;
        }
        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: currentColor;
        }
        .action-buttons {
            display: flex;
            gap: 0.5rem;
        }
        
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal {
            background: white;
            border-radius: 12px;
            width: 90%;
            max-width: 600px;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem;
            border-bottom: 1px solid var(--color-gray-200);
        }
        .modal-title {
            font-size: 18px;
            font-weight: 600;
        }
        .modal-close {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--color-gray-500);
        }
        .modal-body {
            padding: 1.5rem;
        }
        .modal-footer {
            padding: 1.5rem;
            border-top: 1px solid var(--color-gray-200);
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 14px;
            font-weight: 500;
            color: var(--color-gray-700);
        }
        .form-input {
            width: 100%;
            padding: 0.625rem 0.875rem;
            border: 1px solid var(--color-gray-300);
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.2s;
        }
        .form-input:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }
        .form-select {
            width: 100%;
            padding: 0.625rem 0.875rem;
            border: 1px solid var(--color-gray-300);
            border-radius: 8px;
            font-size: 14px;
            background: white;
        }

        .tab-nav {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid var(--color-gray-200);
        }
        .tab-btn {
            padding: 0.75rem 1.5rem;
            background: none;
            border: none;
            border-bottom: 2px solid transparent;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            color: var(--color-gray-600);
        }
        .tab-btn.active {
            color: var(--color-primary);
            border-bottom-color: var(--color-primary);
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }

        .log-container {
            background: #1F2937;
            color: #E5E7EB;
            padding: 1rem;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            max-height: 400px;
            overflow-y: auto;
        }
        .log-line {
            margin-bottom: 0.25rem;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: var(--color-gray-200);
            border-radius: 4px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: var(--color-primary);
            transition: width 0.3s;
        }

        .resource-usage {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .resource-bar {
            flex: 1;
            height: 6px;
            background: var(--color-gray-200);
            border-radius: 3px;
            overflow: hidden;
        }
        .resource-fill {
            height: 100%;
            background: var(--color-primary);
            border-radius: 3px;
        }
        .resource-fill.high {
            background: var(--color-danger);
        }
        .resource-fill.medium {
            background: var(--color-warning);
        }
    </style>
</head>
<body>
    <!-- 侧边栏 -->
    <div class="sidebar" id="sidebar">
        <!-- 由 JS 动态加载 -->
    </div>

    <!-- 主内容区 -->
    <div class="main-content">
        <div class="page-header">
            <h1 class="page-title">🐳 容器管理</h1>
            <div style="display: flex; gap: 1rem;">
                <button class="btn btn-secondary" onclick="refreshData()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M23 4v6h-6M1 20v-6h6"/>
                        <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
                    </svg>
                    刷新
                </button>
                <button class="btn btn-primary" onclick="showCreateModal()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 5v14M5 12h14"/>
                    </svg>
                    创建容器
                </button>
            </div>
        </div>

        <!-- 统计卡片 -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon blue">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="18" height="18" rx="2"/>
                        <path d="M3 9h18M9 21V9"/>
                    </svg>
                </div>
                <div class="stat-label">总容器数</div>
                <div class="stat-value" id="stat-total">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon green">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M22 11.08V12a10 10 0 11-5.93-9.14"/>
                        <polyline points="22 4 12 14.01 9 11.01"/>
                    </svg>
                </div>
                <div class="stat-label">运行中</div>
                <div class="stat-value" id="stat-running">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon yellow">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/>
                        <line x1="12" y1="8" x2="12" y2="12"/>
                        <line x1="12" y1="16" x2="12.01" y2="16"/>
                    </svg>
                </div>
                <div class="stat-label">已停止</div>
                <div class="stat-value" id="stat-stopped">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon red">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/>
                        <line x1="15" y1="9" x2="9" y2="15"/>
                        <line x1="9" y1="9" x2="15" y2="15"/>
                    </svg>
                </div>
                <div class="stat-label">镜像数</div>
                <div class="stat-value" id="stat-images">0</div>
            </div>
        </div>

        <!-- 标签页 -->
        <div class="tab-nav">
            <button class="tab-btn active" onclick="switchTab('containers')">容器列表</button>
            <button class="tab-btn" onclick="switchTab('images')">镜像管理</button>
            <button class="tab-btn" onclick="switchTab('networks')">网络</button>
            <button class="tab-btn" onclick="switchTab('volumes')">存储卷</button>
        </div>

        <!-- 容器列表 -->
        <div id="tab-containers" class="tab-content active">
            <div class="container-list">
                <table class="container-table">
                    <thead>
                        <tr>
                            <th>名称</th>
                            <th>镜像</th>
                            <th>状态</th>
                            <th>端口</th>
                            <th>CPU</th>
                            <th>内存</th>
                            <th>创建时间</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="container-table-body">
                        <!-- 动态加载 -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- 镜像管理 -->
        <div id="tab-images" class="tab-content">
            <div class="container-list">
                <table class="container-table">
                    <thead>
                        <tr>
                            <th>仓库</th>
                            <th>标签</th>
                            <th>ID</th>
                            <th>大小</th>
                            <th>创建时间</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="image-table-body">
                        <!-- 动态加载 -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- 网络管理 -->
        <div id="tab-networks" class="tab-content">
            <div class="container-list">
                <table class="container-table">
                    <thead>
                        <tr>
                            <th>名称</th>
                            <th>驱动</th>
                            <th>范围</th>
                            <th>子网</th>
                            <th>容器</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="network-table-body">
                        <!-- 动态加载 -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- 存储卷 -->
        <div id="tab-volumes" class="tab-content">
            <div class="container-list">
                <table class="container-table">
                    <thead>
                        <tr>
                            <th>名称</th>
                            <th>驱动</th>
                            <th>挂载点</th>
                            <th>大小</th>
                            <th>使用容器</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="volume-table-body">
                        <!-- 动态加载 -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- 创建容器模态框 -->
    <div class="modal-overlay" id="create-modal">
        <div class="modal">
            <div class="modal-header">
                <h2 class="modal-title">创建容器</h2>
                <button class="modal-close" onclick="closeModal('create-modal')">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label class="form-label">容器名称 *</label>
                    <input type="text" class="form-input" id="container-name" placeholder="my-container">
                </div>
                <div class="form-group">
                    <label class="form-label">镜像 *</label>
                    <input type="text" class="form-input" id="container-image" placeholder="nginx:latest">
                </div>
                <div class="form-group">
                    <label class="form-label">端口映射</label>
                    <input type="text" class="form-input" id="container-ports" placeholder="8080:80,443:443">
                    <small style="color: var(--color-gray-500);">格式：主机端口：容器端口</small>
                </div>
                <div class="form-group">
                    <label class="form-label">卷挂载</label>
                    <input type="text" class="form-input" id="container-volumes" placeholder="/host/path:/container/path">
                    <small style="color: var(--color-gray-500);">多个用逗号分隔</small>
                </div>
                <div class="form-group">
                    <label class="form-label">环境变量</label>
                    <textarea class="form-input" id="container-env" rows="3" placeholder="KEY=value&#10;KEY2=value2"></textarea>
                </div>
                <div class="form-group">
                    <label class="form-label">重启策略</label>
                    <select class="form-select" id="container-restart">
                        <option value="unless-stopped">除非手动停止</option>
                        <option value="always">始终重启</option>
                        <option value="on-failure">失败时重启</option>
                        <option value="no">不重启</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">CPU 限制</label>
                    <input type="text" class="form-input" id="container-cpu" placeholder="0.5 (50%)">
                </div>
                <div class="form-group">
                    <label class="form-label">内存限制</label>
                    <input type="text" class="form-input" id="container-memory" placeholder="512m">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal('create-modal')">取消</button>
                <button class="btn btn-primary" onclick="createContainer()">创建</button>
            </div>
        </div>
    </div>

    <!-- 日志模态框 -->
    <div class="modal-overlay" id="logs-modal">
        <div class="modal" style="max-width: 800px;">
            <div class="modal-header">
                <h2 class="modal-title">容器日志</h2>
                <button class="modal-close" onclick="closeModal('logs-modal')">&times;</button>
            </div>
            <div class="modal-body">
                <div class="log-container" id="log-content">
                    <!-- 日志内容 -->
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal('logs-modal')">关闭</button>
                <button class="btn btn-primary" onclick="refreshLogs()">刷新</button>
            </div>
        </div>
    </div>

    <script>
        let currentContainerId = null;
        let containers = [];
        let images = [];
        let networks = [];
        let volumes = [];

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            loadSidebar();
            refreshData();
            // 每 30 秒自动刷新
            setInterval(refreshData, 30000);
        });

        // 加载侧边栏
        async function loadSidebar() {
            try {
                const response = await fetch('../api/sidebar');
                const data = await response.json();
                const sidebar = document.getElementById('sidebar');
                sidebar.innerHTML = data.items.map(item => `
                    <div class="nav-item ${item.active ? 'active' : ''}" onclick="location.href='${item.href}'">
                        ${item.icon}
                        <span>${item.label}</span>
                    </div>
                `).join('');
            } catch (error) {
                console.error('加载侧边栏失败:', error);
            }
        }

        // 刷新数据
        async function refreshData() {
            await Promise.all([
                loadContainers(),
                loadImages(),
                loadNetworks(),
                loadVolumes()
            ]);
            updateStats();
        }

        // 加载容器列表
        async function loadContainers() {
            try {
                const response = await fetch('/api/v1/containers?all=true');
                const data = await response.json();
                containers = data.data || [];
                renderContainers();
            } catch (error) {
                console.error('加载容器失败:', error);
            }
        }

        // 渲染容器列表
        function renderContainers() {
            const tbody = document.getElementById('container-table-body');
            tbody.innerHTML = containers.map(c => {
                const ports = c.ports && c.ports.length > 0 
                    ? c.ports.map(p => `${p.hostPort}:${p.containerPort}`).join(', ')
                    : '-';
                
                const cpuPercent = c.cpuUsage || 0;
                const memPercent = c.memLimit > 0 ? ((c.memUsage / c.memLimit) * 100).toFixed(1) : 0;
                
                let statusClass = 'status-stopped';
                let statusText = '已停止';
                if (c.running || c.state === 'running') {
                    statusClass = 'status-running';
                    statusText = '运行中';
                } else if (c.state === 'exited') {
                    statusClass = 'status-exited';
                    statusText = '已退出';
                }

                return `
                    <tr>
                        <td><strong>${c.name}</strong></td>
                        <td>${c.image}</td>
                        <td>
                            <span class="status-badge ${statusClass}">
                                <span class="status-dot"></span>
                                ${statusText}
                            </span>
                        </td>
                        <td>${ports}</td>
                        <td>
                            <div class="resource-usage">
                                <div class="resource-bar">
                                    <div class="resource-fill ${cpuPercent > 80 ? 'high' : cpuPercent > 50 ? 'medium' : ''}" 
                                         style="width: ${Math.min(cpuPercent, 100)}%"></div>
                                </div>
                                <span>${cpuPercent.toFixed(1)}%</span>
                            </div>
                        </td>
                        <td>
                            <div class="resource-usage">
                                <div class="resource-bar">
                                    <div class="resource-fill ${memPercent > 80 ? 'high' : memPercent > 50 ? 'medium' : ''}" 
                                         style="width: ${Math.min(memPercent, 100)}%"></div>
                                </div>
                                <span>${memPercent}%</span>
                            </div>
                        </td>
                        <td>${new Date(c.created).toLocaleDateString('zh-CN')}</td>
                        <td>
                            <div class="action-buttons">
                                ${c.running || c.state === 'running' 
                                    ? `<button class="btn btn-sm btn-warning" onclick="stopContainer('${c.id}')">停止</button>`
                                    : `<button class="btn btn-sm btn-success" onclick="startContainer('${c.id}')">启动</button>`
                                }
                                <button class="btn btn-sm btn-secondary" onclick="restartContainer('${c.id}')">重启</button>
                                <button class="btn btn-sm btn-secondary" onclick="showLogs('${c.id}')">日志</button>
                                <button class="btn btn-sm btn-danger" onclick="deleteContainer('${c.id}')">删除</button>
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        // 加载镜像列表
        async function loadImages() {
            try {
                const response = await fetch('/api/v1/images');
                const data = await response.json();
                images = data.data || [];
                renderImages();
            } catch (error) {
                console.error('加载镜像失败:', error);
            }
        }

        // 渲染镜像列表
        function renderImages() {
            const tbody = document.getElementById('image-table-body');
            tbody.innerHTML = images.map(img => `
                <tr>
                    <td>${img.repository || '-'}</td>
                    <td>${img.tag || 'latest'}</td>
                    <td><code>${img.id ? img.id.substring(0, 12) : '-'}</code></td>
                    <td>${img.sizeHuman || formatSize(img.size)}</td>
                    <td>${new Date(img.created).toLocaleDateString('zh-CN')}</td>
                    <td>
                        <div class="action-buttons">
                            <button class="btn btn-sm btn-danger" onclick="deleteImage('${img.id}')">删除</button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        // 加载网络列表
        async function loadNetworks() {
            try {
                const response = await fetch('/api/v1/networks');
                const data = await response.json();
                networks = data.data || [];
                renderNetworks();
            } catch (error) {
                console.error('加载网络失败:', error);
            }
        }

        // 渲染网络列表
        function renderNetworks() {
            const tbody = document.getElementById('network-table-body');
            tbody.innerHTML = networks.map(net => `
                <tr>
                    <td>${net.name}</td>
                    <td>${net.driver}</td>
                    <td>${net.scope}</td>
                    <td>${net.subnet || '-'}</td>
                    <td>${net.containers ? net.containers.length : 0}</td>
                    <td>
                        <div class="action-buttons">
                            <button class="btn btn-sm btn-danger" onclick="deleteNetwork('${net.id}')">删除</button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        // 加载存储卷列表
        async function loadVolumes() {
            try {
                const response = await fetch('/api/v1/volumes');
                const data = await response.json();
                volumes = data.data || [];
                renderVolumes();
            } catch (error) {
                console.error('加载存储卷失败:', error);
            }
        }

        // 渲染存储卷列表
        function renderVolumes() {
            const tbody = document.getElementById('volume-table-body');
            tbody.innerHTML = volumes.map(vol => `
                <tr>
                    <td>${vol.name}</td>
                    <td>${vol.driver}</td>
                    <td><code>${vol.mountPoint}</code></td>
                    <td>${vol.sizeHuman || formatSize(vol.size)}</td>
                    <td>${vol.containers ? vol.containers.join(', ') : '0'}</td>
                    <td>
                        <div class="action-buttons">
                            <button class="btn btn-sm btn-secondary" onclick="backupVolume('${vol.name}')">备份</button>
                            <button class="btn btn-sm btn-danger" onclick="deleteVolume('${vol.name}')">删除</button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        // 更新统计
        function updateStats() {
            document.getElementById('stat-total').textContent = containers.length;
            document.getElementById('stat-running').textContent = containers.filter(c => c.running || c.state === 'running').length;
            document.getElementById('stat-stopped').textContent = containers.filter(c => !c.running && c.state !== 'running').length;
            document.getElementById('stat-images').textContent = images.length;
        }

        // 切换标签页
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(`tab-${tab}`).classList.add('active');
        }

        // 显示创建模态框
        function showCreateModal() {
            document.getElementById('create-modal').classList.add('active');
        }

        // 关闭模态框
        function closeModal(id) {
            document.getElementById(id).classList.remove('active');
        }

        // 创建容器
        async function createContainer() {
            const name = document.getElementById('container-name').value;
            const image = document.getElementById('container-image').value;
            const ports = document.getElementById('container-ports').value;
            const volumes = document.getElementById('container-volumes').value;
            const envText = document.getElementById('container-env').value;
            const restart = document.getElementById('container-restart').value;
            const cpu = document.getElementById('container-cpu').value;
            const memory = document.getElementById('container-memory').value;

            if (!name || !image) {
                alert('请填写容器名称和镜像');
                return;
            }

            const config = {
                name,
                image,
                ports: ports ? ports.split(',').map(p => p.trim()) : [],
                volumes: volumes ? volumes.split(',').map(v => v.trim()) : [],
                environment: {},
                restart,
                cpuLimit: cpu,
                memLimit: memory
            };

            // 解析环境变量
            envText.split('\n').forEach(line => {
                const [key, value] = line.split('=');
                if (key && value) {
                    config.environment[key.trim()] = value.trim();
                }
            });

            try {
                const response = await fetch('/api/v1/containers', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(config)
                });
                const data = await response.json();
                
                if (data.code === 0) {
                    alert('容器创建成功');
                    closeModal('create-modal');
                    refreshData();
                } else {
                    alert('创建失败：' + data.message);
                }
            } catch (error) {
                alert('创建失败：' + error.message);
            }
        }

        // 启动容器
        async function startContainer(id) {
            try {
                const response = await fetch(`/api/v1/containers/${id}/start`, { method: 'POST' });
                const data = await response.json();
                if (data.code === 0) {
                    refreshData();
                } else {
                    alert('启动失败：' + data.message);
                }
            } catch (error) {
                alert('启动失败：' + error.message);
            }
        }

        // 停止容器
        async function stopContainer(id) {
            try {
                const response = await fetch(`/api/v1/containers/${id}/stop`, { method: 'POST' });
                const data = await response.json();
                if (data.code === 0) {
                    refreshData();
                } else {
                    alert('停止失败：' + data.message);
                }
            } catch (error) {
                alert('停止失败：' + error.message);
            }
        }

        // 重启容器
        async function restartContainer(id) {
            try {
                const response = await fetch(`/api/v1/containers/${id}/restart`, { method: 'POST' });
                const data = await response.json();
                if (data.code === 0) {
                    refreshData();
                } else {
                    alert('重启失败：' + data.message);
                }
            } catch (error) {
                alert('重启失败：' + error.message);
            }
        }

        // 删除容器
        async function deleteContainer(id) {
            if (!confirm('确定要删除此容器吗？')) return;
            
            try {
                const response = await fetch(`/api/v1/containers/${id}?force=true`, { method: 'DELETE' });
                const data = await response.json();
                if (data.code === 0) {
                    refreshData();
                } else {
                    alert('删除失败：' + data.message);
                }
            } catch (error) {
                alert('删除失败：' + error.message);
            }
        }

        async function deleteImage(id) {
            if (!confirm('确定要删除此镜像吗？')) return;
            
            try {

                const data = await response.json();

                }
            } catch (error) {

            }
        }

        // 删除网络
        async function deleteNetwork(id) {
            if (!confirm('确定要删除此网络吗？')) return;
            
            try {
                const response = await fetch(`/api/v1/networks/${id}`, { method: 'DELETE' });
                const data = await response.json();
                if (data.code === 0) {
                    refreshData();
                } else {
                    alert('删除失败：' + data.message);
                }
            } catch (error) {
                alert('删除失败：' + error.message);
            }
        }

        // 删除存储卷
        async function deleteVolume(name) {
            if (!confirm('确定要删除此存储卷吗？')) return;
            
            try {
                const response = await fetch(`/api/v1/volumes/${name}?force=true`, { method: 'DELETE' });
                const data = await response.json();
                if (data.code === 0) {
                    refreshData();
                } else {
                    alert('删除失败：' + data.message);
                }
            } catch (error) {
                alert('删除失败：' + error.message);
            }
        }

        // 备份存储卷
        async function backupVolume(name) {
            alert('备份功能开发中...');
        }

        // 显示日志
        async function showLogs(id) {
            currentContainerId = id;
            document.getElementById('logs-modal').classList.add('active');
            await refreshLogs();
        }

        // 刷新日志
        async function refreshLogs() {
            if (!currentContainerId) return;
            
            try {
                const response = await fetch(`/api/v1/containers/${currentContainerId}/logs?tail=100`);
                const data = await response.json();
                const logs = data.data || [];
                document.getElementById('log-content').innerHTML = logs.map(log => 
                    `<div class="log-line">${log.line}</div>`
                ).join('');
            } catch (error) {
                console.error('加载日志失败:', error);
            }
        }

        // 格式化大小
        function formatSize(bytes) {
            if (!bytes) return '-';
            const units = ['B', 'KB', 'MB', 'GB', 'TB'];
            let i = 0;
            while (bytes >= 1024 && i < units.length - 1) {
                bytes /= 1024;
                i++;
            }
            return `${bytes.toFixed(2)} ${units[i]}`;
        }
    </script>
