<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>下载中心 - NAS-OS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f7;
            color: #1d1d1f;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 32px;
            font-weight: 600;
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-primary {
            background: #0071e3;
            color: white;
        }
        
        .btn-primary:hover {
            background: #0077ed;
        }
        
        .btn-secondary {
            background: #e8e8ed;
            color: #1d1d1f;
        }
        
        .btn-secondary:hover {
            background: #d2d2d7;
        }
        
        .btn-danger {
            background: #ff3b30;
            color: white;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        
        .stat-value {
            font-size: 28px;
            font-weight: 600;
            color: #0071e3;
        }
        
        .stat-label {
            font-size: 14px;
            color: #86868b;
            margin-top: 5px;
        }
        
        .task-list {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            overflow: hidden;
        }
        
        .task-item {
            padding: 20px;
            border-bottom: 1px solid #e8e8ed;
            transition: background 0.2s;
        }
        
        .task-item:hover {
            background: #f5f5f7;
        }
        
        .task-item:last-child {
            border-bottom: none;
        }
        
        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .task-name {
            font-size: 16px;
            font-weight: 500;
        }
        
        .task-status {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }
        
        .status-downloading {
            background: #e3fcef;
            color: #00a854;
        }
        
        .status-waiting {
            background: #e6f7ff;
            color: #0071e3;
        }
        
        .status-paused {
            background: #fff7e6;
            color: #fa8c16;
        }
        
        .status-completed {
            background: #f0f0f0;
            color: #595959;
        }
        
        .status-error {
            background: #fff1f0;
            color: #ff3b30;
        }
        
        .status-seeding {
            background: #f9f0ff;
            color: #722ed1;
        }
        
        .progress-bar {
            height: 8px;
            background: #e8e8ed;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 10px;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #0071e3, #00c6ff);
            border-radius: 4px;
            transition: width 0.3s;
        }
        
        .task-info {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: #86868b;
        }
        
        .task-actions {
            display: flex;
            gap: 10px;
        }
        
        .task-actions .btn {
            padding: 6px 12px;
            font-size: 13px;
        }
        
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        
        .modal-overlay.active {
            display: flex;
        }
        
        .modal {
            background: white;
            padding: 30px;
            border-radius: 16px;
            width: 100%;
            max-width: 500px;
        }
        
        .modal h2 {
            margin-bottom: 20px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }
        
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #d2d2d7;
            border-radius: 8px;
            font-size: 14px;
        }
        
        .form-group textarea {
            min-height: 100px;
            resize: vertical;
        }
        
        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #86868b;
        }
        
        .empty-state svg {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>下载中心</h1>
            <button class="btn btn-primary" onclick="showAddModal()">+ 新建任务</button>
        </div>
        
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="stat-total">0</div>
                <div class="stat-label">总任务数</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-downloading">0</div>
                <div class="stat-label">下载中</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-speed">0 MB/s</div>
                <div class="stat-label">总速度</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-uploaded">0 GB</div>
                <div class="stat-label">已上传</div>
            </div>
        </div>
        
        <div class="task-list" id="task-list">
            <div class="empty-state">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="17 8 12 3 7 8"/>
                    <line x1="12" y1="3" x2="12" y2="15"/>
                </svg>
                <p>暂无下载任务</p>
                <p style="margin-top: 10px; font-size: 14px;">点击上方按钮创建新任务</p>
            </div>
        </div>
    </div>
    
    <!-- 添加任务弹窗 -->
    <div class="modal-overlay" id="add-modal">
        <div class="modal">
            <h2>新建下载任务</h2>
            <form id="add-form">
                <div class="form-group">
                    <label for="task-url">URL / 磁力链接</label>
                    <textarea id="task-url" placeholder="输入 HTTP 链接、磁力链接或种子文件路径" required></textarea>
                </div>
                <div class="form-group">
                    <label for="task-name">任务名称（可选）</label>
                    <input type="text" id="task-name" placeholder="留空自动识别">
                </div>
                <div class="form-group">
                    <label for="task-type">下载类型</label>
                    <select id="task-type">
                        <option value="">自动检测</option>
                        <option value="magnet">磁力链接</option>
                        <option value="bt">BT 种子</option>
                        <option value="http">HTTP 下载</option>
                        <option value="ftp">FTP 下载</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="task-path">保存路径</label>
                    <input type="text" id="task-path" placeholder="/downloads">
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" onclick="hideAddModal()">取消</button>
                    <button type="submit" class="btn btn-primary">开始下载</button>
                </div>
            </form>
        </div>
    </div>
    
    <script>
        const API_BASE = '/api/downloader';
        
        // 格式化文件大小
        function formatSize(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }
        
        // 格式化速度
        function formatSpeed(bytesPerSec) {
            return formatSize(bytesPerSec) + '/s';
        }
        
        // 获取状态样式
        function getStatusClass(status) {
            const map = {
                'downloading': 'status-downloading',
                'waiting': 'status-waiting',
                'paused': 'status-paused',
                'completed': 'status-completed',
                'error': 'status-error',
                'seeding': 'status-seeding'
            };
            return map[status] || 'status-waiting';
        }
        
        // 获取状态文本
        function getStatusText(status) {
            const map = {
                'downloading': '下载中',
                'waiting': '等待中',
                'paused': '已暂停',
                'completed': '已完成',
                'error': '错误',
                'seeding': '做种中'
            };
            return map[status] || status;
        }
        
        // 加载任务列表
        async function loadTasks() {
            try {
                const response = await fetch(`${API_BASE}/tasks`);
                const result = await response.json();
                
                if (result.success) {
                    renderTasks(result.data);
                }
            } catch (error) {
                console.error('加载任务失败:', error);
            }
        }
        
        // 加载统计
        async function loadStats() {
            try {
                const response = await fetch(`${API_BASE}/stats`);
                const result = await response.json();
                
                if (result.success) {
                    const stats = result.data;
                    document.getElementById('stat-total').textContent = stats.total_tasks;
                    document.getElementById('stat-downloading').textContent = stats.downloading;
                    document.getElementById('stat-speed').textContent = formatSpeed(stats.total_speed);
                    document.getElementById('stat-uploaded').textContent = formatSize(stats.total_uploaded);
                }
            } catch (error) {
                console.error('加载统计失败:', error);
            }
        }
        
        // 渲染任务列表
        function renderTasks(tasks) {
            const container = document.getElementById('task-list');
            
            if (tasks.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                            <polyline points="17 8 12 3 7 8"/>
                            <line x1="12" y1="3" x2="12" y2="15"/>
                        </svg>
                        <p>暂无下载任务</p>
                        <p style="margin-top: 10px; font-size: 14px;">点击上方按钮创建新任务</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = tasks.map(task => `
                <div class="task-item" data-id="${task.id}">
                    <div class="task-header">
                        <div class="task-name">${escapeHtml(task.name)}</div>
                        <span class="task-status ${getStatusClass(task.status)}">${getStatusText(task.status)}</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: ${task.progress}%"></div>
                    </div>
                    <div class="task-info">
                        <div>
                            <span>进度：${task.progress.toFixed(1)}%</span>
                            <span style="margin-left: 15px;">大小：${formatSize(task.total_size)}</span>
                            <span style="margin-left: 15px;">速度：${formatSpeed(task.speed)}</span>
                        </div>
                        <div class="task-actions">
                            ${task.status === 'downloading' ? 
                                `<button class="btn btn-secondary" onclick="pauseTask('${task.id}')">暂停</button>` : 
                                ''}
                            ${task.status === 'paused' ? 
                                `<button class="btn btn-primary" onclick="resumeTask('${task.id}')">继续</button>` : 
                                ''}
                            ${task.status !== 'completed' && task.status !== 'error' ? 
                                `<button class="btn btn-danger" onclick="deleteTask('${task.id}')">删除</button>` : 
                                ''}
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        // 显示添加弹窗
        function showAddModal() {
            document.getElementById('add-modal').classList.add('active');
        }
        
        // 隐藏添加弹窗
        function hideAddModal() {
            document.getElementById('add-modal').classList.remove('active');
            document.getElementById('add-form').reset();
        }
        
        // 创建任务
        document.getElementById('add-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const url = document.getElementById('task-url').value.trim();
            const name = document.getElementById('task-name').value.trim();
            const type = document.getElementById('task-type').value;
            const destPath = document.getElementById('task-path').value.trim();
            
            try {
                const response = await fetch(`${API_BASE}/tasks`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        url,
                        name: name || undefined,
                        type: type || undefined,
                        dest_path: destPath || undefined
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    hideAddModal();
                    loadTasks();
                    loadStats();
                } else {
                    alert('创建失败：' + result.error);
                }
            } catch (error) {
                alert('创建失败：' + error.message);
            }
        });
        
        // 暂停任务
        async function pauseTask(id) {
            try {
                await fetch(`${API_BASE}/tasks/${id}/pause`, { method: 'POST' });
                loadTasks();
            } catch (error) {
                alert('暂停失败：' + error.message);
            }
        }
        
        // 恢复任务
        async function resumeTask(id) {
            try {
                await fetch(`${API_BASE}/tasks/${id}/resume`, { method: 'POST' });
                loadTasks();
            } catch (error) {
                alert('恢复失败：' + error.message);
            }
        }
        
        // 删除任务
        async function deleteTask(id) {
            if (!confirm('确定要删除此任务吗？')) return;
            
            try {
                await fetch(`${API_BASE}/tasks/${id}?delete_files=false`, { method: 'DELETE' });
                loadTasks();
                loadStats();
            } catch (error) {
                alert('删除失败：' + error.message);
            }
        }
        
        // HTML 转义
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // 初始化
        loadTasks();
        loadStats();
        
        // 每 5 秒刷新
        setInterval(() => {
            loadTasks();
            loadStats();
        }, 5000);
    </script>
</body>
</html>
