<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>性能优化 - NAS-OS</title>
    <link rel="icon" type="image/png" sizes="32x32" href="../brand/logo/logo-32.png">
    <link rel="stylesheet" href="../css/design-system.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .optimizer-container { max-width: 1400px; margin: 0 auto; padding: 2rem; }
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }
        .page-title { font-size: 28px; font-weight: 700; margin-bottom: 0.5rem; }
        .page-subtitle { color: var(--text-muted); }
        
        .score-card {
            background: linear-gradient(135deg, var(--color-primary), #1d4ed8);
            border-radius: var(--radius-xl);
            padding: 2rem;
            color: white;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 2rem;
        }
        .score-circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            font-weight: 700;
        }
        .score-info h2 { margin: 0 0 0.5rem; font-size: 24px; }
        .score-info p { margin: 0; opacity: 0.9; }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .stat-card {
            background: var(--surface-color);
            border-radius: var(--radius-lg);
            padding: 1.25rem;
            box-shadow: var(--shadow-md);
        }
        .stat-label { color: var(--text-muted); font-size: 13px; }
        .stat-value { font-size: 24px; font-weight: 700; margin-top: 0.25rem; }
        .stat-change { font-size: 12px; margin-top: 0.5rem; }
        .stat-change.positive { color: var(--color-success); }
        .stat-change.negative { color: var(--color-error); }
        
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }
        @media (max-width: 1024px) { .grid-2 { grid-template-columns: 1fr; } }
        
        .card {
            background: var(--surface-color);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            box-shadow: var(--shadow-md);
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--surface-border);
        }
        .card-title { font-size: 18px; font-weight: 600; }
        
        .recommendation-list { list-style: none; padding: 0; margin: 0; }
        .recommendation-item {
            display: flex;
            align-items: flex-start;
            gap: 1rem;
            padding: 1rem;
            border-radius: var(--radius-md);
            margin-bottom: 0.5rem;
            background: var(--surface-secondary);
        }
        .recommendation-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }
        .recommendation-icon.high { background: var(--color-error-bg); }
        .recommendation-icon.medium { background: var(--color-warning-bg); }
        .recommendation-icon.low { background: var(--color-info-bg); }
        .recommendation-content { flex: 1; }
        .recommendation-title { font-weight: 600; margin-bottom: 0.25rem; }
        .recommendation-desc { font-size: 13px; color: var(--text-secondary); }
        .recommendation-action { margin-top: 0.5rem; }
        
        .btn {
            padding: 0.75rem 1.5rem;
            border-radius: var(--radius-md);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
        }
        .btn-primary { background: var(--color-primary); color: white; }
        .btn-primary:hover { background: var(--color-primary-hover); }
        .btn-secondary { background: var(--surface-tertiary); color: var(--text-primary); }
        .btn-sm { padding: 0.5rem 1rem; font-size: 13px; }
        .btn-success { background: var(--color-success); color: white; }
        
        .progress-bar {
            height: 8px;
            background: var(--surface-border);
            border-radius: var(--radius-full);
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            border-radius: var(--radius-full);
            transition: width 0.3s;
        }
        .progress-fill.good { background: var(--color-success); }
        .progress-fill.warning { background: var(--color-warning); }
        .progress-fill.danger { background: var(--color-error); }
        
        .metric-item { margin-bottom: 1.25rem; }
        .metric-item:last-child { margin-bottom: 0; }
        .metric-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
        }
        .metric-name { font-weight: 500; }
        .metric-value { color: var(--text-secondary); }
        
        .task-list { list-style: none; padding: 0; margin: 0; }
        .task-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 0;
            border-bottom: 1px solid var(--surface-border);
        }
        .task-item:last-child { border-bottom: none; }
        .task-status {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }
        .task-status.running { background: var(--color-primary); color: white; animation: pulse 1s infinite; }
        .task-status.completed { background: var(--color-success); color: white; }
        .task-status.pending { background: var(--surface-border); }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .task-name { flex: 1; }
        .task-time { font-size: 12px; color: var(--text-muted); }
        
        .chart-container { height: 200px; position: relative; }
    </style>
</head>
<body>
    <div class="optimizer-container">
        <div class="page-header">
            <div>
                <h1 class="page-title">性能优化</h1>
                <p class="page-subtitle">智能分析与系统优化建议</p>
            </div>
            <div style="display: flex; gap: 0.5rem;">
                <button class="btn btn-secondary" onclick="runAnalysis()">🔍 重新分析</button>
                <button class="btn btn-primary" onclick="applyAll()">✨ 一键优化</button>
            </div>
        </div>

        <!-- 性能评分 -->
        <div class="score-card">
            <div class="score-circle" id="scoreCircle">--</div>
            <div class="score-info">
                <h2>系统性能评分</h2>
                <p id="scoreMessage">正在分析系统状态...</p>
            </div>
        </div>

        <!-- 统计卡片 -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">CPU 使用率</div>
                <div class="stat-value" id="cpuUsage">--</div>
                <div class="stat-change" id="cpuChange"></div>
            </div>
            <div class="stat-card">
                <div class="stat-label">内存使用率</div>
                <div class="stat-value" id="memUsage">--</div>
                <div class="stat-change" id="memChange"></div>
            </div>
            <div class="stat-card">
                <div class="stat-label">磁盘 I/O</div>
                <div class="stat-value" id="diskIO">--</div>
                <div class="stat-change" id="ioChange"></div>
            </div>
            <div class="stat-card">
                <div class="stat-label">网络吞吐</div>
                <div class="stat-value" id="netThroughput">--</div>
                <div class="stat-change" id="netChange"></div>
            </div>
        </div>

        <div class="grid-2">
            <!-- 优化建议 -->
            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">优化建议</h2>
                    <span id="recommendCount" style="color: var(--text-muted); font-size: 13px;">0 项建议</span>
                </div>
                <ul class="recommendation-list" id="recommendList">
                    <li class="recommendation-item">
                        <div class="recommendation-icon medium">💡</div>
                        <div class="recommendation-content">
                            <div class="recommendation-title">加载中...</div>
                            <div class="recommendation-desc">正在分析系统状态</div>
                        </div>
                    </li>
                </ul>
            </div>

            <!-- 资源使用 -->
            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">资源使用</h2>
                </div>
                <div class="metric-item">
                    <div class="metric-header">
                        <span class="metric-name">CPU</span>
                        <span class="metric-value" id="cpuBar">--</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="cpuFill" style="width: 0%"></div>
                    </div>
                </div>
                <div class="metric-item">
                    <div class="metric-header">
                        <span class="metric-name">内存</span>
                        <span class="metric-value" id="memBar">--</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="memFill" style="width: 0%"></div>
                    </div>
                </div>
                <div class="metric-item">
                    <div class="metric-header">
                        <span class="metric-name">磁盘空间</span>
                        <span class="metric-value" id="diskBar">--</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="diskFill" style="width: 0%"></div>
                    </div>
                </div>
                <div class="metric-item">
                    <div class="metric-header">
                        <span class="metric-name">缓存命中率</span>
                        <span class="metric-value" id="cacheBar">--</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill good" id="cacheFill" style="width: 0%"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="grid-2">
            <!-- 性能趋势 -->
            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">性能趋势</h2>
                    <select id="timeRange" style="padding: 0.5rem; border-radius: var(--radius-md); border: 1px solid var(--surface-border);" onchange="loadTrends()">
                        <option value="1h">最近 1 小时</option>
                        <option value="24h" selected>最近 24 小时</option>
                        <option value="7d">最近 7 天</option>
                    </select>
                </div>
                <div class="chart-container">
                    <canvas id="trendChart"></canvas>
                </div>
            </div>

            <!-- 优化任务 -->
            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">优化任务</h2>
                </div>
                <ul class="task-list" id="taskList">
                    <li class="task-item">
                        <div class="task-status pending">○</div>
                        <span class="task-name">暂无运行中的优化任务</span>
                    </li>
                </ul>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/api/v1';
        let trendChart = null;
        
        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', () => {
            loadAnalysis();
            loadTrends();
        });

        async function loadAnalysis() {
            try {
                const response = await fetch(`${API_BASE}/optimizer/analysis`);
                const data = await response.json();
                
                if (data.code === 0 && data.data) {
                    updateDashboard(data.data);
                }
            } catch (error) {
                console.error('加载分析数据失败:', error);
                document.getElementById('scoreMessage').textContent = '分析服务暂时不可用';
            }
        }

        function updateDashboard(data) {
            // 更新评分
            const score = data.score || 0;
            document.getElementById('scoreCircle').textContent = score;
            document.getElementById('scoreMessage').textContent = getScoreMessage(score);
            
            // 更新统计卡片
            document.getElementById('cpuUsage').textContent = `${data.cpu?.usage || 0}%`;
            document.getElementById('memUsage').textContent = `${data.memory?.usage || 0}%`;
            document.getElementById('diskIO').textContent = formatIO(data.disk?.io || 0);
            document.getElementById('netThroughput').textContent = formatThroughput(data.network?.throughput || 0);
            
            // 更新进度条
            updateProgress('cpu', data.cpu?.usage || 0);
            updateProgress('mem', data.memory?.usage || 0);
            updateProgress('disk', data.disk?.usage || 0);
            updateProgress('cache', data.cache?.hitRate || 0, true);
            
            // 更新建议
            renderRecommendations(data.recommendations || []);
            
            // 更新任务
            renderTasks(data.tasks || []);
        }

        function getScoreMessage(score) {
            if (score >= 90) return '系统运行极佳，无需优化';
            if (score >= 70) return '系统状态良好，有少量优化空间';
            if (score >= 50) return '系统性能一般，建议进行优化';
            return '系统性能较差，强烈建议优化';
        }

        function updateProgress(type, value, inverse = false) {
            const fill = document.getElementById(`${type}Fill`);
            const bar = document.getElementById(`${type}Bar`);
            
            fill.style.width = `${value}%`;
            bar.textContent = `${value}%`;
            
            // 根据值设置颜色
            fill.classList.remove('good', 'warning', 'danger');
            if (inverse) {
                // 缓存命中率越高越好
                fill.classList.add(value >= 80 ? 'good' : (value >= 50 ? 'warning' : 'danger'));
            } else {
                fill.classList.add(value <= 60 ? 'good' : (value <= 80 ? 'warning' : 'danger'));
            }
        }

        function renderRecommendations(recs) {
            const list = document.getElementById('recommendList');
            document.getElementById('recommendCount').textContent = `${recs.length} 项建议`;
            
            if (recs.length === 0) {
                list.innerHTML = `
                    <li class="recommendation-item">
                        <div class="recommendation-icon low">✅</div>
                        <div class="recommendation-content">
                            <div class="recommendation-title">系统状态良好</div>
                            <div class="recommendation-desc">当前没有需要优化的问题</div>
                        </div>
                    </li>
                `;
                return;
            }

            list.innerHTML = recs.map(rec => `
                <li class="recommendation-item">
                    <div class="recommendation-icon ${rec.priority}">${getPriorityIcon(rec.priority)}</div>
                    <div class="recommendation-content">
                        <div class="recommendation-title">${rec.title}</div>
                        <div class="recommendation-desc">${rec.description}</div>
                        <div class="recommendation-action">
                            <button class="btn btn-sm btn-success" onclick="applyRecommendation('${rec.id}')">立即优化</button>
                        </div>
                    </div>
                </li>
            `).join('');
        }

        function getPriorityIcon(priority) {
            const icons = { high: '🔴', medium: '🟡', low: '🔵' };
            return icons[priority] || '💡';
        }

        function renderTasks(tasks) {
            const list = document.getElementById('taskList');
            
            if (tasks.length === 0) {
                list.innerHTML = `
                    <li class="task-item">
                        <div class="task-status pending">○</div>
                        <span class="task-name">暂无运行中的优化任务</span>
                    </li>
                `;
                return;
            }

            list.innerHTML = tasks.map(task => `
                <li class="task-item">
                    <div class="task-status ${task.status}">${task.status === 'running' ? '●' : '✓'}</div>
                    <span class="task-name">${task.name}</span>
                    <span class="task-time">${task.status === 'running' ? '进行中...' : formatTime(task.completedAt)}</span>
                </li>
            `).join('');
        }

        async function loadTrends() {
            const range = document.getElementById('timeRange').value;
            
            try {
                const response = await fetch(`${API_BASE}/optimizer/trends?range=${range}`);
                const data = await response.json();
                
                if (data.code === 0 && data.data) {
                    renderTrendChart(data.data);
                }
            } catch (error) {
                console.error('加载趋势数据失败:', error);
            }
        }

        function renderTrendChart(data) {
            const ctx = document.getElementById('trendChart').getContext('2d');
            
            if (trendChart) {
                trendChart.destroy();
            }

            trendChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: data.labels || [],
                    datasets: [
                        {
                            label: 'CPU',
                            data: data.cpu || [],
                            borderColor: '#2563EB',
                            backgroundColor: 'rgba(37, 99, 235, 0.1)',
                            tension: 0.4,
                            fill: true
                        },
                        {
                            label: '内存',
                            data: data.memory || [],
                            borderColor: '#10B981',
                            backgroundColor: 'rgba(16, 185, 129, 0.1)',
                            tension: 0.4,
                            fill: true
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'bottom' }
                    },
                    scales: {
                        y: { beginAtZero: true, max: 100 }
                    }
                }
            });
        }

        async function runAnalysis() {
            try {
                const response = await fetch(`${API_BASE}/optimizer/analyze`, { method: 'POST' });
                const data = await response.json();
                
                if (data.code === 0) {
                    alert('分析完成');
                    loadAnalysis();
                } else {
                    alert('分析失败: ' + data.message);
                }
            } catch (error) {
                alert('分析失败: ' + error.message);
            }
        }

        async function applyRecommendation(id) {
            if (!confirm('确定要应用此优化吗？')) return;
            
            try {
                const response = await fetch(`${API_BASE}/optimizer/apply/${id}`, { method: 'POST' });
                const data = await response.json();
                
                if (data.code === 0) {
                    alert('优化已应用');
                    loadAnalysis();
                } else {
                    alert('优化失败: ' + data.message);
                }
            } catch (error) {
                alert('优化失败: ' + error.message);
            }
        }

        async function applyAll() {
            if (!confirm('确定要应用所有建议的优化吗？')) return;
            
            try {
                const response = await fetch(`${API_BASE}/optimizer/apply-all`, { method: 'POST' });
                const data = await response.json();
                
                if (data.code === 0) {
                    alert('所有优化已应用');
                    loadAnalysis();
                } else {
                    alert('优化失败: ' + data.message);
                }
            } catch (error) {
                alert('优化失败: ' + error.message);
            }
        }

        function formatIO(bytes) {
            if (bytes < 1024) return `${bytes} B/s`;
            if (bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(1)} KB/s`;
            return `${(bytes / 1024 / 1024).toFixed(1)} MB/s`;
        }

        function formatThroughput(bytes) {
            if (bytes < 1000) return `${bytes} bps`;
            if (bytes < 1000000) return `${(bytes / 1000).toFixed(1)} Kbps`;
            if (bytes < 1000000000) return `${(bytes / 1000000).toFixed(1)} Mbps`;
            return `${(bytes / 1000000000).toFixed(1)} Gbps`;
        }

        function formatTime(timestamp) {
            if (!timestamp) return '';
            return new Date(timestamp).toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
        }
    </script>
</body>
</html>
