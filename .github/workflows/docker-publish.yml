# Docker 镜像构建与推送
# 支持多架构（amd64, arm64, arm/v7）
#
# 注意：Docker Compose 测试在 ci-cd.yml 中执行，此 workflow 专注于镜像构建

name: Docker Publish

on:
  push:
    branches: [master, develop]
    tags: ['v*']
  pull_request:
    branches: [master]
  workflow_dispatch:
    inputs:
      platform:
        description: '目标平台'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - amd64
          - arm64
          - arm/v7

env:
  GO_VERSION: '1.26'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ========== Docker 镜像构建 ==========
  docker-build:
    name: 构建 Docker 镜像
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置 QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all
      
      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: 登录 GitHub Container Registry
        uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}
      
      - name: 登录 Docker Hub
        uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: 提取元数据
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/nas-os
          tags: |
            # 分支
            type=ref,event=branch,suffix=-{{ sha }}
            type=ref,event=branch,enable=${{ github.ref == 'refs/heads/master' }},suffix=
            
            # PR
            type=ref,event=pr
            
            # 语义化版本
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            
            # SHA 标签（用于安全扫描）
            type=sha,prefix=,suffix=,format=short
            
            # latest (仅 main 分支)
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}
            
            # 手动触发
            type=raw,value=${{ github.event.inputs.version }},enable=${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version != '' }}
          
          labels: |
            org.opencontainers.image.title=NAS-OS
            org.opencontainers.image.description=Home NAS Management System
            org.opencontainers.image.vendor=NAS-OS Team
      
      - name: 构建并推送
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_TIME=${{ github.event.head_commit.timestamp }}
            VERSION=${{ github.ref_name }}
            REVISION=${{ github.sha }}
      
      - name: 生成镜像信息
        if: github.event_name != 'pull_request'
        run: |
          echo "## 🐳 Docker 镜像已发布" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**镜像地址:**" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**支持平台:** \`amd64\`, \`arm64\`, \`arm/v7\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**镜像大小:** 约 20-25MB（压缩后）" >> $GITHUB_STEP_SUMMARY

  # ========== 镜像扫描 ==========
  docker-scan:
    name: 镜像安全扫描
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      security-events: write
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 登录 GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}
      
      - name: 等待镜像推送完成
        run: |
          echo "等待镜像推送到 GHCR..."
          # 使用轮询等待镜像可用（最多等待 2 分钟）
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          for i in {1..12}; do
            if docker manifest inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$SHORT_SHA 2>/dev/null; then
              echo "✅ 镜像已可用"
              break
            fi
            echo "等待中... ($i/12)"
            sleep 10
          done
      
      - name: 拉取镜像进行扫描
        run: |
          # 获取短 SHA
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "SHORT_SHA=$SHORT_SHA" >> $GITHUB_ENV
          echo "尝试拉取镜像..."
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$SHORT_SHA || docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest || true
      
      - name: 运行 Trivy 扫描
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.SHORT_SHA }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          scan-type: 'image'
        continue-on-error: true
      
      - name: 上传扫描结果到 GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-results.sarif'
        if: always() && hashFiles('trivy-results.sarif') != ''
      
      - name: 生成扫描报告
        run: |
          echo "## 🔒 安全扫描完成" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f trivy-results.sarif ]; then
            echo "扫描结果已上传到 [Security](../../security/advisories) 页面" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ 扫描结果文件未生成，跳过上传" >> $GITHUB_STEP_SUMMARY
          fi

# 注意：Docker Compose 测试已在 ci-cd.yml 中执行，此 workflow 专注于镜像构建和发布
