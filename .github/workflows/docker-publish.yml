# Docker 镜像构建与推送
# 支持多架构（amd64, arm64, arm/v7）
#
# 注意：Docker Compose 测试在 ci-cd.yml 中执行，此 workflow 专注于镜像构建
#
# Go 版本: 1.26（与 go.mod 保持一致）
#
# 功能特性:
# - 支持 minimal（distroless，约 15-18MB）和 full（alpine，约 35-40MB）两种镜像
# - 同时推送到 GHCR 和 Docker Hub
# - Matrix 策略并行构建多架构（解决超时问题）
# - Go 模块缓存 + 构建缓存双重优化
# - Cosign keyless 签名 + SBOM 生成
# - Trivy 镜像安全扫描
#
# v2.254.0 优化：使用 matrix 策略分离架构构建，避免 QEMU 超时
#
# 当前版本: v2.254.0（工部维护）

name: Docker Publish

on:
  push:
    branches: [master, develop]
    tags: ['v*']
  pull_request:
    branches: [master]
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例如: v2.86.0)'
        required: false
        type: string
      platform:
        description: '目标平台'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - amd64
          - arm64
          - arm/v7

env:
  GO_VERSION: '1.26'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  # Docker Hub 配置
  DOCKERHUB_IMAGE: nasos/nas-os
  # 缓存版本号（每次修改 Dockerfile 或 workflow 时递增）
  CACHE_VERSION: 'v13'
  # Node.js 24 支持
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  # GOPROXY 加速
  GOPROXY: 'https://proxy.golang.org,direct'

# 权限配置 - 最小权限原则
permissions:
  contents: read           # 读取代码
  packages: write          # 推送镜像到 GHCR
  security-events: write   # 上传安全扫描结果
  id-token: write          # OIDC token 用于 keyless 签名
  attestations: write      # 写入 attestations

# 并发控制
concurrency:
  group: docker-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ========== 变更检测 ==========
  changes:
    name: 变更检测
    runs-on: ubuntu-latest
    timeout-minutes: 3
    outputs:
      docker-changed: ${{ steps.filter.outputs.docker }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v5
      
      - name: 检测变更
        uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            docker:
              - 'Dockerfile*'
              - 'docker-compose*.yml'
              - '.dockerignore'
              - 'go.mod'
              - 'go.sum'
              - '**.go'
      
      - name: 输出变更摘要
        run: |
          echo "## 📋 变更检测结果" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 类型 | 是否变更 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|----------|" >> $GITHUB_STEP_SUMMARY
          echo "| Docker 相关 | ${{ steps.filter.outputs.docker == 'true' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY

  # ========== 单架构构建（Matrix 策略并行） ==========
  # 优化：分离架构构建，避免 QEMU 模拟导致的超时
  # amd64 使用原生 runner，arm64 使用 ARM runner，arm/v7 使用 QEMU
  build-platform:
    name: 构建 ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    needs: [changes]
    if: needs.changes.outputs.docker-changed == 'true' || github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: amd64
            docker_platform: linux/amd64
            runner: ubuntu-latest
            suffix: amd64
          - platform: arm64
            docker_platform: linux/arm64
            runner: ubuntu-24.04-arm  # 原生 ARM runner，无需 QEMU
            suffix: arm64
          - platform: armv7
            docker_platform: linux/arm/v7
            runner: ubuntu-latest
            suffix: armv7
    outputs:
      amd64-digest: ${{ steps.build.outputs.digest }}
      arm64-digest: ${{ steps.build.outputs.digest }}
      armv7-digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v5
      
      # 仅 armv7 需要 QEMU
      - name: 设置 QEMU
        if: matrix.platform == 'armv7'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm
      
      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: 登录 GitHub Container Registry
        uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: 登录 Docker Hub
        uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 设置 Go 环境
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      # Go 模块缓存（加速依赖下载）
      - name: Go 模块缓存
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ matrix.platform }}-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-${{ matrix.platform }}-
            ${{ runner.os }}-go-

      - name: 提取短 SHA
        id: sha
        run: echo "SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: 构建并推送单架构镜像
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.docker_platform }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.sha.outputs.SHORT_SHA }}-${{ matrix.suffix }}
            ${{ env.DOCKERHUB_IMAGE }}:${{ steps.sha.outputs.SHORT_SHA }}-${{ matrix.suffix }}
          # 架构专用缓存
          cache-from: |
            type=gha,scope=${{ env.CACHE_VERSION }}-${{ matrix.platform }}
            type=gha,scope=${{ env.CACHE_VERSION }}-${{ matrix.platform }}-master
          cache-to: type=gha,scope=${{ env.CACHE_VERSION }}-${{ matrix.platform }},mode=max
          build-args: |
            BUILD_TIME=${{ github.event.head_commit.timestamp }}
            VERSION=${{ github.ref_name }}
            REVISION=${{ github.sha }}
          outputs: type=docker,dest=/tmp/image-${{ matrix.suffix }}.tar
      
      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: image-${{ matrix.suffix }}
          path: /tmp/image-${{ matrix.suffix }}.tar
          retention-days: 1

  # ========== 合并多架构 Manifest ==========
  merge-manifest:
    name: 合并多架构镜像
    runs-on: ubuntu-latest
    needs: [changes, build-platform]
    if: needs.changes.outputs.docker-changed == 'true' && github.event_name != 'pull_request'
    timeout-minutes: 10
    outputs:
      digest: ${{ steps.merge.outputs.digest }}
      short-sha: ${{ steps.meta.outputs.version }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v5
      
      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: 登录 GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: 登录 Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 提取短 SHA
        id: sha
        run: echo "SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: 提取元数据 (GHCR)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch,suffix=-{{ sha }}
            type=ref,event=branch,enable=${{ github.ref == 'refs/heads/master' }},suffix=
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}
            type=raw,value=${{ github.event.inputs.version }},enable=${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version != '' }}
          labels: |
            org.opencontainers.image.title=NAS-OS
            org.opencontainers.image.description=Home NAS Management System
            org.opencontainers.image.vendor=NAS-OS Team

      - name: 提取元数据 (Docker Hub)
        id: meta-dockerhub
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_IMAGE }}
          tags: |
            type=ref,event=branch,suffix=-{{ sha }}
            type=ref,event=branch,enable=${{ github.ref == 'refs/heads/master' }},suffix=
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}
            type=raw,value=${{ github.event.inputs.version }},enable=${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version != '' }}
          labels: |
            org.opencontainers.image.title=NAS-OS
            org.opencontainers.image.description=Home NAS Management System
            org.opencontainers.image.vendor=NAS-OS Team

      - name: 创建并推送多架构 Manifest
        id: merge
        run: |
          SHORT_SHA="${{ steps.sha.outputs.SHORT_SHA }}"
          
          # 创建 manifest list
          docker buildx imagetools create -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${SHORT_SHA} \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${SHORT_SHA}-amd64 \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${SHORT_SHA}-arm64 \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${SHORT_SHA}-armv7
          
          # 推送到 Docker Hub
          docker buildx imagetools create -t ${{ env.DOCKERHUB_IMAGE }}:${SHORT_SHA} \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${SHORT_SHA}-amd64 \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${SHORT_SHA}-arm64 \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${SHORT_SHA}-armv7
          
          # 获取 digest
          DIGEST=$(docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${SHORT_SHA} --format '{{.Digest}}')
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT
          echo "✅ Manifest 创建完成: $DIGEST"
          
          # 为其他标签创建 manifest
          for TAG in $(echo "${{ steps.meta.outputs.tags }}" | tr '\n' ' '); do
            if [ "$TAG" != "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${SHORT_SHA}" ]; then
              docker buildx imagetools create -t "$TAG" \
                ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${SHORT_SHA}-amd64 \
                ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${SHORT_SHA}-arm64 \
                ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${SHORT_SHA}-armv7 || true
            fi
          done
          
          for TAG in $(echo "${{ steps.meta-dockerhub.outputs.tags }}" | tr '\n' ' '); do
            if [ "$TAG" != "${{ env.DOCKERHUB_IMAGE }}:${SHORT_SHA}" ]; then
              docker buildx imagetools create -t "$TAG" \
                ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${SHORT_SHA}-amd64 \
                ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${SHORT_SHA}-arm64 \
                ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${SHORT_SHA}-armv7 || true
            fi
          done

      - name: 生成镜像信息
        run: |
          echo "## 🐳 Docker 镜像已发布" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**GHCR 镜像地址:**" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.sha.outputs.SHORT_SHA }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Docker Hub 镜像地址:**" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.DOCKERHUB_IMAGE }}:${{ steps.sha.outputs.SHORT_SHA }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**支持平台:** \`amd64\`, \`arm64\`, \`arm/v7\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**构建优化:** Matrix 并行构建，每个架构独立超时 15 分钟" >> $GITHUB_STEP_SUMMARY

  # ========== 镜像签名 (SBOM + Cosign) ==========
  sign-image:
    name: 镜像签名
    runs-on: ubuntu-latest
    needs: [changes, merge-manifest]
    if: needs.changes.outputs.docker-changed == 'true' && github.event_name != 'pull_request'
    timeout-minutes: 10
    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 登录 GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: 安装 Cosign
        uses: sigstore/cosign-installer@v3

      - name: 安装 Syft (SBOM 生成)
        uses: anchore/sbom-action/download-syft@v0

      - name: 获取镜像摘要
        id: digest
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "SHORT_SHA=$SHORT_SHA" >> $GITHUB_ENV
          # 使用 merge-manifest 输出的 digest
          DIGEST="${{ needs.merge-manifest.outputs.digest }}"
          if [ -z "$DIGEST" ]; then
            echo "⚠️ 从 merge-manifest 获取 digest 失败，尝试 imagetools"
            DIGEST=$(docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$SHORT_SHA --format '{{.Digest}}' 2>/dev/null || echo "")
          fi
          if [ -z "$DIGEST" ]; then
            echo "❌ 无法获取镜像 digest"
            exit 1
          fi
          echo "DIGEST=$DIGEST" >> $GITHUB_ENV
          echo "✅ 镜像摘要: $DIGEST"

      - name: 生成 SBOM
        run: |
          syft ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.SHORT_SHA }} -o spdx-json=sbom-spdx.json
          syft ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.SHORT_SHA }} -o cyclonedx-json=sbom-cyclonedx.json
          echo "✅ SBOM 生成完成"

      - name: 附加 SBOM 到镜像
        run: |
          cosign attach sbom --sbom sbom-spdx.json ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ env.DIGEST }}

      - name: 签名镜像 (Keyless)
        run: |
          cosign sign --yes ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ env.DIGEST }}
          echo "✅ 镜像签名完成"

      - name: 验证签名
        run: |
          cosign verify ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ env.DIGEST }} \
            --certificate-identity-regexp="https://github.com/${{ github.repository }}/.github/workflows/" \
            --certificate-oidc-issuer="https://token.actions.githubusercontent.com" || echo "⚠️ 验证跳过（开发分支）"

      - name: 上传 SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ env.SHORT_SHA }}
          path: |
            sbom-spdx.json
            sbom-cyclonedx.json
          retention-days: 90

      - name: 生成签名摘要
        run: |
          echo "## 🔐 镜像安全" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **SBOM:** 已生成并附加" >> $GITHUB_STEP_SUMMARY
          echo "- **签名:** Cosign Keyless 签名完成" >> $GITHUB_STEP_SUMMARY
          echo "- **验证:** \`cosign verify ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ env.DIGEST }}\`" >> $GITHUB_STEP_SUMMARY

  # ========== 镜像扫描 ==========
  docker-scan:
    name: 镜像安全扫描
    runs-on: ubuntu-latest
    needs: [changes, merge-manifest]
    if: needs.changes.outputs.docker-changed == 'true' && github.event_name != 'pull_request'
    timeout-minutes: 10
    steps:
      - name: 检出代码
        uses: actions/checkout@v5
      
      - name: 登录 GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}
      
      - name: 等待镜像推送完成
        run: |
          echo "等待镜像推送到 GHCR..."
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "SHORT_SHA=$SHORT_SHA" >> $GITHUB_ENV
          
          # 等待镜像可用
          sleep 20
          
          if docker manifest inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$SHORT_SHA 2>/dev/null; then
            echo "✅ 镜像已可用"
          else
            echo "⏳ 继续等待..."
            sleep 20
          fi
      
      - name: 运行 Trivy 扫描
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.SHORT_SHA }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          scan-type: 'image'
        continue-on-error: true
      
      - name: 上传扫描结果到 GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-results.sarif'
        if: always() && hashFiles('trivy-results.sarif') != ''
      
      - name: 生成扫描报告
        run: |
          echo "## 🔒 安全扫描完成" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f trivy-results.sarif ]; then
            echo "扫描结果已上传到 [Security](../../security/advisories) 页面" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ 扫描结果文件未生成，跳过上传" >> $GITHUB_STEP_SUMMARY
          fi

# 注意：Docker Compose 测试已在 ci-cd.yml 中执行，此 workflow 专注于镜像构建和发布
