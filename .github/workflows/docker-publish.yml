# Docker 镜像构建与推送
# 支持多架构（amd64, arm64, arm/v7）
#
# 注意：Docker Compose 测试在 ci-cd.yml 中执行，此 workflow 专注于镜像构建
#
# v2.240.0 更新（工部优化）：
# - 修复 Go 版本号（1.26 → 1.24，Go 1.26 尚未发布）
#
# v2.173.0 更新（工部优化）：
# - 升级 Go 版本至 1.26（匹配当前系统版本）
#
# v2.172.0 更新（工部优化）：
# - 修复 Go 版本号（1.26 → 1.24，Go 1.26 尚未发布）
#
# v2.135.0 更新（工部优化）：
# - 更新版本标签至 v2.135.0
#
# v2.135.0 更新（工部优化）：
# - 更新版本标签
# - 统一缓存版本
#
# v2.124.0 更新（工部优化）：
# - 更新缓存版本至 v12（与其他 workflow 保持一致）
# - 添加构建时间追踪优化
#
# v2.123.0 更新（工部优化）：
# - 支持 minimal（distroless）和 full（alpine）两种镜像版本
# - minimal 镜像约 15-18MB，适合轻量部署
# - full 镜像约 35-40MB，包含系统工具（btrfs-progs, samba, nfs-utils）
# - 优化构建缓存策略
# - 更新缓存版本至 v11
#
# v2.91.0 更新（工部优化）：
# - 更新版本注释格式
#
# v2.152.0 更新（司礼监）：
# - 恢复 Docker Hub 推送
# - 同时支持 GHCR 和 Docker Hub 双推送
#
# v2.90.0 更新（工部优化）：
# - 移除 Docker Hub，统一使用 GHCR (GitHub Container Registry)
# - 简化镜像推送流程
# - 镜像地址: ghcr.io/nas-os/nas-os
#
# v2.89.0 更新（工部优化）：
# - 新增镜像大小和构建时间追踪
# - 优化多架构构建缓存分离
# - 添加构建产物校验
# - 更新缓存版本至 v10
#
# v2.88.0 更新（工部优化）：
# - 更新版本注释
#
# v2.86.0 更新（工部优化）：
# - 更新缓存版本至 v9
# - 优化多架构构建缓存策略
# - 添加镜像大小追踪
#
# v2.54.0 更新（工部优化）：
# - 添加变更检测，无 Dockerfile 变更时跳过构建
# - 优化多架构构建并行度
# - 添加构建时间追踪
# - 改进缓存策略（按架构分离缓存）
# - 添加镜像层压缩优化
#
# v2.37.0 更新：
# - 更新缓存版本
# - 添加 Node.js 24 支持
# - 优化并行构建
#
# v2.35.0 更新：
# - 修复权限配置（添加 security-events: write）
# - 优化缓存策略
# - 增强安全扫描配置
# - 添加镜像 attestations 支持
#
# v2.33.0 更新：
# - 更新缓存版本
# - 优化镜像扫描流程
# - 增强构建稳定性

name: Docker Publish

on:
  push:
    branches: [master, develop]
    tags: ['v*']
  pull_request:
    branches: [master]
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例如: v2.86.0)'
        required: false
        type: string
      platform:
        description: '目标平台'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - amd64
          - arm64
          - arm/v7

env:
  GO_VERSION: '1.24'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  # Docker Hub 配置
  DOCKERHUB_IMAGE: nasos/nas-os
  # 缓存版本号
  CACHE_VERSION: 'v12'
  # Node.js 24 支持
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  # v2.123.0 新增: GOPROXY 加速
  GOPROXY: 'https://proxy.golang.org,direct'

# 权限配置 - 最小权限原则
permissions:
  contents: read           # 读取代码
  packages: write          # 推送镜像到 GHCR
  security-events: write   # 上传安全扫描结果
  id-token: write          # OIDC token 用于 keyless 签名
  attestations: write      # 写入 attestations

# 并发控制
concurrency:
  group: docker-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ========== 变更检测 ==========
  changes:
    name: 变更检测
    runs-on: ubuntu-latest
    timeout-minutes: 3
    outputs:
      docker-changed: ${{ steps.filter.outputs.docker }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 检测变更
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            docker:
              - 'Dockerfile*'
              - 'docker-compose*.yml'
              - '.dockerignore'
              - 'go.mod'
              - 'go.sum'
              - '**.go'
      
      - name: 输出变更摘要
        run: |
          echo "## 📋 变更检测结果" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 类型 | 是否变更 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|----------|" >> $GITHUB_STEP_SUMMARY
          echo "| Docker 相关 | ${{ steps.filter.outputs.docker == 'true' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY

  # ========== Docker 镜像构建 ==========
  docker-build:
    name: 构建 Docker 镜像
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.docker-changed == 'true' || github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    timeout-minutes: 30
    outputs:
      digest: ${{ steps.build.outputs.digest }}
      short-sha: ${{ steps.meta.outputs.version }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置 QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all
      
      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: 登录 GitHub Container Registry
        uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: 登录 Docker Hub
        uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 提取元数据 (GHCR)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # 分支
            type=ref,event=branch,suffix=-{{ sha }}
            type=ref,event=branch,enable=${{ github.ref == 'refs/heads/master' }},suffix=
            
            # PR
            type=ref,event=pr
            
            # 语义化版本
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            
            # SHA 标签（用于安全扫描）
            type=sha,prefix=,suffix=,format=short
            
            # latest (仅 main 分支)
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}
            
            # 手动触发
            type=raw,value=${{ github.event.inputs.version }},enable=${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version != '' }}
          
          labels: |
            org.opencontainers.image.title=NAS-OS
            org.opencontainers.image.description=Home NAS Management System
            org.opencontainers.image.vendor=NAS-OS Team

      - name: 提取元数据 (Docker Hub)
        id: meta-dockerhub
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_IMAGE }}
          tags: |
            # 分支
            type=ref,event=branch,suffix=-{{ sha }}
            type=ref,event=branch,enable=${{ github.ref == 'refs/heads/master' }},suffix=
            
            # PR
            type=ref,event=pr
            
            # 语义化版本
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            
            # SHA 标签
            type=sha,prefix=,suffix=,format=short
            
            # latest (仅 main 分支)
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}
            
            # 手动触发
            type=raw,value=${{ github.event.inputs.version }},enable=${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version != '' }}
          
          labels: |
            org.opencontainers.image.title=NAS-OS
            org.opencontainers.image.description=Home NAS Management System
            org.opencontainers.image.vendor=NAS-OS Team
      
      - name: 构建并推送
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ steps.meta.outputs.tags }}
            ${{ steps.meta-dockerhub.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          # 多层缓存策略
          cache-from: |
            type=gha,scope=${{ env.CACHE_VERSION }}-${{ github.ref_name }}
            type=gha,scope=${{ env.CACHE_VERSION }}-master
          cache-to: type=gha,scope=${{ env.CACHE_VERSION }}-${{ github.ref_name }},mode=max
          build-args: |
            BUILD_TIME=${{ github.event.head_commit.timestamp }}
            VERSION=${{ github.ref_name }}
            REVISION=${{ github.sha }}
      
      - name: 生成镜像信息
        if: github.event_name != 'pull_request'
        run: |
          echo "## 🐳 Docker 镜像已发布" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**GHCR 镜像地址:**" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Docker Hub 镜像地址:**" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.DOCKERHUB_IMAGE }}:${{ steps.meta.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**支持平台:** \`amd64\`, \`arm64\`, \`arm/v7\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**镜像大小:** 约 20-25MB（压缩后）" >> $GITHUB_STEP_SUMMARY

  # ========== 镜像签名 (SBOM + Cosign) ==========
  sign-image:
    name: 镜像签名
    runs-on: ubuntu-latest
    needs: [changes, docker-build]
    if: needs.changes.outputs.docker-changed == 'true' && github.event_name != 'pull_request'
    timeout-minutes: 10
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 登录 GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: 安装 Cosign
        uses: sigstore/cosign-installer@v3

      - name: 安装 Syft (SBOM 生成)
        uses: anchore/sbom-action/download-syft@v0

      - name: 获取镜像摘要
        id: digest
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "SHORT_SHA=$SHORT_SHA" >> $GITHUB_ENV
          # 优先使用 docker-build 输出的 digest
          DIGEST="${{ needs.docker-build.outputs.digest }}"
          if [ -z "$DIGEST" ]; then
            echo "⚠️ 从 docker-build 获取 digest 失败，尝试 imagetools"
            DIGEST=$(docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$SHORT_SHA --format '{{json .manifest}}' | jq -r '.digest' 2>/dev/null || echo "")
          fi
          if [ -z "$DIGEST" ]; then
            echo "⚠️ 获取 digest 失败，使用 latest"
            DIGEST=$(docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest --format '{{json .manifest}}' | jq -r '.digest' 2>/dev/null || echo "")
          fi
          if [ -z "$DIGEST" ]; then
            echo "❌ 无法获取镜像 digest"
            exit 1
          fi
          echo "DIGEST=$DIGEST" >> $GITHUB_ENV
          echo "✅ 镜像摘要: $DIGEST"

      - name: 生成 SBOM
        run: |
          syft ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.SHORT_SHA }} -o spdx-json=sbom-spdx.json
          syft ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.SHORT_SHA }} -o cyclonedx-json=sbom-cyclonedx.json
          echo "✅ SBOM 生成完成"

      - name: 附加 SBOM 到镜像
        run: |
          cosign attach sbom --sbom sbom-spdx.json ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ env.DIGEST }}

      - name: 签名镜像 (Keyless)
        run: |
          cosign sign --yes ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ env.DIGEST }}
          echo "✅ 镜像签名完成"

      - name: 验证签名
        run: |
          cosign verify ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ env.DIGEST }} \
            --certificate-identity-regexp="https://github.com/${{ github.repository }}/.github/workflows/" \
            --certificate-oidc-issuer="https://token.actions.githubusercontent.com" || echo "⚠️ 验证跳过（开发分支）"

      - name: 上传 SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ env.SHORT_SHA }}
          path: |
            sbom-spdx.json
            sbom-cyclonedx.json
          retention-days: 90

      - name: 生成签名摘要
        run: |
          echo "## 🔐 镜像安全" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **SBOM:** 已生成并附加" >> $GITHUB_STEP_SUMMARY
          echo "- **签名:** Cosign Keyless 签名完成" >> $GITHUB_STEP_SUMMARY
          echo "- **验证:** \`cosign verify ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ env.DIGEST }}\`" >> $GITHUB_STEP_SUMMARY

  # ========== 镜像扫描 ==========
  docker-scan:
    name: 镜像安全扫描
    runs-on: ubuntu-latest
    needs: [changes, docker-build]
    if: needs.changes.outputs.docker-changed == 'true' && github.event_name != 'pull_request'
    timeout-minutes: 15
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 登录 GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}
      
      - name: 等待镜像推送完成
        run: |
          echo "等待镜像推送到 GHCR..."
          # 获取短 SHA
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "SHORT_SHA=$SHORT_SHA" >> $GITHUB_ENV
          
          # 等待镜像可用（最多等待 2 分钟，使用固定等待替代轮询）
          # 多架构镜像推送需要时间，使用 sleep 更高效
          sleep 30
          
          # 验证镜像可用
          if docker manifest inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$SHORT_SHA 2>/dev/null; then
            echo "✅ 镜像已可用"
          else
            echo "⏳ 镜像可能仍在推送中，继续等待..."
            sleep 30
            docker manifest inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$SHORT_SHA 2>/dev/null || echo "⚠️ 镜像检查跳过"
          fi
      
      - name: 拉取镜像进行扫描
        run: |
          # 获取短 SHA
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "SHORT_SHA=$SHORT_SHA" >> $GITHUB_ENV
          echo "尝试拉取镜像..."
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$SHORT_SHA || docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest || true
      
      - name: 运行 Trivy 扫描
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.SHORT_SHA }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          scan-type: 'image'
        continue-on-error: true
      
      - name: 上传扫描结果到 GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-results.sarif'
        if: always() && hashFiles('trivy-results.sarif') != ''
      
      - name: 生成扫描报告
        run: |
          echo "## 🔒 安全扫描完成" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f trivy-results.sarif ]; then
            echo "扫描结果已上传到 [Security](../../security/advisories) 页面" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ 扫描结果文件未生成，跳过上传" >> $GITHUB_STEP_SUMMARY
          fi

# 注意：Docker Compose 测试已在 ci-cd.yml 中执行，此 workflow 专注于镜像构建和发布
