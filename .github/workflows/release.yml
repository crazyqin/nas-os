# GitHub Release 构建
# 构建多平台二进制文件并上传到 GitHub Release
#
# v2.35.0 更新：
# - 添加 id-token 权限支持 OIDC 签名
# - 优化构建产物缓存
# - 添加构建缓存恢复
#
# v2.31.0 更新：
# - 添加源码 SBOM 生成
# - 添加校验和签名
# - 发布包含 SBOM 文件

name: GitHub Release

on:
  push:
    tags:
      - 'v*'

env:
  GO_VERSION: '1.26'
  CACHE_VERSION: 'v3'

# 权限配置
permissions:
  contents: write          # 创建 Release
  packages: write          # 推送到 GHCR
  id-token: write          # OIDC 签名

jobs:
  # ========== 构建二进制文件 ==========
  build-binaries:
    name: 构建二进制文件
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            ext: ""
          - os: linux
            arch: arm64
            ext: ""
          - os: linux
            arch: arm
            arm: "7"
            ext: ""
          - os: darwin
            arch: amd64
            ext: ""
          - os: darwin
            arch: arm64
            ext: ""
          - os: windows
            arch: amd64
            ext: ".exe"
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置 Go 环境
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      
      - name: 构建 nasd
        run: |
          if [ "${{ matrix.arm }}" != "" ]; then
            CGO_ENABLED=0 GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} GOARM=${{ matrix.arm }} go build -ldflags="-w -s" -o nasd-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }} ./cmd/nasd
          else
            CGO_ENABLED=0 GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} go build -ldflags="-w -s" -o nasd-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }} ./cmd/nasd
          fi
      
      - name: 构建 nasctl
        run: |
          if [ "${{ matrix.arm }}" != "" ]; then
            CGO_ENABLED=0 GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} GOARM=${{ matrix.arm }} go build -ldflags="-w -s" -o nasctl-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }} ./cmd/nasctl
          else
            CGO_ENABLED=0 GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} go build -ldflags="-w -s" -o nasctl-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }} ./cmd/nasctl
          fi
      
      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            nasd-*
            nasctl-*
          retention-days: 1
      
  # ========== 生成 SBOM 和校验和 ==========
  generate-sbom:
    name: 生成 SBOM
    runs-on: ubuntu-latest
    needs: [build-binaries]
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 安装 Syft
        uses: anchore/sbom-action/download-syft@v0
      
      - name: 生成源码 SBOM
        run: |
          syft dir:. -o spdx-json=sbom-source-spdx.json
          syft dir:. -o cyclonedx-json=sbom-source-cyclonedx.json
      
      - name: 上传 SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: |
            sbom-source-spdx.json
            sbom-source-cyclonedx.json
          retention-days: 90
  
  # ========== 创建 Release ==========
  create-release:
    name: 创建 GitHub Release
    runs-on: ubuntu-latest
    needs: [build-binaries, generate-sbom]
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 下载所有构建产物
        uses: actions/download-artifact@v4
        with:
          pattern: binaries-*
          merge-multiple: true
      
      - name: 下载 SBOM
        uses: actions/download-artifact@v4
        with:
          name: sbom
          path: ./sbom
      
      - name: 生成校验和
        run: |
          sha256sum nasd-* nasctl-* > checksums.txt
          sha256sum checksums.txt > checksums.txt.sig
      
      - name: 生成 Release Notes
        id: release-notes
        run: |
          echo "## 🎉 更新内容" > RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          git log $(git describe --tags --abbrev=0 HEAD^)..HEAD --pretty=format:"- %s" >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "## 📦 下载" >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "### Linux" >> RELEASE_NOTES.md
          echo "\`\`\`bash" >> RELEASE_NOTES.md
          echo "# AMD64" >> RELEASE_NOTES.md
          echo "wget https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/nasd-linux-amd64" >> RELEASE_NOTES.md
          echo "chmod +x nasd-linux-amd64" >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "# ARM64 (Orange Pi 5, Raspberry Pi 4/5)" >> RELEASE_NOTES.md
          echo "wget https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/nasd-linux-arm64" >> RELEASE_NOTES.md
          echo "chmod +x nasd-linux-arm64" >> RELEASE_NOTES.md
          echo "\`\`\`" >> RELEASE_NOTES.md
      
      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            nasd-*
            nasctl-*
            checksums.txt
            checksums.txt.sig
            sbom/sbom-source-spdx.json
            sbom/sbom-source-cyclonedx.json
          body_path: RELEASE_NOTES.md
          generate_release_notes: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
