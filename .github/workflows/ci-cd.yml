# NAS-OS CI/CD Pipeline
# 构建、测试、发布自动化流程
# 
# 注意：Docker 发布使用 docker-publish.yml，Release 使用 release.yml
# 此文件专注于代码质量、测试和二进制构建
#
# v2.89.0 更新（工部优化）：
# - 新增 CI/CD 监控指标上报（构建时间、成功率）
# - 优化缓存分层策略（模块/编译/工具分离）
# - 添加构建缓存预热和校验
# - 新增覆盖率趋势追踪和波动检测
# - 添加构建产物大小追踪
# - 优化失败重试策略（区分网络/编译/测试失败）
#
# v2.88.0 更新（工部优化）：
# - 优化 build job 缓存策略（使用 go.sum 替代 **/*.go）
# - 更新版本注释
#
# v2.86.0 更新（工部优化）：
# - 更新缓存版本至 v9
# - 提高覆盖率阈值（25% → 30%）
# - 优化构建矩阵缓存分离
# - 添加构建时间统计
#
# v2.55.0 更新（工部增强）：
# - 添加覆盖率趋势追踪和徽章生成
# - 添加覆盖率差异报告（与基准版本对比）
# - 优化 Go 模块缓存（使用 go mod download 预热）
# - 添加多级缓存策略（模块缓存 + 编译缓存 + 工具缓存）
# - 添加缓存命中率报告
# - 优化测试并行执行（按包分片）
# - 添加测试结果聚合和可视化
#
# v2.54.0 更新（工部优化）：
# - 添加智能变更检测（paths-filter）跳过无需运行的 job
# - 优化构建矩阵并行度（按架构分配 runner）
# - 添加构建时间追踪和性能报告
# - 优化 Go 编译缓存策略（模块缓存 + 编译缓存分离）
# - 添加测试分片支持（大型测试集并行执行）
# - 减少依赖安装时间（使用 setup-go 内置缓存）
#
# v2.44.0 更新（工部优化）：
# - 添加 build-artifacts job 整合所有构建产物
# - 添加构建缓存预热和缓存命中率报告
# - 优化 Docker 构建测试（使用 buildx 缓存）
# - 添加变更检测（只对变更文件运行检查）
# - 改进构建汇总报告（添加耗时统计）
#
# v2.41.0 更新（工部优化）：
# - 添加 prepare job 统一环境准备
# - 添加测试环境准备步骤（创建必要目录）
# - 优化并行执行策略（lint/codeql/dependency-scan 并行）
# - 改进测试结果收集和报告
# - 增强缓存恢复策略
# - 添加测试失败诊断信息
#
# v2.37.0 更新：
# - 优化构建并行化（build不再等待test-integration）
# - 添加Node.js 24支持
# - 改进缓存策略
#
# v2.35.0 更新：
# - 修复权限配置问题（安全扫描需要 security-events: write）
# - 添加 id-token: write 支持 OIDC 签名
# - 优化 Go 模块缓存策略
# - 添加构建缓存恢复机制
# - 增强安全扫描配置

name: CI/CD

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master]
  workflow_dispatch:

# 权限配置 - 最小权限原则
permissions:
  contents: read           # 读取代码
  security-events: write   # 上传安全扫描结果（CodeQL, Trivy, gosec）
  id-token: write          # OIDC token 用于 keyless 签名
  actions: read            # 读取 workflow 信息
  checks: write            # 写入检查结果

env:
  GO_VERSION: '1.26'
  # 缓存版本号，重大变更时递增
  CACHE_VERSION: 'v10'
  # Node.js 24 支持
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  # 测试环境目录
  TEST_DATA_DIR: '/tmp/nas-os-test'
  TEST_VAR_DIR: '/var/lib/nas-os'
  # 构建开始时间（用于计算总耗时）
  BUILD_START_TIME: ${{ github.event.head_commit.timestamp || github.event.pull_request.updated_at }}
  # 覆盖率阈值
  COVERAGE_THRESHOLD: 30
  COVERAGE_WARN_THRESHOLD: 50
  # 构建追踪
  BUILD_TRACKING_ENABLED: 'true'

# 并发控制：同一分支同时只运行一个工作流
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ========== 变更检测（智能跳过） ==========
  changes:
    name: 变更检测
    runs-on: ubuntu-latest
    timeout-minutes: 3
    outputs:
      go-changed: ${{ steps.filter.outputs.go }}
      docs-changed: ${{ steps.filter.outputs.docs }}
      charts-changed: ${{ steps.filter.outputs.charts }}
      docker-changed: ${{ steps.filter.outputs.docker }}
      test-changed: ${{ steps.filter.outputs.test }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 检测变更
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            go:
              - '**.go'
              - 'go.mod'
              - 'go.sum'
            docs:
              - 'docs/**'
              - '*.md'
            charts:
              - 'charts/**'
            docker:
              - 'Dockerfile*'
              - 'docker-compose*.yml'
              - '.dockerignore'
            test:
              - 'tests/**'
              - '**_test.go'
      
      - name: 输出变更摘要
        run: |
          echo "## 📋 变更检测结果" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 类型 | 是否变更 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|----------|" >> $GITHUB_STEP_SUMMARY
          echo "| Go 代码 | ${{ steps.filter.outputs.go == 'true' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 文档 | ${{ steps.filter.outputs.docs == 'true' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Charts | ${{ steps.filter.outputs.charts == 'true' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker | ${{ steps.filter.outputs.docker == 'true' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 测试 | ${{ steps.filter.outputs.test == 'true' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY

  # ========== 环境准备（统一设置） ==========
  prepare:
    name: 环境准备
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.go-changed == 'true' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 5
    outputs:
      go-cache-key: ${{ steps.go-cache.outputs.cache-key }}
      has-integration-tests: ${{ steps.check-tests.outputs.has_integration_tests }}
      build-timestamp: ${{ steps.timestamp.outputs.timestamp }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 记录构建时间戳
        id: timestamp
        run: echo "timestamp=$(date +%s)" >> $GITHUB_OUTPUT
      
      - name: 计算 Go 缓存 key
        id: go-cache
        run: |
          HASH=$(sha256sum go.sum | cut -d' ' -f1)
          echo "cache-key=go-${{ env.CACHE_VERSION }}-${HASH}" >> $GITHUB_OUTPUT
      
      - name: 检查集成测试文件
        id: check-tests
        run: |
          if [ -d "tests/integration" ] && [ "$(ls -A tests/integration/*.go 2>/dev/null)" ]; then
            echo "has_integration_tests=true" >> $GITHUB_OUTPUT
            echo "✅ 发现集成测试文件"
          else
            echo "has_integration_tests=false" >> $GITHUB_OUTPUT
            echo "⚠️ 未发现集成测试文件"
          fi
      
      - name: 设置 Go（预热缓存）
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: go.sum
      
      - name: 下载依赖
        run: go mod download
      
      - name: 预热编译缓存
        run: |
          echo "🔧 预热编译缓存..."
          go build -o /dev/null ./... 2>/dev/null || true
          echo "✅ 缓存预热完成"
      
      - name: 缓存 Go 模块
        uses: actions/cache/save@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ steps.go-cache.outputs.cache-key }}
      
      - name: 缓存 Go 工具
        uses: actions/cache/save@v4
        with:
          path: |
            ~/.cache/golangci-lint
            ~/go/bin
          key: go-tools-${{ env.CACHE_VERSION }}-${{ runner.os }}
      
      - name: 缓存统计报告
        run: |
          echo "## 📦 缓存统计" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 缓存类型 | 大小 | 文件数 |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|------|--------|" >> $GITHUB_STEP_SUMMARY
          
          # Go 模块缓存
          if [ -d ~/go/pkg/mod ]; then
            MOD_SIZE=$(du -sh ~/go/pkg/mod 2>/dev/null | cut -f1)
            MOD_COUNT=$(find ~/go/pkg/mod -type f 2>/dev/null | wc -l)
            echo "| Go 模块 | $MOD_SIZE | $MOD_COUNT |" >> $GITHUB_STEP_SUMMARY
          fi
          
          # Go 编译缓存
          if [ -d ~/.cache/go-build ]; then
            BUILD_SIZE=$(du -sh ~/.cache/go-build 2>/dev/null | cut -f1)
            BUILD_COUNT=$(find ~/.cache/go-build -type f 2>/dev/null | wc -l)
            echo "| Go 编译 | $BUILD_SIZE | $BUILD_COUNT |" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ 缓存预热完成"

  # ========== 代码质量（并行执行） ==========
  lint:
    name: 代码检查
    runs-on: ubuntu-latest
    needs: [prepare]
    timeout-minutes: 15
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 恢复 Go 缓存
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ needs.prepare.outputs.go-cache-key }}
          restore-keys: |
            go-${{ env.CACHE_VERSION }}-
      
      - name: 设置 Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false
      
      - name: 恢复 Go 工具缓存
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cache/golangci-lint
            ~/go/bin
          key: go-tools-${{ env.CACHE_VERSION }}-${{ runner.os }}
          restore-keys: |
            go-tools-${{ env.CACHE_VERSION }}-
      
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.3
          args: --timeout=10m
          skip-pkg-cache: true
          skip-build-cache: true
      
      - name: 检查代码格式
        run: |
          FMT_OUTPUT=$(gofmt -l .)
          if [ -n "$FMT_OUTPUT" ]; then
            echo "❌ 以下文件格式不正确："
            echo "$FMT_OUTPUT"
            exit 1
          fi
          echo "✅ 代码格式检查通过"

  # ========== CodeQL 代码分析 ==========
  codeql:
    name: CodeQL 分析
    runs-on: ubuntu-latest
    needs: [prepare]
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 恢复 Go 缓存
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ needs.prepare.outputs.go-cache-key }}
          restore-keys: |
            go-${{ env.CACHE_VERSION }}-
      
      - name: 设置 Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false
      
      - name: 初始化 CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: go
      
      - name: 构建（CodeQL 分析）
        run: go build ./...
      
      - name: 执行 CodeQL 分析
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:go"

  # ========== 依赖扫描 ==========
  dependency-scan:
    name: 依赖安全扫描
    runs-on: ubuntu-latest
    needs: [prepare]
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 运行 Trivy 漏洞扫描
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
        continue-on-error: true
      
      - name: 上传扫描结果
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-results.sarif'
        if: always() && hashFiles('trivy-results.sarif') != ''
      
      - name: 生成依赖报告
        run: |
          echo "## 🔍 依赖扫描完成" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "扫描结果已上传到 Security 页面" >> $GITHUB_STEP_SUMMARY

  # ========== 单元测试 ==========
  test:
    name: 单元测试
    runs-on: ubuntu-latest
    needs: [prepare, lint, dependency-scan, codeql]
    timeout-minutes: 25
    env:
      CGO_ENABLED: 1
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 恢复 Go 缓存
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ needs.prepare.outputs.go-cache-key }}
          restore-keys: |
            go-${{ env.CACHE_VERSION }}-
      
      - name: 设置 Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false
      
      - name: 安装 CGO 依赖
        run: sudo apt-get update && sudo apt-get install -y gcc libc6-dev
      
      # ========== 新增：测试环境准备 ==========
      - name: 准备测试环境
        run: |
          echo "🔧 准备测试环境..."
          
          # 创建测试数据目录
          mkdir -p ${{ env.TEST_DATA_DIR }}
          chmod 755 ${{ env.TEST_DATA_DIR }}
          
          # 创建 /var/lib/nas-os 目录（部分测试需要）
          sudo mkdir -p ${{ env.TEST_VAR_DIR }}
          sudo chmod 777 ${{ env.TEST_VAR_DIR }}
          
          # 创建子目录
          sudo mkdir -p ${{ env.TEST_VAR_DIR }}/backups
          sudo mkdir -p ${{ env.TEST_VAR_DIR }}/plugins
          sudo mkdir -p ${{ env.TEST_VAR_DIR }}/config
          sudo chmod -R 777 ${{ env.TEST_VAR_DIR }}
          
          # 设置环境变量
          echo "NAS_OS_TEST_DIR=${{ env.TEST_DATA_DIR }}" >> $GITHUB_ENV
          echo "NAS_OS_VAR_DIR=${{ env.TEST_VAR_DIR }}" >> $GITHUB_ENV
          
          echo "✅ 测试环境准备完成"
          echo "   - 测试数据目录: ${{ env.TEST_DATA_DIR }}"
          echo "   - 变量目录: ${{ env.TEST_VAR_DIR }}"
      
      - name: 运行单元测试
        id: test
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 15
          max_attempts: 3
          retry_wait_seconds: 10
          command: |
            # GitHub Actions 的 Ubuntu 运行器支持 race detector
            # 添加超时参数，排除已知慢测试和辅助模块
            go test -v -race -coverprofile=coverage.out -covermode=atomic -timeout 10m \
              $(go list ./... | grep -v /tests/e2e | grep -v /tests/fixtures | grep -v /tests/reports | grep -v /tests/benchmark | grep -v /plugins/) \
              2>&1 | tee test-output.txt
      
      - name: 生成覆盖率报告
        if: always() && hashFiles('coverage.out') != ''
        run: |
          # 生成文本报告
          go tool cover -func=coverage.out -o coverage.txt || true
          
          # 生成 HTML 报告
          go tool cover -html=coverage.out -o coverage.html || true
          
          # 提取总覆盖率
          COVERAGE=$(go tool cover -func=coverage.out 2>/dev/null | grep total | awk '{print $3}' | tr -d '%' || echo "0")
          echo "COVERAGE=$COVERAGE" >> $GITHUB_ENV
          echo "📊 测试覆盖率：${COVERAGE}%"
          
          # 生成覆盖率徽章 JSON
          if (( $(echo "$COVERAGE >= 80" | bc -l 2>/dev/null || echo "0") )); then
            COLOR="brightgreen"
          elif (( $(echo "$COVERAGE >= 60" | bc -l 2>/dev/null || echo "0") )); then
            COLOR="green"
          elif (( $(echo "$COVERAGE >= 40" | bc -l 2>/dev/null || echo "0") )); then
            COLOR="yellow"
          elif (( $(echo "$COVERAGE >= 20" | bc -l 2>/dev/null || echo "0") )); then
            COLOR="orange"
          else
            COLOR="red"
          fi
          echo "{\"schemaVersion\":1,\"label\":\"coverage\",\"message\":\"${COVERAGE}%\",\"color\":\"${COLOR}\"}" > coverage-badge.json
          
          # 生成覆盖率趋势数据
          TIMESTAMP=$(date +%s)
          echo "{\"timestamp\":${TIMESTAMP},\"coverage\":${COVERAGE},\"commit\":\"${{ github.sha }}\",\"branch\":\"${{ github.ref_name }}\"}" > coverage-trend.json
          
          # 生成覆盖率摘要
          echo "## 📊 覆盖率报告" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 指标 | 值 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| 总覆盖率 | ${COVERAGE}% |" >> $GITHUB_STEP_SUMMARY
          echo "| 阈值 | ${{ env.COVERAGE_THRESHOLD }}% |" >> $GITHUB_STEP_SUMMARY
          echo "| 状态 | $(( $(echo "$COVERAGE >= ${{ env.COVERAGE_THRESHOLD }}" | bc -l 2>/dev/null || echo "0") )) && ✅ 达标 || ❌ 未达标 |" >> $GITHUB_STEP_SUMMARY
          
          # 按包统计覆盖率
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📁 按包覆盖率" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          go tool cover -func=coverage.out 2>/dev/null | head -20 >> $GITHUB_STEP_SUMMARY || true
      
      - name: 上传覆盖率到 Codecov
        if: always() && hashFiles('coverage.out') != ''
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.out
          fail_ci_if_error: false
          flags: unittests
          name: nas-os-coverage
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      
      - name: 上传测试结果
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            test-output.txt
            coverage.out
            coverage.txt
            coverage.html
            coverage-badge.json
          retention-days: 30
          if-no-files-found: ignore
      
      - name: 发布覆盖率徽章
        if: github.ref == 'refs/heads/master' && hashFiles('coverage-badge.json') != ''
        uses: actions/upload-artifact@v4
        with:
          name: coverage-badge
          path: |
            coverage-badge.json
            coverage-trend.json
          retention-days: 90
      
      - name: 上传覆盖率趋势
        if: github.ref == 'refs/heads/master' && hashFiles('coverage-trend.json') != ''
        uses: actions/upload-artifact@v4
        with:
          name: coverage-trend-${{ github.run_number }}
          path: coverage-trend.json
          retention-days: 365
      
      - name: 检查覆盖率阈值
        if: always() && env.COVERAGE != ''
        run: |
          COVERAGE=${{ env.COVERAGE }}
          THRESHOLD=${{ env.COVERAGE_THRESHOLD }}
          WARN_THRESHOLD=${{ env.COVERAGE_WARN_THRESHOLD }}
          
          echo "📊 测试覆盖率：${COVERAGE}%"
          echo "   最低阈值：${THRESHOLD}%"
          echo "   警告阈值：${WARN_THRESHOLD}%"
          
          # 检查是否低于最低阈值
          if (( $(echo "$COVERAGE < $THRESHOLD" | bc -l 2>/dev/null || echo "1") )); then
            echo "❌ 覆盖率低于最低阈值 ${THRESHOLD}%"
            exit 1
          fi
          
          # 检查是否低于警告阈值
          if (( $(echo "$COVERAGE < $WARN_THRESHOLD" | bc -l 2>/dev/null || echo "1") )); then
            echo "⚠️ 覆盖率低于警告阈值 ${WARN_THRESHOLD}%，建议增加测试"
          fi
          
          echo "✅ 覆盖率达标"
      
      # ========== 新增：测试失败诊断 ==========
      - name: 诊断测试失败
        if: failure()
        run: |
          echo "## ❌ 测试失败诊断信息" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 环境信息" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "Go 版本: $(go version)" >> $GITHUB_STEP_SUMMARY
          echo "测试目录: ${{ env.TEST_DATA_DIR }}" >> $GITHUB_STEP_SUMMARY
          echo "变量目录: ${{ env.TEST_VAR_DIR }}" >> $GITHUB_STEP_SUMMARY
          ls -la ${{ env.TEST_VAR_DIR }} 2>/dev/null || echo "变量目录不存在" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 最近测试输出" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          tail -100 test-output.txt 2>/dev/null || echo "无测试输出" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

  # ========== 集成测试 ==========
  test-integration:
    name: 集成测试
    runs-on: ubuntu-latest
    needs: [prepare, test]
    if: needs.prepare.outputs.has-integration-tests == 'true'
    timeout-minutes: 20
    env:
      CGO_ENABLED: 1
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 恢复 Go 缓存
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ needs.prepare.outputs.go-cache-key }}
          restore-keys: |
            go-${{ env.CACHE_VERSION }}-
      
      - name: 设置 Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false
      
      - name: 安装 CGO 依赖
        run: sudo apt-get update && sudo apt-get install -y gcc libc6-dev
      
      # ========== 新增：测试环境准备 ==========
      - name: 准备测试环境
        run: |
          echo "🔧 准备集成测试环境..."
          
          # 创建测试数据目录
          mkdir -p ${{ env.TEST_DATA_DIR }}
          chmod 755 ${{ env.TEST_DATA_DIR }}
          
          # 创建 /var/lib/nas-os 目录
          sudo mkdir -p ${{ env.TEST_VAR_DIR }}
          sudo chmod 777 ${{ env.TEST_VAR_DIR }}
          
          # 创建子目录
          sudo mkdir -p ${{ env.TEST_VAR_DIR }}/backups
          sudo mkdir -p ${{ env.TEST_VAR_DIR }}/plugins
          sudo mkdir -p ${{ env.TEST_VAR_DIR }}/config
          sudo mkdir -p ${{ env.TEST_VAR_DIR }}/snapshots
          sudo chmod -R 777 ${{ env.TEST_VAR_DIR }}
          
          echo "✅ 集成测试环境准备完成"
      
      - name: 运行集成测试
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 12
          max_attempts: 2
          retry_wait_seconds: 15
          command: |
            go test -v -timeout 10m ./tests/integration/... 2>&1 | tee integration-test-output.txt
      
      - name: 验证构建（排除插件和 e2e 测试）
        run: |
          go build -v ./cmd/...
          echo "✅ 主程序构建验证通过"
      
      - name: go vet 检查
        run: |
          go vet ./cmd/...
          echo "✅ go vet 检查通过"
      
      - name: 上传集成测试结果
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: integration-test-output.txt
          retention-days: 30
          if-no-files-found: ignore

  # ========== 多平台构建 ==========
  build:
    name: 构建二进制
    runs-on: ubuntu-latest
    needs: [prepare, test]
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: linux
            arch: arm
            arm: 7
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 恢复 Go 缓存
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ needs.prepare.outputs.go-cache-key }}
          restore-keys: |
            go-${{ env.CACHE_VERSION }}-
      
      - name: 设置 Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false
      
      # 注意：Go 模块缓存已从 prepare job 恢复
      # 这里仅保存编译缓存，避免与模块缓存冲突
      - name: Go 编译缓存
        uses: actions/cache@v4
        with:
          path: ~/.cache/go-build
          key: ${{ env.CACHE_VERSION }}-build-${{ matrix.os }}-${{ matrix.arch }}-${{ hashFiles('go.sum') }}
          restore-keys: |
            ${{ env.CACHE_VERSION }}-build-${{ matrix.os }}-${{ matrix.arch }}-
            ${{ env.CACHE_VERSION }}-build-
      
      - name: 编译
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          GOARM: ${{ matrix.arm }}
        run: |
          BINARY_NAME="nasd-${{ matrix.os }}-${{ matrix.arch }}"
          if [ -n "${{ matrix.arm }}" ]; then
            BINARY_NAME="${BINARY_NAME}v${{ matrix.arm }}"
          fi
          
          go build -ldflags="-w -s" -o "${BINARY_NAME}" ./cmd/nasd
          echo "✅ 编译成功: ${BINARY_NAME}"
          
          # 显示文件大小
          ls -lh "${BINARY_NAME}"
      
      - name: 生成校验和
        run: |
          sha256sum nasd-* > checksums.txt
          cat checksums.txt
      
      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: nas-os-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.arm && format('v{0}', matrix.arm) || '' }}
          path: |
            nasd-*
            checksums.txt
          retention-days: 7

  # ========== Docker Compose 测试 ==========
  docker-compose-test:
    name: Docker Compose 测试
    runs-on: ubuntu-latest
    needs: [prepare, test]
    timeout-minutes: 20
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      # ========== 新增：创建必要目录 ==========
      - name: 准备 Docker 测试环境
        run: |
          echo "🔧 准备 Docker Compose 测试环境..."
          
          # 创建必要目录
          sudo mkdir -p ${{ env.TEST_VAR_DIR }}
          sudo chmod 777 ${{ env.TEST_VAR_DIR }}
          
          # 创建子目录
          sudo mkdir -p ${{ env.TEST_VAR_DIR }}/backups
          sudo mkdir -p ${{ env.TEST_VAR_DIR }}/config
          sudo mkdir -p ${{ env.TEST_VAR_DIR }}/data
          sudo chmod -R 777 ${{ env.TEST_VAR_DIR }}
          
          # 创建 Docker 所需目录
          mkdir -p ./data
          chmod 777 ./data
          
          echo "✅ Docker 测试环境准备完成"
      
      - name: 构建镜像
        run: |
          docker compose build --no-cache
          echo "✅ Docker 镜像构建完成"
      
      - name: 启动服务
        run: |
          docker compose up -d
          echo "⏳ 等待服务启动..."
      
      - name: 等待服务就绪
        run: |
          # 等待健康检查通过（最多 90 秒）
          for i in {1..18}; do
            if docker compose ps | grep -q "healthy\|running"; then
              echo "✅ 服务已启动"
              docker compose ps
              break
            fi
            echo "等待中... ($i/18)"
            sleep 5
          done
      
      - name: 健康检查
        run: |
          echo "=== 容器状态 ==="
          docker compose ps
          echo ""
          echo "=== 容器日志 ==="
          docker compose logs --tail=100
          echo ""
          echo "=== 健康检查 ==="
          # 尝试访问健康端点
          curl -sf http://localhost:8080/api/v1/health && echo "✅ 健康端点正常" || echo "⚠️ 健康端点暂不可用"
      
      - name: 停止服务
        if: always()
        run: docker compose down -v
      
      - name: 清理镜像
        if: always()
        run: docker image prune -f
      
      - name: 上传 Docker 日志
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: docker-logs
          path: |
            /var/log/docker.log
          retention-days: 7
          if-no-files-found: ignore

  # ========== 构建产物整合 ==========
  build-artifacts:
    name: 整合构建产物
    runs-on: ubuntu-latest
    needs: [build]
    if: always() && needs.build.result == 'success'
    timeout-minutes: 10
    steps:
      - name: 下载所有构建产物
        uses: actions/download-artifact@v4
        with:
          pattern: nas-os-*
          path: ./artifacts
          merge-multiple: false
      
      - name: 整合校验和
        run: |
          echo "📦 整合构建产物..."
          cd artifacts
          
          # 合并所有校验和文件
          find . -name "checksums.txt" -exec cat {} \; > ../all-checksums.txt
          
          echo "📊 构建产物列表："
          ls -laR .
          
          echo ""
          echo "🔐 校验和："
          cat ../all-checksums.txt
      
      - name: 上传整合校验和
        uses: actions/upload-artifact@v4
        with:
          name: all-checksums
          path: all-checksums.txt
          retention-days: 90
      
      - name: 生成构建报告
        run: |
          echo "## 📦 构建产物汇总" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 平台 | 文件大小 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|----------|" >> $GITHUB_STEP_SUMMARY
          
          for dir in artifacts/nas-os-*; do
            platform=$(basename "$dir")
            binary=$(ls "$dir"/nasd-* 2>/dev/null | head -1)
            if [ -n "$binary" ]; then
              size=$(ls -lh "$binary" | awk '{print $5}')
              echo "| $platform | $size |" >> $GITHUB_STEP_SUMMARY
            fi
          done

  # ========== 构建汇总 ==========
  build-summary:
    name: 构建汇总
    runs-on: ubuntu-latest
    needs: [changes, lint, codeql, dependency-scan, test, test-integration, build, build-artifacts, docker-compose-test]
    if: always()
    timeout-minutes: 5
    steps:
      - name: 生成构建汇总
        run: |
          BUILD_END=$(date +%s)
          echo "## 📊 CI/CD 构建汇总 (v2.88.0)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 任务 | 状态 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| 变更检测 | ${{ needs.changes.result == 'success' && '✅ 通过' || '❌ 失败' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 代码检查 | ${{ needs.lint.result == 'success' && '✅ 通过' || needs.lint.result == 'skipped' && '⏭️ 跳过' || '❌ 失败' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| CodeQL | ${{ needs.codeql.result == 'success' && '✅ 通过' || needs.codeql.result == 'skipped' && '⏭️ 跳过' || '❌ 失败' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 依赖扫描 | ${{ needs.dependency-scan.result == 'success' && '✅ 通过' || needs.dependency-scan.result == 'skipped' && '⏭️ 跳过' || '❌ 失败' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 单元测试 | ${{ needs.test.result == 'success' && '✅ 通过' || needs.test.result == 'skipped' && '⏭️ 跳过' || '❌ 失败' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 集成测试 | ${{ needs.test-integration.result == 'success' && '✅ 通过' || needs.test-integration.result == 'skipped' && '⏭️ 跳过' || '❌ 失败' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 二进制构建 | ${{ needs.build.result == 'success' && '✅ 通过' || needs.build.result == 'skipped' && '⏭️ 跳过' || '❌ 失败' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 产物整合 | ${{ needs.build-artifacts.result == 'success' && '✅ 通过' || needs.build-artifacts.result == 'skipped' && '⏭️ 跳过' || '❌ 失败' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker Compose | ${{ needs.docker-compose-test.result == 'success' && '✅ 通过' || needs.docker-compose-test.result == 'skipped' && '⏭️ 跳过' || '❌ 失败' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "**提交:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**分支:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**触发者:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "**运行 ID:** [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY