# NAS-OS CI/CD Pipeline
# 构建、测试、发布自动化流程

name: CI/CD

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  GO_VERSION: '1.26.1'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ========== 代码质量 ==========
  lint:
    name: 代码检查
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置 Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      
      - name: 安装 linter
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
      
      - name: 运行 linter
        run: golangci-lint run --timeout 5m
      
      - name: 检查代码格式
        run: |
          gofmt -l .
          test -z "$(gofmt -l .)"

  # ========== 单元测试 ==========
  test:
    name: 单元测试
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置 Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      
      - name: 安装依赖
        run: go mod download
      
      - name: 运行单元测试
        run: |
          # GitHub Actions 的 Ubuntu 运行器支持 race detector
          go test -v -race -coverprofile=coverage.out $(go list ./... | grep -v /tests/e2e | grep -v /plugins/)
      
      - name: 上传覆盖率
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.out
          fail_ci_if_error: false
      
      - name: 检查覆盖率阈值
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | tr -d '%')
          echo "📊 测试覆盖率：${COVERAGE}%"
          if (( $(echo "$COVERAGE < 50" | bc -l) )); then
            echo "❌ 覆盖率低于 50%"
            exit 1
          fi
          echo "✅ 覆盖率达标"

  # ========== 集成测试 ==========
  test-integration:
    name: 集成测试
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置 Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      
      - name: 安装依赖
        run: go mod download
      
      - name: 运行集成测试
        run: go test -v -timeout 5m ./tests/integration/...
      
      - name: 验证构建（排除插件和 e2e 测试）
        run: |
          # 只编译主程序，排除插件示例和 e2e 测试
          go build -v ./cmd/...
          echo "✅ 主程序构建验证通过"

  # ========== 多平台构建 ==========
  build:
    name: 构建二进制
    runs-on: ubuntu-latest
    needs: [test-integration]
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: linux
            arch: arm
            arm: 7
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置 Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      
      - name: 编译
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          GOARM: ${{ matrix.arm }}
        run: |
          go build -ldflags="-w -s" -o nasd-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.arm && format('v{0}', matrix.arm) || '' }} ./cmd/nasd
          echo "✅ 编译成功"
      
      - name: 生成校验和
        run: |
          sha256sum nasd-* > checksums.txt
      
      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: nas-os-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.arm && format('v{0}', matrix.arm) || '' }}
          path: |
            nasd-*
            checksums.txt

  # ========== Docker 镜像 ==========
  docker:
    name: Docker 镜像
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置 QEMU
        uses: docker/setup-qemu-action@v3
      
      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: 登录 GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}
      
      - name: 提取版本信息
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}
      
      - name: 构建并推送
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ========== 发布 ==========
  release:
    name: 发布版本
    runs-on: ubuntu-latest
    needs: [build, docker]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
      packages: write
      id-token: write
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 下载构建产物
        uses: actions/download-artifact@v4
        with:
          pattern: nas-os-*
          merge-multiple: true
          path: ./artifacts
      
      - name: 整理发布文件
        run: |
          cd ./artifacts
          # 移动所有二进制文件到根目录
          find . -name "nasd-*" | xargs -I {} mv {} .
          find . -name "checksums.txt" | xargs -I {} mv {} .
          rm -rf nas-os-*
          ls -la
      
      - name: 创建 Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') }}
          files: |
            ./artifacts/nasd-*
            ./artifacts/checksums.txt
          body: |
            ## 📦 版本说明
            
            ### 二进制文件
            - `nasd-linux-amd64` - Linux x86_64
            - `nasd-linux-arm64` - Linux ARM64 (树莓派 4/5, Orange Pi 5)
            - `nasd-linux-armv7` - Linux ARMv7 (树莓派 3/Zero)
            
            ### Docker 镜像
            ```bash
            docker pull ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ```
            
            ### 校验和
            所有文件都包含 SHA256 校验和，验证方法：
            ```bash
            sha256sum -c checksums.txt
            ```
            
            ${{ github.ref_name == 'main' && '⚠️ 这是开发版本，不建议生产使用' || '' }}

  # ========== 部署（可选）==========
  deploy:
    name: 部署到服务器
    runs-on: ubuntu-latest
    needs: [release]
    if: startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-rc')
    environment: production
    steps:
      - name: 部署到服务器
        run: |
          echo "🚀 部署到生产环境（需配置 SSH 密钥和服务器地址）"
          # 示例：使用 SSH 部署
          # - 设置 secrets.DEPLOY_SSH_KEY
          # - 设置 secrets.DEPLOY_HOST
          # - 设置 secrets.DEPLOY_USER
          # 
          # echo "$DEPLOY_SSH_KEY" | ssh-agent -s
          # ssh -o StrictHostKeyChecking=no $DEPLOY_USER@$DEPLOY_HOST
          #   "cd /opt/nas-os && docker-compose pull && docker-compose up -d"
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
