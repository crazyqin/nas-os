# NAS-OS CI/CD Pipeline
# 构建、测试、发布自动化流程
# 
# 注意：Docker 发布使用 docker-publish.yml，Release 使用 release.yml
# 此文件专注于代码质量、测试和二进制构建
#
# v2.34.0 更新：
# - 添加 CodeQL 代码分析
# - 优化测试矩阵策略
# - 添加测试结果合并报告
# - 增强缓存策略
#
# v2.33.0 更新：
# - 添加缓存失效机制
# - 修复集成测试依赖问题
# - 增强构建矩阵配置
# - 添加构建产物校验
# - 添加测试结果报告

name: CI/CD

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master]
  workflow_dispatch:

env:
  GO_VERSION: '1.26'
  # 缓存版本号，重大变更时递增
  CACHE_VERSION: 'v2'

# 并发控制：同一分支同时只运行一个工作流
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ========== 代码质量 ==========
  lint:
    name: 代码检查
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置 Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: go.sum
      
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.3
          args: --timeout=10m
      
      - name: 检查代码格式
        run: |
          gofmt -l .
          test -z "$(gofmt -l .)"

  # ========== CodeQL 代码分析 ==========
  codeql:
    name: CodeQL 分析
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 初始化 CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: go
      
      - name: 设置 Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: go.sum
      
      - name: 构建（CodeQL 分析）
        run: go build ./...
      
      - name: 执行 CodeQL 分析
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:go"

  # ========== 依赖扫描 ==========
  dependency-scan:
    name: 依赖安全扫描
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 运行 Trivy 漏洞扫描
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
        continue-on-error: true
      
      - name: 上传扫描结果
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-results.sarif'
        if: always() && hashFiles('trivy-results.sarif') != ''
      
      - name: 生成依赖报告
        run: |
          echo "## 🔍 依赖扫描完成" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "扫描结果已上传到 Security 页面" >> $GITHUB_STEP_SUMMARY

  # ========== 单元测试 ==========
  test:
    name: 单元测试
    runs-on: ubuntu-latest
    needs: [lint, dependency-scan, codeql]
    timeout-minutes: 20
    env:
      CGO_ENABLED: 1
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置 Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: go.sum
      
      - name: 安装 CGO 依赖
        run: sudo apt-get update && sudo apt-get install -y gcc libc6-dev
      
      - name: 安装依赖
        run: go mod download
      
      - name: 运行单元测试
        id: test
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 10
          command: |
            # GitHub Actions 的 Ubuntu 运行器支持 race detector
            # 添加超时参数（5 分钟），排除已知慢测试和辅助模块
            go test -v -race -coverprofile=coverage.out -covermode=atomic -timeout 5m $(go list ./... | grep -v /tests/e2e | grep -v /tests/fixtures | grep -v /tests/reports | grep -v /tests/benchmark | grep -v /plugins/)
      
      - name: 生成覆盖率报告
        run: |
          # 生成文本报告
          go tool cover -func=coverage.out -o coverage.txt
          
          # 生成 HTML 报告
          go tool cover -html=coverage.out -o coverage.html
          
          # 提取总覆盖率
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | tr -d '%')
          echo "COVERAGE=$COVERAGE" >> $GITHUB_ENV
          echo "📊 测试覆盖率：${COVERAGE}%"
          
          # 生成覆盖率徽章 JSON（用于 shields.io 动态徽章）
          if (( $(echo "$COVERAGE >= 80" | bc -l) )); then
            COLOR="brightgreen"
          elif (( $(echo "$COVERAGE >= 60" | bc -l) )); then
            COLOR="green"
          elif (( $(echo "$COVERAGE >= 40" | bc -l) )); then
            COLOR="yellow"
          elif (( $(echo "$COVERAGE >= 20" | bc -l) )); then
            COLOR="orange"
          else
            COLOR="red"
          fi
          echo "{\"schemaVersion\":1,\"label\":\"coverage\",\"message\":\"${COVERAGE}%\",\"color\":\"${COLOR}\"}" > coverage-badge.json
      
      - name: 上传覆盖率到 Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.out
          fail_ci_if_error: false
          flags: unittests
          name: nas-os-coverage
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      
      - name: 上传覆盖率报告
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            coverage.out
            coverage.txt
            coverage.html
            coverage-badge.json
          retention-days: 30
      
      - name: 发布覆盖率徽章
        if: github.ref == 'refs/heads/master'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-badge
          path: coverage-badge.json
          retention-days: 90
      
      - name: 检查覆盖率阈值
        run: |
          COVERAGE=${{ env.COVERAGE }}
          echo "📊 测试覆盖率：${COVERAGE}%"
          if (( $(echo "$COVERAGE < 10" | bc -l) )); then
            echo "❌ 覆盖率低于 10%"
            exit 1
          fi
          echo "✅ 覆盖率达标"

  # ========== 集成测试 ==========
  test-integration:
    name: 集成测试
    runs-on: ubuntu-latest
    needs: [test]
    timeout-minutes: 15
    env:
      CGO_ENABLED: 1
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置 Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: go.sum
      
      - name: 安装 CGO 依赖
        run: sudo apt-get update && sudo apt-get install -y gcc libc6-dev
      
      - name: 安装依赖
        run: go mod download
      
      - name: 检查集成测试文件
        id: check-tests
        run: |
          if [ -d "tests/integration" ] && [ "$(ls -A tests/integration/*.go 2>/dev/null)" ]; then
            echo "has_integration_tests=true" >> $GITHUB_OUTPUT
            echo "✅ 发现集成测试文件"
          else
            echo "has_integration_tests=false" >> $GITHUB_OUTPUT
            echo "⚠️ 未发现集成测试文件，跳过集成测试"
          fi
      
      - name: 运行集成测试
        if: steps.check-tests.outputs.has_integration_tests == 'true'
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 8
          max_attempts: 2
          retry_wait_seconds: 15
          command: go test -v -timeout 5m ./tests/integration/...
      
      - name: 验证构建（排除插件和 e2e 测试）
        run: |
          # 只编译主程序，排除插件示例和 e2e 测试
          go build -v ./cmd/...
          echo "✅ 主程序构建验证通过"
      
      - name: 生成构建校验和
        run: |
          # 验证关键文件
          go vet ./cmd/...
          echo "✅ go vet 检查通过"

  # ========== 多平台构建 ==========
  build:
    name: 构建二进制
    runs-on: ubuntu-latest
    needs: [test-integration]
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: linux
            arch: arm
            arm: 7
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置 Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: go.sum
      
      - name: 编译
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          GOARM: ${{ matrix.arm }}
        run: |
          go build -ldflags="-w -s" -o nasd-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.arm && format('v{0}', matrix.arm) || '' }} ./cmd/nasd
          echo "✅ 编译成功"
      
      - name: 生成校验和
        run: |
          sha256sum nasd-* > checksums.txt
      
      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: nas-os-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.arm && format('v{0}', matrix.arm) || '' }}
          path: |
            nasd-*
            checksums.txt
          retention-days: 7

  # ========== Docker Compose 测试 ==========
  docker-compose-test:
    name: Docker Compose 测试
    runs-on: ubuntu-latest
    needs: [test]
    timeout-minutes: 15
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 创建必要目录
        run: |
          sudo mkdir -p /var/lib/nas-os
          sudo chmod 777 /var/lib/nas-os
      
      - name: 构建镜像
        run: |
          docker compose build --no-cache
          echo "✅ Docker 镜像构建完成"
      
      - name: 启动服务
        run: |
          docker compose up -d
          echo "⏳ 等待服务启动..."
      
      - name: 等待服务就绪
        run: |
          # 等待健康检查通过（最多 60 秒）
          for i in {1..12}; do
            if docker compose ps | grep -q "healthy\|running"; then
              echo "✅ 服务已启动"
              break
            fi
            echo "等待中... ($i/12)"
            sleep 5
          done
      
      - name: 健康检查
        run: |
          echo "=== 容器状态 ==="
          docker compose ps
          echo ""
          echo "=== 容器日志 ==="
          docker compose logs --tail=50
          echo ""
          echo "=== 健康检查 ==="
          # 尝试访问健康端点
          curl -sf http://localhost:8080/api/v1/health || echo "⚠️ 健康端点暂不可用（可能需要更长时间启动）"
      
      - name: 停止服务
        if: always()
        run: docker compose down -v
      
      - name: 清理镜像
        if: always()
        run: docker image prune -f