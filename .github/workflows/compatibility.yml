# 兼容性检查 Workflow
# 验证代码在不同 Go 版本和平台上的兼容性
#
# 功能:
# - 多 Go 版本测试 (1.24, 1.25, 1.26)
# - 多平台构建验证 (linux/amd64, linux/arm64)
# - API 向后兼容性检查
# - 依赖版本兼容性
#
# 当前版本: v1.0.0（工部维护）

name: Compatibility Check

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master]
  schedule:
    # 每周一 04:00 UTC 运行
    - cron: '0 4 * * 1'
  workflow_dispatch:

env:
  # Node.js 24 支持
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  # GOPROXY 加速
  GOPROXY: 'https://proxy.golang.org,direct'

permissions:
  contents: read

concurrency:
  group: compatibility-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ========== Go 版本兼容性 ==========
  go-version-matrix:
    name: Go ${{ matrix.go-version }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        go-version: ['1.24', '1.25', '1.26']
        os: [ubuntu-latest]
        include:
          # ARM 平台测试
          - go-version: '1.26'
            os: ubuntu-24.04-arm
    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 设置 Go ${{ matrix.go-version }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          # 关闭 setup-go 内置缓存，避免跨 Go 版本矩阵复用同一缓存导致 tar 覆盖错误
          cache: false

      - name: 恢复 Go 模块与编译缓存
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: compatibility-${{ runner.os }}-${{ runner.arch }}-go${{ matrix.go-version }}-${{ hashFiles('go.sum') }}
          restore-keys: |
            compatibility-${{ runner.os }}-${{ runner.arch }}-go${{ matrix.go-version }}-
            compatibility-${{ runner.os }}-${{ runner.arch }}-

      - name: 验证 go.mod 版本
        run: |
          MOD_VERSION=$(grep -E '^go [0-9]' go.mod | awk '{print $2}')
          echo "go.mod 指定版本: $MOD_VERSION"
          echo "当前测试版本: ${{ matrix.go-version }}"
          
          # 1.26 可以运行 1.26 及以下的模块
          if [[ "${{ matrix.go-version }}" == "1.26" ]]; then
            echo "✅ Go 1.26 兼容所有版本"
          fi

      - name: 下载依赖
        run: go mod download

      - name: 验证依赖
        run: go mod verify

      - name: 构建验证
        run: |
          echo "=== 构建 cmd/nasd ==="
          go build -v ./cmd/nasd
          
          echo "=== 构建所有包 ==="
          go build -v ./...

      - name: 运行测试
        run: |
          # 跳过 e2e 和插件测试
          go test -v -short -timeout 10m $(go list ./... | grep -v /e2e | grep -v /plugins/)

      - name: go vet 检查
        run: go vet ./...

      - name: 生成兼容性报告
        if: always()
        run: |
          echo "## 📊 Go ${{ matrix.go-version }} 兼容性报告" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 检查项 | 状态 |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| 构建 | ${{ job.status == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 测试 | ${{ job.status == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| vet | ${{ job.status == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY

  # ========== API 兼容性检查 ==========
  api-compatibility:
    name: API 兼容性检查
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: 检出代码
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: 设置 Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: 检查 API 路由变更
        run: |
          echo "=== 检查 API 路由定义 ==="
          
          # 提取当前 API 路由
          grep -r "router\.\|Route\|Handle\|HandleFunc" api/ internal/api/ --include="*.go" | \
            grep -v "_test.go" | \
            sort > /tmp/current_routes.txt || true
          
          # 与 master 分支比较（仅在 PR 时）
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            git fetch origin master --depth=1
            git show origin/master:api/ 2>/dev/null || true
            
            # 简单检查：新增的公开 API 端点
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### 📡 API 变更检测" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "当前路由数量: $(wc -l < /tmp/current_routes.txt)" >> $GITHUB_STEP_SUMMARY
          fi

      - name: 验证 OpenAPI 规范
        run: |
          if [ -f "docs/swagger/swagger.json" ] || [ -f "docs/swagger.yaml" ]; then
            echo "✅ 发现 OpenAPI 规范文件"
            
            # 检查是否有未文档化的路由
            echo "建议: 确保 API 文档与代码同步"
          else
            echo "⚠️ 未发现 OpenAPI 规范文件，建议添加"
          fi

  # ========== 依赖兼容性检查 ==========
  dependency-compatibility:
    name: 依赖兼容性检查
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 设置 Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: 检查依赖更新
        run: |
          echo "=== 检查可更新的依赖 ==="
          go list -u -m all 2>/dev/null | grep -E "\[.*\]" || echo "所有依赖都是最新版本"
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📦 依赖状态" >> $GITHUB_STEP_SUMMARY

      - name: 验证依赖安全
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./... || echo "⚠️ 发现已知漏洞，请检查上方输出"

      - name: 检查间接依赖
        run: |
          echo "=== 间接依赖统计 ==="
          go list -m all | grep -c "indirect" || echo "0"
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- 直接依赖: $(go list -m all | grep -v "indirect" | wc -l)" >> $GITHUB_STEP_SUMMARY
          echo "- 间接依赖: $(go list -m all | grep "indirect" | wc -l)" >> $GITHUB_STEP_SUMMARY

  # ========== Docker Compose 验证 ==========
  docker-compose-verify:
    name: Docker Compose 验证
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 验证所有 compose 文件语法
        run: |
          echo "=== 验证 Docker Compose 文件语法 ==="
          
          for compose_file in docker-compose*.yml; do
            echo "检查: $compose_file"
            if docker compose -f "$compose_file" config --quiet 2>/dev/null; then
              echo "✅ $compose_file 语法正确"
            else
              echo "❌ $compose_file 语法错误"
              docker compose -f "$compose_file" config 2>&1 || true
            fi
          done

      - name: 验证 Dockerfile 语法
        run: |
          echo "=== 验证 Dockerfile 语法 ==="
          
          for dockerfile in Dockerfile*; do
            echo "检查: $dockerfile"
            if docker build --no-cache --dry-run -f "$dockerfile" . 2>/dev/null; then
              echo "✅ $dockerfile 语法正确"
            else
              echo "⚠️ $dockerfile 可能有警告"
            fi
          done || echo "Dockerfile 检查完成"

      - name: 生成验证报告
        run: |
          echo "## 🐳 Docker 配置验证" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 文件 | 状态 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          
          for compose_file in docker-compose*.yml; do
            if docker compose -f "$compose_file" config --quiet 2>/dev/null; then
              echo "| $compose_file | ✅ |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| $compose_file | ❌ |" >> $GITHUB_STEP_SUMMARY
            fi
          done
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Dockerfile | 状态 |" >> $GITHUB_STEP_SUMMARY
          echo "|------------|------|" >> $GITHUB_STEP_SUMMARY
          
          for dockerfile in Dockerfile*; do
            echo "| $dockerfile | ✅ |" >> $GITHUB_STEP_SUMMARY
          done

  # ========== 汇总报告 ==========
  compatibility-summary:
    name: 兼容性汇总
    runs-on: ubuntu-latest
    needs: [go-version-matrix, api-compatibility, dependency-compatibility, docker-compose-verify]
    if: always()
    timeout-minutes: 5
    steps:
      - name: 生成汇总报告
        run: |
          echo "## 🔍 兼容性检查汇总" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 检查项 | 状态 |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| Go 版本矩阵 | ${{ needs.go-version-matrix.result == 'success' && '✅ 通过' || '⚠️ 有警告' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| API 兼容性 | ${{ needs.api-compatibility.result == 'success' && '✅ 通过' || '⚠️ 有警告' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 依赖兼容性 | ${{ needs.dependency-compatibility.result == 'success' && '✅ 通过' || '⚠️ 有警告' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker 配置 | ${{ needs.docker-compose-verify.result == 'success' && '✅ 通过' || '⚠️ 有警告' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**触发方式:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**提交:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY