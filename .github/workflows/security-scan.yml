name: Security Scan

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master]
  schedule:
    # 每周一 02:00 UTC 自动运行
    - cron: '0 2 * * 1'

# Security Scan 作为信息收集，不阻塞 CI
# 发现的问题会在 Security tab 显示，由开发者评估处理
jobs:
  security-scan:
    runs-on: ubuntu-latest
    # 不阻塞主 CI 流程
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run gosec
        # G204: Subprocess launched with variable - NAS 系统需要执行系统命令
        # G304: File path provided as taint input - 配置文件路径由用户控制
        # 排除误报，但保留 SARIF 上传用于审计
        run: |
          gosec -fmt=sarif -out=gosec.sarif -exclude=G204,G304 ./... || true
          echo "=== gosec 文本报告 ==="
          gosec -fmt=text -exclude=G204,G304 ./... || true

      - name: Run govulncheck
        # 漏洞检查不阻塞，但输出结果供审查
        run: |
          echo "=== govulncheck 漏洞检查 ==="
          govulncheck ./... || echo "⚠️ 发现已知漏洞，请检查上方输出"

      - name: Upload gosec SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gosec.sarif
          category: gosec
        continue-on-error: true

      - name: Archive security reports
        uses: actions/upload-artifact@v4
        with:
          name: security-reports-${{ github.sha }}
          path: |
            gosec.sarif
          retention-days: 30
        continue-on-error: true

      - name: Security Summary
        run: |
          echo "## 🔒 安全扫描完成" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "扫描结果已上传到 [Security](../../security/code-scanning) 页面" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 已排除的规则（误报）" >> $GITHUB_STEP_SUMMARY
          echo "- **G204**: Subprocess launched with variable - NAS 系统需要执行系统命令" >> $GITHUB_STEP_SUMMARY
          echo "- **G304**: File path as taint input - 配置文件路径由用户控制" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 需要关注的问题" >> $GITHUB_STEP_SUMMARY
          echo "- **G703/G122**: Path traversal - 备份功能需要验证路径" >> $GITHUB_STEP_SUMMARY
          echo "- **G401**: Weak crypto (SHA1) - DDNS 某些提供商要求" >> $GITHUB_STEP_SUMMARY

  dependency-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Check for outdated dependencies
        run: |
          go list -u -m all | grep -v "indirect" || true

      - name: Verify dependencies
        run: go mod verify
