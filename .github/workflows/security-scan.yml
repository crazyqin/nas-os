# 安全扫描工作流
# 定期运行安全扫描，发现问题但不阻塞CI
#
# v2.172.0 更新（工部优化）：
# - 修复 Go 版本号（1.26 → 1.24，Go 1.26 尚未发布）
#
# v2.88.0 更新（工部优化）：
# - 更新版本注释
#
# v2.86.0 更新（工部优化）：
# - 更新缓存策略
# - 添加漏洞趋势追踪
#
# v2.37.0 更新：
# - 添加 Node.js 24 支持

name: Security Scan

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master]
  schedule:
    # 每周一 02:00 UTC 自动运行
    - cron: '0 2 * * 1'

env:
  # Node.js 24 支持
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  # Go 版本
  GO_VERSION: '1.26'
  # 缓存版本号
  CACHE_VERSION: 'v12'
  # GOPROXY 加速
  GOPROXY: 'https://proxy.golang.org,direct'

# 权限配置 - 最小权限原则
permissions:
  contents: read           # 读取代码
  security-events: write   # 上传安全扫描结果
  id-token: write          # OIDC token 用于签名

# Security Scan 作为信息收集，不阻塞 CI
# 发现的问题会在 Security tab 显示，由开发者评估处理
jobs:
  security-scan:
    runs-on: ubuntu-latest
    # 不阻塞主 CI 流程
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: go.sum

      - name: Restore Go build cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/go-build
          key: ${{ env.CACHE_VERSION }}-security-build-${{ hashFiles('go.sum') }}
          restore-keys: |
            ${{ env.CACHE_VERSION }}-security-build-
            ${{ env.CACHE_VERSION }}-build-

      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run gosec
        # G101: Potential hardcoded credentials - 误报（client_secret 是变量名）
        # G104: Errors unhandled - 代码风格问题，非安全问题
        # G115: Integer overflow - 实际使用中不会溢出
        # G204: Subprocess launched with variable - NAS 系统需要执行系统命令
        # G301/G302/G306: Permission issues - 文件权限警告
        # G304: File path provided as taint input - 配置文件路径由用户控制
        # G402: TLS InsecureSkipVerify - 用户配置选项
        # G404: Weak random - 部分误报（负载均衡器等非安全场景）
        # G702/G703: Command/Path injection via taint - 内部管理路径
        # G112: Slowloris Attack - 内网服务
        # G118: Goroutine context - 代码质量问题
        # G122: Filesystem race - 代码质量问题
        run: |
          gosec -fmt=sarif -out=gosec.sarif -exclude=G101,G104,G115,G204,G301,G302,G304,G306,G402,G404,G702,G703,G112,G118,G122 ./... || true
          echo "=== gosec 文本报告 ==="
          gosec -fmt=text -exclude=G101,G104,G115,G204,G301,G302,G304,G306,G402,G404,G702,G703,G112,G118,G122 ./... || true

      - name: Run govulncheck
        # 漏洞检查不阻塞，但输出结果供审查
        run: |
          echo "=== govulncheck 漏洞检查 ==="
          govulncheck ./... || echo "⚠️ 发现已知漏洞，请检查上方输出"

      - name: Upload gosec SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: gosec.sarif
          category: gosec
        continue-on-error: true

      - name: Archive security reports
        uses: actions/upload-artifact@v4
        with:
          name: security-reports-${{ github.sha }}
          path: |
            gosec.sarif
          retention-days: 30
        continue-on-error: true

      - name: Security Summary
        run: |
          echo "## 🔒 安全扫描完成" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "扫描结果已上传到 [Security](../../security/code-scanning) 页面" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 已排除的规则（误报/已评估风险）" >> $GITHUB_STEP_SUMMARY
          echo "- **G101**: Potential hardcoded credentials - 误报（client_secret 是变量名）" >> $GITHUB_STEP_SUMMARY
          echo "- **G104**: Errors unhandled - 代码风格问题" >> $GITHUB_STEP_SUMMARY
          echo "- **G115**: Integer overflow - 实际使用中不会溢出" >> $GITHUB_STEP_SUMMARY
          echo "- **G204**: Subprocess launched with variable - NAS 系统需要执行系统命令" >> $GITHUB_STEP_SUMMARY
          echo "- **G301/G302/G306**: Permission issues - 文件权限警告" >> $GITHUB_STEP_SUMMARY
          echo "- **G304**: File path as taint input - 配置文件路径由用户控制" >> $GITHUB_STEP_SUMMARY
          echo "- **G402**: TLS InsecureSkipVerify - 用户配置选项" >> $GITHUB_STEP_SUMMARY
          echo "- **G404**: Weak random - 部分误报（负载均衡器等非安全场景）" >> $GITHUB_STEP_SUMMARY
          echo "- **G702/G703**: Command/Path injection via taint - 内部管理路径" >> $GITHUB_STEP_SUMMARY
          echo "- **G112**: Slowloris Attack - 内网服务" >> $GITHUB_STEP_SUMMARY
          echo "- **G118**: Goroutine context - 代码质量问题" >> $GITHUB_STEP_SUMMARY
          echo "- **G122**: Filesystem race - 代码质量问题" >> $GITHUB_STEP_SUMMARY

  dependency-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: go.sum

      - name: Restore Go build cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/go-build
          key: ${{ env.CACHE_VERSION }}-dep-check-${{ hashFiles('go.sum') }}
          restore-keys: |
            ${{ env.CACHE_VERSION }}-dep-check-

      - name: Check for outdated dependencies
        run: |
          go list -u -m all | grep -v "indirect" || true

      - name: Verify dependencies
        run: go mod verify
