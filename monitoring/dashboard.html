<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M5 监控面板</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #eee;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        h1 {
            font-size: 28px;
            font-weight: 600;
        }
        .status-badge {
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
        }
        .status-healthy {
            background: rgba(34, 197, 94, 0.2);
            color: #22c55e;
        }
        .status-warning {
            background: rgba(234, 179, 8, 0.2);
            color: #eab308;
        }
        .status-critical {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .card {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .card-title {
            font-size: 16px;
            font-weight: 500;
            color: #aaa;
        }
        .metric-value {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 5px;
        }
        .metric-unit {
            font-size: 14px;
            color: #888;
        }
        .metric-change {
            font-size: 12px;
            margin-top: 8px;
        }
        .change-up { color: #ef4444; }
        .change-down { color: #22c55e; }
        .change-stable { color: #888; }
        .alert-list {
            max-height: 400px;
            overflow-y: auto;
        }
        .alert-item {
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 8px;
            background: rgba(255,255,255,0.03);
            border-left: 4px solid;
        }
        .alert-p0 { border-left-color: #ef4444; }
        .alert-p1 { border-left-color: #f97316; }
        .alert-p2 { border-left-color: #eab308; }
        .alert-p3 { border-left-color: #3b82f6; }
        .alert-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .alert-level {
            font-size: 12px;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 4px;
        }
        .alert-p0 .alert-level { background: #ef4444; color: white; }
        .alert-p1 .alert-level { background: #f97316; color: white; }
        .alert-p2 .alert-level { background: #eab308; color: black; }
        .alert-p3 .alert-level { background: #3b82f6; color: white; }
        .alert-rule {
            font-weight: 500;
            margin-bottom: 4px;
        }
        .alert-message {
            font-size: 13px;
            color: #aaa;
            margin-bottom: 8px;
        }
        .alert-time {
            font-size: 12px;
            color: #666;
        }
        .alert-actions {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }
        .btn {
            padding: 6px 12px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            transition: all 0.2s;
        }
        .btn-ack {
            background: #3b82f6;
            color: white;
        }
        .btn-ack:hover { background: #2563eb; }
        .btn-resolve {
            background: #22c55e;
            color: white;
        }
        .btn-resolve:hover { background: #16a34a; }
        .section-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .no-alerts {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        .refresh-info {
            text-align: right;
            font-size: 12px;
            color: #666;
            margin-top: 20px;
        }
        .metric-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }
        .metric-item {
            background: rgba(255,255,255,0.03);
            padding: 15px;
            border-radius: 8px;
        }
        .metric-name {
            font-size: 13px;
            color: #888;
            margin-bottom: 5px;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .loading-spinner {
            animation: pulse 1.5s infinite;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔍 M5 监控面板</h1>
            <div id="statusBadge" class="status-badge status-healthy">正常</div>
        </header>

        <!-- 核心指标 -->
        <h2 class="section-title">核心指标</h2>
        <div class="grid" id="metricsGrid">
            <div class="loading loading-spinner">加载中...</div>
        </div>

        <!-- 告警列表 -->
        <h2 class="section-title">活跃告警</h2>
        <div class="card">
            <div id="alertList" class="alert-list">
                <div class="loading loading-spinner">加载中...</div>
            </div>
        </div>

        <div class="refresh-info">
            最后更新：<span id="lastUpdate">-</span> | 自动刷新：30 秒
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin;

        // 格式化数字
        function formatNumber(num, decimals = 2) {
            if (num === null || num === undefined) return '-';
            return Number(num).toFixed(decimals);
        }

        // 格式化时间
        function formatTime(isoString) {
            if (!isoString) return '-';
            const date = new Date(isoString);
            return date.toLocaleString('zh-CN', {
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        // 获取指标显示名称
        function getMetricDisplayName(name) {
            const names = {
                'cpu_usage_percent': 'CPU 使用率',
                'cpu_load_1m': 'CPU 负载 (1m)',
                'mem_usage_percent': '内存使用率',
                'mem_swap_percent': 'Swap 使用率',
                'disk_usage_percent': '磁盘使用率',
                'disk_io_wait_percent': 'IO 等待',
                'net_bytes_recv_ps': '网络接收',
                'net_bytes_sent_ps': '网络发送',
                'net_connections_active': '活跃连接',
                'system_temperature': '系统温度',
                'system_load_1m': '系统负载',
                'process_count': '进程数',
                'zombie_process_count': '僵尸进程'
            };
            return names[name] || name;
        }

        // 获取指标单位
        function getMetricUnit(name) {
            if (name.includes('percent')) return '%';
            if (name.includes('bytes')) return 'B/s';
            if (name.includes('temperature')) return '°C';
            if (name.includes('load')) return '';
            if (name.includes('count')) return '个';
            if (name.includes('connections')) return '个';
            return '';
        }

        // 获取指标颜色
        function getMetricColor(name, value) {
            const thresholds = {
                'cpu_usage_percent': [80, 95],
                'mem_usage_percent': [80, 95],
                'disk_usage_percent': [85, 95],
                'system_temperature': [75, 85],
                'disk_io_wait_percent': [30, 50]
            };

            if (thresholds[name]) {
                const [warn, crit] = thresholds[name];
                if (value >= crit) return '#ef4444';
                if (value >= warn) return '#eab308';
            }
            return '#22c55e';
        }

        // 加载监控摘要
        async function loadSummary() {
            try {
                const res = await fetch(`${API_BASE}/api/v1/summary`);
                const data = await res.json();

                // 更新状态徽章
                const statusBadge = document.getElementById('statusBadge');
                const totalAlerts = data.active_alerts?.total || 0;
                const p0Alerts = data.active_alerts?.by_level?.P0 || 0;

                if (p0Alerts > 0) {
                    statusBadge.className = 'status-badge status-critical';
                    statusBadge.textContent = `严重告警 (${p0Alerts})`;
                } else if (totalAlerts > 0) {
                    statusBadge.className = 'status-badge status-warning';
                    statusBadge.textContent = `告警 (${totalAlerts})`;
                } else {
                    statusBadge.className = 'status-badge status-healthy';
                    statusBadge.textContent = '系统正常';
                }

                // 渲染指标卡片
                renderMetrics(data.latest_metrics);
                document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString('zh-CN');
            } catch (error) {
                console.error('加载摘要失败:', error);
            }
        }

        // 渲染指标
        function renderMetrics(metrics) {
            const grid = document.getElementById('metricsGrid');
            const importantMetrics = [
                'cpu_usage_percent',
                'mem_usage_percent',
                'disk_usage_percent',
                'system_temperature',
                'cpu_load_1m',
                'net_connections_active'
            ];

            let html = '';
            importantMetrics.forEach(name => {
                const value = metrics[name];
                if (value !== undefined) {
                    const color = getMetricColor(name, value);
                    html += `
                        <div class="card">
                            <div class="card-header">
                                <span class="card-title">${getMetricDisplayName(name)}</span>
                            </div>
                            <div class="metric-value" style="color: ${color}">
                                ${formatNumber(value, name.includes('percent') || name.includes('temperature') ? 1 : 0)}
                            </div>
                            <div class="metric-unit">${getMetricUnit(name)}</div>
                        </div>
                    `;
                }
            });

            if (html === '') {
                html = '<div class="loading">暂无指标数据</div>';
            }

            grid.innerHTML = html;
        }

        // 加载活跃告警
        async function loadAlerts() {
            try {
                const res = await fetch(`${API_BASE}/api/v1/alerts/active`);
                const data = await res.json();
                renderAlerts(data.alerts);
            } catch (error) {
                console.error('加载告警失败:', error);
            }
        }

        // 渲染告警列表
        function renderAlerts(alerts) {
            const list = document.getElementById('alertList');

            if (!alerts || alerts.length === 0) {
                list.innerHTML = '<div class="no-alerts">✅ 暂无活跃告警</div>';
                return;
            }

            let html = '';
            alerts.forEach(alert => {
                html += `
                    <div class="alert-item alert-${alert.level.toLowerCase()}">
                        <div class="alert-header">
                            <span class="alert-level">${alert.level}</span>
                            <span class="alert-time">${formatTime(alert.triggered_at)}</span>
                        </div>
                        <div class="alert-rule">${alert.rule_name}</div>
                        <div class="alert-message">${alert.message || '无详细信息'}</div>
                        <div class="alert-actions">
                            ${alert.status === 'TRIGGERED' ? `
                                <button class="btn btn-ack" onclick="acknowledgeAlert(${alert.id})">确认</button>
                            ` : ''}
                            <button class="btn btn-resolve" onclick="resolveAlert(${alert.id})">解决</button>
                        </div>
                    </div>
                `;
            });

            list.innerHTML = html;
        }

        // 确认告警
        async function acknowledgeAlert(alertId) {
            try {
                await fetch(`${API_BASE}/api/v1/alerts/${alertId}/acknowledge`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ acknowledged_by: 'web_user' })
                });
                loadAlerts();
            } catch (error) {
                console.error('确认告警失败:', error);
                alert('确认失败：' + error.message);
            }
        }

        // 解决告警
        async function resolveAlert(alertId) {
            try {
                await fetch(`${API_BASE}/api/v1/alerts/${alertId}/resolve`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ resolution_note: '通过面板解决' })
                });
                loadAlerts();
            } catch (error) {
                console.error('解决告警失败:', error);
                alert('解决失败：' + error.message);
            }
        }

        // 初始加载
        loadSummary();
        loadAlerts();

        // 定时刷新
        setInterval(() => {
            loadSummary();
            loadAlerts();
        }, 30000);
    </script>
</body>
</html>
