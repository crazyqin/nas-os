  #     - NVIDIA_DRIVER_CAPABILITIES=compute,utility
  #   
  #   healthcheck:
  #     test: ["CMD", "curl", "-sf", "http://localhost:11434/api/version"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 3
  #     start_period: 60s
  #   
  #   # 预下载模型（可选）
  #   # command: >
  #   #   sh -c "ollama pull llama3.2 && ollama serve"

# ========== 网络配置 ==========
networks:
  default:
    name: nas-ai-network
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

# ========== 卷配置 ==========
volumes:
  nas-ai-models:
    driver: local
    # 可选：指定存储位置
    # driver_opts:
    #   type: none
    #   o: bind
    #   device: /mnt/data/nas-ai/models
  nas-ai-data:
    driver: local
  nas-ai-logs:
    driver: local
  # ollama-data:
  #   driver: local