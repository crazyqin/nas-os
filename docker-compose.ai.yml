# NAS-OS AI Service Docker Compose
# 独立部署 AI 服务，支持 GPU 加速
#
# 使用方法：
#   GPU 版本: docker compose -f docker-compose.ai.yml up -d
#   CPU 版本: docker compose -f docker-compose.ai.yml -f docker-compose.ai.cpu.yml up -d
#
# 当前版本: v2.281.0（工部维护）

services:
  # ========== AI 服务主容器（GPU） ==========
  nas-ai:
    image: ghcr.io/nas-os/nas-os-ai:latest-gpu
    build:
      context: .
      dockerfile: Dockerfile.ai
      target: gpu-base
    container_name: nas-ai
    restart: unless-stopped
    
    # GPU 支持 - NVIDIA runtime
    deploy:
      resources:
        # 资源限制
        limits:
          cpus: '8.0'
          memory: 16G
        # 资源预留
        reservations:
          cpus: '2.0'
          memory: 4G
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    
    # 网络配置
    ports:
      - "8081:8081"
    
    # 卷挂载
    volumes:
      - ./configs/ai.yaml:/etc/nas-os/ai.yaml:ro
      - nas-ai-models:/var/lib/nas-os/models
      - nas-ai-data:/var/lib/nas-os/ai
      - nas-ai-logs:/var/log/nas-os
      # 可选：挂载媒体库用于图像索引
      # - /mnt/media:/media:ro
    
    # 环境变量
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - TZ=Asia/Shanghai
      - PYTHONUNBUFFERED=1
      # 模型缓存目录
      - TORCH_HOME=/var/lib/nas-os/models
      - HF_HOME=/var/lib/nas-os/models
    
    # 健康检查
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    
    # 日志配置
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ========== Ollama 本地 LLM（可选） ==========
  # 取消注释以启用本地 LLM
  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: nas-ollama
  #   restart: unless-stopped
  #   
  #   # GPU 支持
  #   deploy:
  #     resources:
  #       limits:
  #         cpus: '8.0'
  #         memory: 32G
  #       reservations:
  #         cpus: '2.0'
  #         memory: 8G
  #         devices:
  #           - driver: nvidia
  #             count: all
  #             capabilities: [gpu]
  #   
  #   ports:
  #     - "11434:11434"
  #   
  #   volumes:
  #     - ollama-data:/root/.ollama
  #   
  #   environment:
  #     - OLLAMA_ORIGINS=*
