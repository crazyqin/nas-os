version: "2"

run:
  timeout: 10m
  tests: true

linters:
  default: none
  enable:
    # 核心检查
    - govet          # Go 静态分析
    - errcheck       # 未检查的错误
    - staticcheck    # 静态检查
    - ineffassign    # 无效赋值
    - misspell       # 拼写检查
    - revive         # 代码风格
    - unused         # 未使用的代码
    # 注意: gofmt/goimports 移至 formatters 部分 (v2格式变更)
    - prealloc       # 预分配优化
    - bodyclose      # HTTP body 未关闭
    - dogsled        # 过多空白标识符
    - dupl           # 重复代码检测
    # 注意: gosimple 和 exportloopref 在 golangci-lint v2 中已移除
    # gosimple 已合并到 staticcheck, exportloopref 已内置到 govet
    - gochecknoinits # 检查 init 函数
    - gocognit       # 认知复杂度
    - gocyclo        # 圈复杂度
    - godot          # 注释句号检查
    - goprintffuncname # printf 函数命名
    - nakedret       # 裸返回
    - noctx          # 无 context 的 HTTP 请求
    - rowserrcheck   # SQL rows.Err 检查
    - sqlclosecheck  # SQL rows/stmt 关闭检查
    - unconvert      # 不必要的类型转换
    - unparam        # 未使用的参数

  settings:
    errcheck:
      check-type-assertions: true
      check-blank: false

    revive:
      rules:
        - name: var-naming
          disabled: false
        - name: exported
          disabled: false
          arguments:
            - "disableStutteringCheck"

    gocyclo:
      min-complexity: 20

    gocognit:
      min-complexity: 40

    dupl:
      threshold: 400

    goconst:
      min-len: 3
      min-occurrences: 4

    prealloc:
      simple: true
      range-loops: true
      for-loops: false

    godot:
      scope: declarations
      exclude:
        - "no-paragraph"
      capital: false

  exclusions:
    generated: lax
    paths:
      - vendor
      - tests/fixtures
    rules:
      # 测试文件放宽检查
      - path: _test\.go
        linters:
          - errcheck
      # 生成的代码跳过检查
      - path: docs/swagger/docs\.go
        linters:
          - all
      # fmt.Print/Fprintln/Fprintf 输出函数允许忽略错误
      - path: cmd/nasctl/
        linters:
          - errcheck
        text: "fmt.Fprint|fmt.Fprintln|fmt.Fprintf|w.Flush"
      # cobra flag 获取允许忽略错误（已定义默认值）
      - path: cmd/nasctl/
        linters:
          - errcheck
        text: "GetString|GetBool|GetInt|GetStringSlice|Scanln"
      # cmd/nasctl/main.go: encoder.Encode 输出到 stdout 允许忽略错误
      - path: cmd/nasctl/main\.go
        linters:
          - errcheck
        text: "encoder.Encode"
      # cmd/nasctl/main.go: resp.Body.Close 在 defer 中允许忽略错误
      - path: cmd/nasctl/main\.go
        linters:
          - errcheck
        text: "resp.Body.Close"
      # internal/automation/trigger/trigger.go: watcher.Close 在错误处理路径中允许忽略错误
      - path: internal/automation/trigger/trigger\.go
        linters:
          - errcheck
        text: "watcher.Close"
      # internal/automation/trigger/trigger.go: r.Body.Close 允许忽略错误
      - path: internal/automation/trigger/trigger\.go
        linters:
          - errcheck
        text: "r.Body.Close"
      # internal/automation/trigger/trigger.go: json.Encoder.Encode 输出到 http response 允许忽略错误
      - path: internal/automation/trigger/trigger\.go
        linters:
          - errcheck
        text: "Encode"
      # internal/dashboard/health/checker.go: strconv.Atoi/ParseFloat 在可信数据源场景允许忽略错误
      - path: internal/dashboard/health/checker\.go
        linters:
          - errcheck
        text: "strconv.Atoi|strconv.ParseFloat"
      # internal/quota/optimizer/optimizer.go: 初始化加载允许忽略错误（使用空数据）
      - path: internal/quota/optimizer/optimizer\.go
        linters:
          - errcheck
        text: "optimizer.load|json.Unmarshal"
      # internal/quota/optimizer/optimizer.go: GetGrowthRate 允许忽略错误（使用默认值 0）
      - path: internal/quota/optimizer/optimizer\.go
        linters:
          - errcheck
        text: "GetGrowthRate"
      # internal/quota/optimizer/optimizer.go: PredictAllUsage 允许忽略错误（使用已获取的数据）
      - path: internal/quota/optimizer/optimizer\.go
        linters:
          - errcheck
        text: "PredictAllUsage"
      # internal/quota/optimizer/optimizer.go: SafeUint64ToInt64 允许忽略错误（边界场景）
      - path: internal/quota/optimizer/optimizer\.go
        linters:
          - errcheck
        text: "SafeUint64ToInt64"
      # internal/quota/optimizer/optimizer.go: GetAllUsage 允许忽略错误（使用空列表计算）
      - path: internal/quota/optimizer/optimizer\.go
        linters:
          - errcheck
        text: "GetAllUsage"
      # internal/cache/manager.go: redis 操作允许忽略错误（缓存操作，非关键）
      - path: internal/cache/manager\.go
        linters:
          - errcheck
        text: "m.redisCache.Set|m.redisCache.Delete|m.redisCache.Clear"
      # internal/concurrency/connection_pool.go: conn.Close 允许忽略错误（清理操作）
      - path: internal/concurrency/connection_pool\.go
        linters:
          - errcheck
        text: "conn.Close"
      # internal/billing/invoice_manager.go: os.Remove 允许忽略错误（清理操作）
      - path: internal/billing/invoice_manager\.go
        linters:
          - errcheck
        text: "os.Remove"
      # internal/rbac/manager.go: m.save 允许忽略错误（持久化操作，非关键路径）
      - path: internal/rbac/manager\.go
        linters:
          - errcheck
        text: "m.save"
      # internal/automation/api/handlers.go: HTTP 响应写入允许忽略错误（响应已发送，无法恢复）
      - path: internal/automation/api/handlers\.go
        linters:
          - errcheck
        text: "w.Write|Encode|Decode"
      # api/websocket.go: WebSocket 连接操作允许忽略错误（连接清理场景）
      - path: api/websocket\.go
        linters:
          - errcheck
        text: "Close|SetReadDeadline|SetWriteDeadline|WriteMessage|WriteJSON|w.Write|json.Marshal"
      # internal/billing/cost_analysis/report.go: 成本分析报告操作允许忽略错误（非关键路径）
      - path: internal/billing/cost_analysis/report\.go
        linters:
          - errcheck
        text: "load|save|json.Unmarshal"
      # internal/network/tunnel: 网络连接操作允许忽略错误（清理/超时场景）
      - path: internal/network/tunnel/
        linters:
          - errcheck
        text: "Close|SetReadDeadline|SetWriteDeadline|SetDeadline|WriteToUDP|Write|Encode|Connect|SendToPeer"
      # internal/ai/api: HTTP响应写入允许忽略错误
      - path: internal/ai/api/
        linters:
          - errcheck
        text: "Encode|Write"

formatters:
  enable:
    - gofmt
    - goimports

  exclusions:
    paths:
      - vendor
      - tests/fixtures

issues:
  max-issues-per-linter: 50
  max-same-issues: 10