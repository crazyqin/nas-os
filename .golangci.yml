# golangci-lint 配置文件 (v2 格式)

version: 2

run:
  timeout: 10m
  tests: true

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused

formatters:
  enable:
    - gofmt

issues:
  exclude:
    # 忽略测试文件中的 errcheck
    - 'Error return value of .*(os\.Remove|os\.WriteFile|os\.MkdirAll).* is not checked'
    - 'Error return value of .*(Close|Sync|Flush).* is not checked'
    - 'Error return value of .*(saveConfig|saveNodes|saveState|saveVersions|saveNotifications|save).* is not checked'
    - 'Error return value of .*(Shutdown|UpdateNodeStatus|UpdateNodeMetrics|loadState|saveState|removeRuleFromSystem|unblockIP|unbanIPInternal|removeBan|Stop).* is not checked'
    - 'Error return value of .*(persistAIMemory|saveSmartAlbums).* is not checked'
    - 'Error return value of .*(scanSubvolumes).* is not checked'
    - 'Error return value of .*(fmt\.Fprint|fmt\.Fprintln|fmt\.Fprintf).* is not checked'
    - 'Error return value of .*(f\.Write|writer\.Write).* is not checked'
    - 'Error return value of .*(rand\.Read).* is not checked'
    - 'Error return value of .*(fmt\.Sscanf).* is not checked'
    - 'Error return value of .*(saveSchedule|executeReport|saveTemplate|saveCache|Run|RemoveContainer|saveInstalled|saveAggregations|AddFunc|CreateTask|SubmitResult|Unload|Init|Start|CreateVersion|Parse).* is not checked'
    - 'Error return value of .*\(\*os/exec\.Cmd\)\.Run.* is not checked'
    - 'Error return value of .*(notifyEmail|notifyWebhook).* is not checked'
    - 'Error return value of .*(os\.Stdout\.Write|os\.Stdout\.WriteString|os\.Stderr\.Write|os\.Stderr\.WriteString).* is not checked'
    - 'Error return value of .*(resp\.Body\.Close|file\.Close|logger\.Sync).* is not checked'
    - 'Error return value of .*(tabwriter\.Writer\.Flush|FlagSet\.Parse).* is not checked'
    - 'Error return value of .*(IncrementDownloads|VerifyPurchase).* is not checked'
    - 'Error return value of .*ShutdownCluster.* is not checked'
  exclusions:
    rules:
      - path: _test\.go$
        linters:
          - errcheck
          - ineffassign
          - staticcheck
      - path: plugins/
        linters:
          - unused
          - errcheck
          - govet
      - path: pkg/btrfs/
        linters:
          - unused
          - ineffassign
      - path: tests/
        linters:
          - staticcheck
      - path: internal/photos/
        linters:
          - errcheck
          - ineffassign