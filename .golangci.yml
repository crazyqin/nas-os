# golangci-lint 配置文件 (v1 格式)

run:
  timeout: 10m
  tests: true

linters:
  disable-all: true
  enable:
    - govet
    - ineffassign
    - staticcheck
    - unused

issues:
  exclude:
    - 'SA9003: empty branch'
  exclude-rules:
    - path: _test\.go$
      linters:
        - ineffassign
        - staticcheck
    - path: plugins/
      linters:
        - unused
    - path: pkg/btrfs/
      linters:
        - unused
    - path: internal/quota/
      linters:
        - unused