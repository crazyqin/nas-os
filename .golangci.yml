# golangci-lint й…ЌзЅ®ж–‡д»¶ (v1 ж јејЏ)

run:
  timeout: 10m
  tests: true

linters:
  disable-all: true
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused

issues:
  exclude:
    # еїЅз•Ґ fmt.Sscanf
    - 'Error return value of `fmt.Sscanf` is not checked'
    # еїЅз•Ґ Write и°ѓз”Ё
    - 'Error return value of `.*Write` is not checked'
    # еїЅз•Ґ Close/Flush/Sync
    - 'Error return value of `.*Close` is not checked'
    - 'Error return value of `.*Flush` is not checked'
    - 'Error return value of `.*Sync` is not checked'
    # еїЅз•Ґ save з±»е‡Ѕж•°
    - 'Error return value of `.*save.*` is not checked'
    - 'Error return value of `.*Save.*` is not checked'
    # еїЅз•Ґ cmd.Run
    - 'Error return value of `cmd.Run` is not checked'
    # еїЅз•Ґ Init/Start/Stop/Unload
    - 'Error return value of `.*Init` is not checked'
    - 'Error return value of `.*Start` is not checked'
    - 'Error return value of `.*Stop` is not checked'
    - 'Error return value of `.*Unload` is not checked'
    # еїЅз•Ґ MkdirAll/Glob/Walk
    - 'Error return value of `os.MkdirAll` is not checked'
    - 'Error return value of `filepath.Glob` is not checked'
    - 'Error return value of `filepath.Walk` is not checked'
    # еїЅз•Ґ rand.Read
    - 'Error return value of `rand.Read` is not checked'
    # еїЅз•Ґе†…йѓЁе‡Ѕж•°
    - 'Error return value of `.*scanSubvolumes` is not checked'
    - 'Error return value of `.*removeBan` is not checked'
    - 'Error return value of `.*unbanIPInternal` is not checked'
    - 'Error return value of `.*removeRuleFromSystem` is not checked'
    - 'Error return value of `.*persistAIMemory` is not checked'
    - 'Error return value of `.*saveSmartAlbums` is not checked'
  exclude-rules:
    - path: _test\.go$
      linters:
        - errcheck
        - ineffassign
        - staticcheck