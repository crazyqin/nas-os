version: "2"

run:
  timeout: 10m
  tests: true

linters:
  default: none
  enable:
    - govet
    - errcheck
    - staticcheck
    - ineffassign
    - misspell
    - revive
    - unused

  settings:
    errcheck:
      check-type-assertions: true
      check-blank: true

    revive:
      rules:
        - name: var-naming
          disabled: false
        - name: exported
          disabled: false

  exclusions:
    generated: lax
    paths:
      - vendor
      - tests/fixtures
    rules:
      # 测试文件放宽检查
      - path: _test\.go
        linters:
          - errcheck
      # 生成的代码跳过检查
      - path: docs/swagger/docs\.go
        linters:
          - all
      # fmt.Print/Fprintln/Fprintf 输出函数允许忽略错误
      - path: cmd/nasctl/
        linters:
          - errcheck
        text: "fmt.Fprint|fmt.Fprintln|fmt.Fprintf|w.Flush"
      # cobra flag 获取允许忽略错误（已定义默认值）
      - path: cmd/nasctl/
        linters:
          - errcheck
        text: "GetString|GetBool|GetInt|GetStringSlice|Scanln"

formatters:
  enable:
    - gofmt
    - goimports

  exclusions:
    paths:
      - vendor
      - tests/fixtures

issues:
  max-issues-per-linter: 50
  max-same-issues: 10