# golangci-lint 配置文件 (v2 格式)

version: 2

run:
  timeout: 10m
  tests: true

linters:
  default: none
  enable:
    - errcheck    # 检查未处理的错误返回值
    - gocritic    # 高级代码检查
    - gosec       # 安全漏洞检查
    - govet       # Go vet 检查
    - ineffassign # 检测无效赋值
    - staticcheck # 静态分析 (包含 gosimple 功能)
    - unused      # 未使用代码检查

linters-settings:
  errcheck:
    # 检查类型断言
    check-type-assertions: false
    # 检查空白赋值
    check-blank: false
    # 忽略以下函数的错误返回
    ignore: fmt:.*,io/ioutil:ReadAll,os:Remove,os:RemoveAll,os:WriteFile,os:Chmod,os:Mkdir,os:MkdirAll,os:Chdir,filepath:Walk,(*os.File).Close,(*os.File).Seek

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  
  exclude:
    - 'SA9003: empty branch'  # 空分支有时是故意的
  
  exclude-rules:
    # 测试文件放宽检查
    - path: _test\.go$
      linters:
        - errcheck
        - ineffassign
    
    # 插件系统可能导出但未使用
    - path: plugins/
      linters:
        - unused
    
    # 以下路径暂时排除 unused，TODO: 逐步清理死代码后移除
    - path: pkg/btrfs/
      linters:
        - unused
    - path: internal/quota/
      linters:
        - unused
    - path: internal/dedup/
      linters:
        - unused
    - path: internal/compress/
      linters:
        - unused
        - govet
    - path: internal/logging/
      linters:
        - unused
    
    # 生成的代码
    - path: \.pb\.go$
      linters:
        - govet
        - staticcheck