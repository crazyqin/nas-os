# golangci-lint 配置文件 (v2 格式)

version: 2

run:
  timeout: 10m
  tests: true

linters:
  default: none
  enable:
    # - errcheck    # 检查未处理的错误返回值 (暂时禁用，项目中存在大量历史遗留问题)
    - gocritic    # 高级代码检查
    - gosec       # 安全漏洞检查
    - govet       # Go vet 检查
    - ineffassign # 检测无效赋值
    - staticcheck # 静态分析 (包含 gosimple 功能)
    - unused      # 未使用代码检查

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  
  exclude:
    - 'SA9003: empty branch'  # 空分支有时是故意的
  
  exclude-rules:
    # 插件系统可能导出但未使用
    - path: plugins/
      linters:
        - unused
    
    # 以下路径暂时排除 unused，TODO: 逐步清理死代码后移除
    - path: pkg/btrfs/
      linters:
        - unused
    - path: internal/quota/
      linters:
        - unused
    - path: internal/dedup/
      linters:
        - unused
    - path: internal/compress/
      linters:
        - unused
        - govet
    - path: internal/logging/
      linters:
        - unused
    
    # 生成的代码
    - path: \.pb\.go$
      linters:
        - govet
        - staticcheck