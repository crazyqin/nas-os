version: "2"

run:
  timeout: 10m
  tests: true

linters:
  default: none
  enable:
    - govet
    - errcheck
    - staticcheck
    - ineffassign
    - misspell
    - revive
    - unused

  settings:
    errcheck:
      check-type-assertions: true
      check-blank: true

    revive:
      rules:
        - name: var-naming
          disabled: false
        - name: exported
          disabled: false

  exclusions:
    generated: lax
    paths:
      - vendor
      - tests/fixtures
    rules:
      # 测试文件放宽检查
      - path: _test\.go
        linters:
          - errcheck
      # 生成的代码跳过检查
      - path: docs/swagger/docs\.go
        linters:
          - all
      # fmt.Print/Fprintln/Fprintf 输出函数允许忽略错误
      - path: cmd/nasctl/
        linters:
          - errcheck
        text: "fmt.Fprint|fmt.Fprintln|fmt.Fprintf|w.Flush"
      # cobra flag 获取允许忽略错误（已定义默认值）
      - path: cmd/nasctl/
        linters:
          - errcheck
        text: "GetString|GetBool|GetInt|GetStringSlice|Scanln"
      # nasctl main.go: encoder.Encode, resp.Body.Close 允许忽略
      - path: cmd/nasctl/main\.go
        linters:
          - errcheck
        text: "encoder.Encode|resp.Body.Close"
      # automation trigger: watcher.Close, Body.Close, json.Encode 允许忽略
      - path: internal/automation/trigger/trigger\.go
        linters:
          - errcheck
        text: "watcher.Close|r.Body.Close|json.NewEncoder|Encode"
      # cache lru: 缓存操作允许忽略错误
      - path: internal/cache/lru\.go
        linters:
          - errcheck
      # dashboard health: strconv 转换允许忽略（已注释说明）
      - path: internal/dashboard/health/checker\.go
        linters:
          - errcheck
        text: "strconv.Atoi|strconv.ParseFloat"
      # quota optimizer: 数据加载、解析、预测允许忽略（已注释说明）
      - path: internal/quota/optimizer/optimizer\.go
        linters:
          - errcheck
        text: "optimizer.load|json.Unmarshal|GetGrowthRate|PredictAllUsage|GetAllUsage|SafeUint64ToInt64"
      # rbac manager: save 操作允许忽略
      - path: internal/rbac/manager\.go
        linters:
          - errcheck
        text: "m.save"

formatters:
  enable:
    - gofmt
    - goimports

  exclusions:
    paths:
      - vendor
      - tests/fixtures

issues:
  max-issues-per-linter: 50
  max-same-issues: 10