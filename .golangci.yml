# golangci-lint 配置文件 (v2 格式)

version: 2

run:
  timeout: 10m
  tests: true

linters:
  default: none
  enable:
    - govet
    - ineffassign
    - staticcheck
    - unused

issues:
  exclude:
    - 'SA9003: empty branch'
    - 'field `.*` is unused'
    - 'type `.*` is unused'
    - 'func `.*` is unused'
    - 'copylocks:'
  exclude-rules:
    - path: _test\.go$
      linters:
        - ineffassign
        - staticcheck
    - path: plugins/
      linters:
        - unused
    - path: pkg/btrfs/
      linters:
        - unused
    - path: internal/quota/
      linters:
        - unused
    - path: internal/dedup/
      linters:
        - unused
    - path: internal/compress/
      linters:
        - unused
        - govet
    - path: internal/logging/
      linters:
        - unused